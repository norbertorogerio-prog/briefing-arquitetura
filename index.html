<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Relatório Prédio | Vivo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:#fff;
}

.app{
  display:flex;
  gap:20px;
  padding:20px;
}

/* ESQUERDA */
.controls{
  width:280px;
  background:#1a1a2e;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DIREITA */
.viewer{
  flex:1;
}

/* PRÉDIO */
.building{
  display:flex;
  align-items:center;
  gap:40px;
}

.tower{
  width:80px;
  height:500px;
  border:3px solid #999;
  position:relative;
}

.floor{
  position:absolute;
  width:100%;
  border-top:1px solid #555;
  text-align:center;
  font-size:10px;
  color:#aaa;
}

.zone-label{
  position:absolute;
  left:-140px;
  width:120px;
  text-align:right;
  font-size:14px;
}

.zone-high{
  top:0;
}

.zone-low{
  bottom:0;
}

/* STATUS BLOCOS */
.status-map{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.block{
  width:30px;
  height:30px;
  border-radius:4px;
}

.valid{background:#00C853}
.lock{background:#FFD600}
.prob{background:#FF3B3B}

/* RELATÓRIO */
.report{
  margin-top:30px;
  background:#1a1a2e;
  padding:20px;
  border-radius:12px;
}

/* PNG */
.capture{
  background:#0f0f1a;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="controls">
<h3>Entrada</h3>

<input id="floor" type="number" placeholder="Andar 1-32">
<input id="room" placeholder="Sala">

<button onclick="add('valid')">Validado</button>
<button onclick="add('lock')">Trancado</button>
<button onclick="add('prob')">Problema</button>

<button onclick="savePNG()">📸 Exportar PNG</button>

</div>

<div class="viewer">

<div id="capture" class="capture">

<div class="building">

<!-- PRÉDIO -->
<div class="tower" id="tower"></div>

<!-- STATUS -->
<div class="status-map" id="map"></div>

</div>

<!-- RELATÓRIO -->
<div class="report" id="report"></div>

</div>

</div>

</div>

<script>

let data=[];

// desenhar prédio
function drawBuilding(){

let tower=document.getElementById("tower");
tower.innerHTML="";

for(let i=1;i<=32;i++){

let f=document.createElement("div");
f.className="floor";
f.style.bottom=(i*3)+"%";
f.innerHTML=i;

tower.appendChild(f);
}

}

// adicionar
function add(status){

let f=document.getElementById("floor").value;
let r=document.getElementById("room").value;

if(!f || !r) return;

data.push({f,r,status});

render();
}

// render geral
function render(){

// MAPA
let map=document.getElementById("map");
map.innerHTML="";

data.forEach(d=>{
let b=document.createElement("div");
b.className="block "+d.status;
map.appendChild(b);
});

// RELATÓRIO
let rep=document.getElementById("report");

let html="<b>Relatório</b><br><br>";

data.forEach(d=>{
html+=`Andar ${d.f} - Sala ${d.r}<br>`;
});

rep.innerHTML=html;

}

// PNG
async function savePNG(){
let el=document.getElementById("capture");
let canvas=await html2canvas(el);
let link=document.createElement("a");
link.download="predio.png";
link.href=canvas.toDataURL();
link.click();
}

// init
drawBuilding();

</script>

</body>
</html>
