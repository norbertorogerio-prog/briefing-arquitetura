<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria Premium | Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --purple:#6A1B9A;
  --bg:#0b0b10;
  --card:#151520;
  --text:#fff;
  --green:#00c853;
  --yellow:#ffd600;
  --red:#ff3b3b;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:linear-gradient(135deg,#0b0b10,#1a1a2e);
  color:#fff;
  padding:16px;
}

.app{
  max-width:1400px;
  margin:auto;
  display:grid;
  grid-template-columns:350px 1fr;
  gap:20px;
}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
}

.card{
  background:rgba(20,20,30,.9);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:20px;
}

h2{
  font-size:18px;
  font-weight:800;
  margin-bottom:16px;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  background:#1f1f2e;
  color:#fff;
}

.status{
  display:flex;
  gap:8px;
}

.status button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.valid{background:var(--green)}
.lock{background:var(--yellow);color:#000}
.prob{background:var(--red)}
.other{background:#888}

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.kpi{
  background:#1f1f2e;
  border-radius:14px;
  padding:12px;
  text-align:center;
  font-weight:800;
  font-size:18px;
}

.building{
  background:#111;
  border-radius:20px;
  padding:16px;
  max-height:600px;
  overflow:auto;
}

.floor{
  display:flex;
  align-items:center;
  margin-bottom:6px;
}

.floor-label{
  width:40px;
  font-size:11px;
  color:#aaa;
}

.floor-bar{
  flex:1;
  height:18px;
  border-radius:6px;
  background:#222;
  overflow:hidden;
}

.floor-fill{
  height:100%;
  transition:.3s;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:800;
  background:linear-gradient(135deg,#6A1B9A,#8E24AA);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
<h2>Cadastro</h2>

<input id="auditor" placeholder="Auditor">

<select id="predio">
<option value="">Prédio</option>
<option>Eco Berrini</option>
<option>Chucri Zaidan</option>
</select>

<input id="andar" type="number" min="1" max="32" placeholder="Andar">
<input id="sala" type="number" min="1" max="50" placeholder="Sala">

<div class="status">
<button class="valid" onclick="add('valid')">OK</button>
<button class="lock" onclick="add('lock')">Lock</button>
<button class="prob" onclick="add('prob')">Problema</button>
<button class="other" onclick="add('other')">Outro</button>
</div>

<button class="btn" onclick="exportPNG()">📸 Exportar PNG</button>
</div>

<div class="card">

<div class="kpi-grid">
<div class="kpi" id="total">0<br><span>Salas</span></div>
<div class="kpi" id="ok">0<br><span>OK</span></div>
<div class="kpi" id="probKpi">0<br><span>Problemas</span></div>
<div class="kpi" id="health">0%<br><span>Saúde</span></div>
</div>

<div id="capture">
<div class="building" id="building"></div>
</div>

</div>

</div>

<script>

let entries = [];

/* ADD OU UPDATE CORRETO */
function add(status){
  let f=parseInt(document.getElementById('andar').value);
  let r=parseInt(document.getElementById('sala').value);

  if(!f || !r) return;

  const existing = entries.find(e => e.f === f && e.r === r);

  if(existing){
    existing.status = status;
  } else {
    entries.push({f,r,status});
  }

  render();
}

/* REMOVE DUPLICADOS */
function getUnique(){
  return Object.values(
    entries.reduce((acc, cur)=>{
      acc[`${cur.f}-${cur.r}`] = cur;
      return acc;
    },{})
  );
}

/* RENDER */
function render(){

  let building = document.getElementById('building');
  building.innerHTML="";

  let unique = getUnique();

  let floors = {};

  unique.forEach(d=>{
    if(!floors[d.f]) floors[d.f]=[];
    floors[d.f].push(d);
  });

  for(let i=32;i>=1;i--){

    let div=document.createElement('div');
    div.className='floor';

    let label=document.createElement('div');
    label.className='floor-label';
    label.innerText = String(i).padStart(2,'0');

    let bar=document.createElement('div');
    bar.className='floor-bar';

    let fill=document.createElement('div');
    fill.className='floor-fill';

    let items = floors[i] || [];

    let prob = items.filter(x=>x.status==='prob').length;
    let ok = items.filter(x=>x.status==='valid').length;
    let lock = items.filter(x=>x.status==='lock').length;

    if(prob > 0){
      fill.style.background = 'var(--red)';
    } else if(lock > 0){
      fill.style.background = 'var(--yellow)';
    } else if(ok > 0){
      fill.style.background = 'var(--green)';
    } else {
      fill.style.background = '#444';
    }

    fill.style.width = (items.length * 5) + "%";

    bar.appendChild(fill);
    div.appendChild(label);
    div.appendChild(bar);

    building.appendChild(div);
  }

  updateKPI(unique);
}

/* KPI */
function updateKPI(list){

  let total = list.length;
  let ok = list.filter(x=>x.status==='valid').length;
  let prob = list.filter(x=>x.status==='prob').length;

  document.getElementById('total').innerHTML = total + "<br><span>Salas</span>";
  document.getElementById('ok').innerHTML = ok + "<br><span>OK</span>";
  document.getElementById('probKpi').innerHTML = prob + "<br><span>Problemas</span>";

  let health = total ? Math.round((ok/total)*100) : 0;

  document.getElementById('health').innerHTML = health + "%<br><span>Saúde</span>";
}

/* EXPORT PNG */
function exportPNG(){
  html2canvas(document.getElementById('capture')).then(canvas=>{
    let link=document.createElement('a');
    link.download='vistoria.png';
    link.href=canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
