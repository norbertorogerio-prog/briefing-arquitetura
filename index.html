<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relatório de Vistoria | Mapa Visual</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg:#0f0f1a;
  --card:#1a1a2e;
  --border:#3a3a55;
  --txt:#fff;

  --ok:#00c853;
  --warn:#ffd600;
  --bad:#ff3b3b;
  --other:#8e24aa;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:Inter,Arial,sans-serif;
  padding:20px;
}

.app{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:20px;
  max-width:1600px;
  margin:auto;
}

/* ================= CONTROLE ================= */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
}

h2{
  margin-bottom:12px;
  font-size:18px;
}

label{
  font-size:11px;
  color:#bbb;
  margin-top:10px;
  display:block;
}

select,input{
  width:100%;
  padding:8px;
  margin-top:4px;
  border-radius:8px;
  border:1px solid #444;
  background:#111;
  color:#fff;
}

.row{display:flex;gap:10px}

.status-strip{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.status{
  flex:1;
  text-align:center;
  padding:8px;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
  border:1px solid #555;
}

.valid{background:var(--ok);color:#000}
.lock{background:var(--warn);color:#000}
.problem{background:var(--bad)}
.other{background:var(--other)}

button{
  margin-top:14px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#5e17eb;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

/* ================= RELATÓRIO ================= */
.report{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
}

.report-body{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:20px;
}

/* ===== PRÉDIO DIAGONAL ===== */
.building{
  position:relative;
  height:360px;
}

.diagonal{
  position:absolute;
  bottom:0;
  left:0;
}

.block{
  width:26px;
  height:26px;
  margin:6px;
  border-radius:6px;
  background:#222;
  border:1px solid #444;
}

.block.filled{
  background:#5e17eb;
  box-shadow:0 0 10px rgba(94,23,235,.6);
}

/* posicionamento diagonal */
.block:nth-child(1){transform:translate(0,0)}
.block:nth-child(2){transform:translate(22px,-22px)}
.block:nth-child(3){transform:translate(44px,-44px)}
.block:nth-child(4){transform:translate(66px,-66px)}
.block:nth-child(5){transform:translate(88px,-88px)}
.block:nth-child(6){transform:translate(110px,-110px)}
.block:nth-child(7){transform:translate(132px,-132px)}
.block:nth-child(8){transform:translate(154px,-154px)}
.block:nth-child(9){transform:translate(176px,-176px)}
.block:nth-child(10){transform:translate(198px,-198px)}
.block:nth-child(11){transform:translate(220px,-220px)}
.block:nth-child(12){transform:translate(242px,-242px)}
.block:nth-child(13){transform:translate(264px,-264px)}
.block:nth-child(14){transform:translate(286px,-286px)}
.block:nth-child(15){transform:translate(308px,-308px)}

/* ===== GRID ===== */
.grid{
  display:grid;
  gap:6px;
}

.floor{
  display:grid;
  grid-template-columns:repeat(6,100px);
  gap:6px;
}

.cell{
  height:28px;
  border-radius:4px;
  font-size:11px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#222;
  border:1px dashed #444;
}

.cell.valid{background:var(--ok);color:#000}
.cell.lock{background:var(--warn);color:#000}
.cell.problem{background:var(--bad)}
.cell.other{background:var(--other)}
</style>
</head>

<body>

<div class="app">

<!-- CONTROLE -->
<div class="card">
  <h2>Vistoria</h2>

  <label>Andar</label>
  <select id="floor"></select>

  <label>Sala</label>
  <select id="room"></select>

  <div class="status-strip">
    <div class="status valid" data-status="valid">Validada</div>
    <div class="status lock" data-status="lock">Trancada</div>
    <div class="status problem" data-status="problem">Problema</div>
    <div class="status other" data-status="other">Outros</div>
  </div>

  <button onclick="clearAll()">Limpar tudo</button>
</div>

<!-- RELATÓRIO -->
<div class="report" id="capture">
  <div class="report-body">

    <!-- PRÉDIO -->
    <div class="building">
      <div class="diagonal" id="diagonal"></div>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid"></div>

  </div>
</div>

</div>

<script>
const TOTAL_FLOORS = 32;
const TOTAL_ROOMS = 6;
const MAX_BLOCKS = 15;

let entries = JSON.parse(localStorage.getItem("entries")||"[]");

const floorSel = document.getElementById("floor");
const roomSel  = document.getElementById("room");
const grid     = document.getElementById("grid");
const diagonal = document.getElementById("diagonal");

/* init selects */
for(let i=1;i<=TOTAL_FLOORS;i++){
  floorSel.innerHTML += `<option>${String(i).padStart(2,"0")}</option>`;
}
for(let i=1;i<=TOTAL_ROOMS;i++){
  roomSel.innerHTML += `<option>${String(i).padStart(2,"0")}</option>`;
}

/* render grid */
function render(){
  grid.innerHTML="";
  for(let f=TOTAL_FLOORS;f>=1;f--){
    const row=document.createElement("div");
    row.className="floor";
    for(let r=1;r<=TOTAL_ROOMS;r++){
      const id=`${String(f).padStart(2,"0")}-SL${String(r).padStart(2,"0")}`;
      const found=entries.find(e=>e.id===id);
      const c=document.createElement("div");
      c.className="cell "+(found?found.status:"");
      c.textContent=id;
      c.onclick=()=>{
        floorSel.value=String(f).padStart(2,"0");
        roomSel.value=String(r).padStart(2,"0");
      };
      row.appendChild(c);
    }
    grid.appendChild(row);
  }

  renderDiagonal();
}

/* diagonal blocks */
function renderDiagonal(){
  diagonal.innerHTML="";
  for(let i=0;i<MAX_BLOCKS;i++){
    const d=document.createElement("div");
    d.className="block"+(i<entries.length?" filled":"");
    diagonal.appendChild(d);
  }
}

/* status click */
document.querySelectorAll(".status").forEach(s=>{
  s.onclick=()=>{
    const id=`${floorSel.value}-SL${roomSel.value}`;
    const idx=entries.findIndex(e=>e.id===id);
    if(idx>=0) entries[idx].status=s.dataset.status;
    else entries.push({id,status:s.dataset.status});
    localStorage.setItem("entries",JSON.stringify(entries));
    render();
  };
});

function clearAll(){
  entries=[];
  localStorage.removeItem("entries");
  render();
}

render();
</script>

</body>
</html>
