<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Relatório de Vistoria | Eco Berrini - Mapa Interativo</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0A0A14 0%, #11111F 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: #ffffff;
    }

    /* Container principal */
    .dashboard {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @media (min-width: 1100px) {
      .dashboard {
        display: grid;
        grid-template-columns: 360px 1fr;
        align-items: start;
      }
    }

    /* Cards */
    .card {
      background: rgba(18, 18, 32, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(102, 0, 204, 0.4);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.2s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(102, 0, 204, 0.3);
      padding-bottom: 12px;
    }

    .card-header h2 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #AA66FF, #6600CC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    /* Formulário */
    .field-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #A0A0C0;
      margin-bottom: 6px;
    }

    .field, select.field {
      width: 100%;
      background: rgba(10, 10, 20, 0.7);
      border: 1.5px solid rgba(102, 0, 204, 0.4);
      border-radius: 14px;
      padding: 12px 14px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }

    .field:focus, select.field:focus {
      border-color: #AA66FF;
      box-shadow: 0 0 0 3px rgba(170, 102, 255, 0.2);
      background: rgba(30, 30, 55, 0.9);
    }

    .row-2 {
      display: flex;
      gap: 12px;
    }
    .row-2 > * {
      flex: 1;
    }

    /* Status Icons bar */
    .status-bar {
      display: flex;
      gap: 12px;
      margin: 20px 0 16px;
      flex-wrap: wrap;
    }

    .status-btn {
      flex: 1;
      background: rgba(30, 30, 55, 0.6);
      border: 1px solid rgba(102, 0, 204, 0.5);
      border-radius: 60px;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }

    .status-btn:hover {
      transform: translateY(-2px);
      background: rgba(102, 0, 204, 0.3);
      border-color: #AA66FF;
    }

    .dot-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-valid { background: #00E676; box-shadow: 0 0 6px #00E676; }
    .dot-lock { background: #FFD600; box-shadow: 0 0 6px #FFD600; }
    .dot-prob { background: #FF5252; box-shadow: 0 0 6px #FF5252; }
    .dot-other { background: #D500F9; box-shadow: 0 0 6px #D500F9; }

    .btn {
      width: 100%;
      background: linear-gradient(95deg, #6600CC, #8A2BE2);
      border: none;
      border-radius: 18px;
      padding: 12px;
      font-weight: 800;
      font-size: 14px;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
    }

    .btn-outline {
      background: rgba(102, 0, 204, 0.2);
      border: 1px solid rgba(170, 102, 255, 0.5);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 8px 18px rgba(102, 0, 204, 0.3);
    }

    /* ========= MAPA COM DESENHO E ÍCONES DENTRO ========= */
    .map-main {
      background: rgba(8, 8, 18, 0.7);
      border-radius: 28px;
      border: 1px solid rgba(102, 0, 204, 0.5);
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .map-header {
      padding: 18px 22px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(102, 0, 204, 0.3);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .map-title h3 {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    .map-meta {
      font-size: 12px;
      color: #C0B0FF;
      margin-top: 4px;
      font-weight: 500;
    }

    .legend-icons {
      display: flex;
      gap: 16px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      padding: 5px 12px;
      border-radius: 40px;
    }

    /* CORPO DO MAPA: DESENHO ESQUERDO + GRADE DIREITA */
    .map-body-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: 560px;
    }

    @media (max-width: 900px) {
      .map-body-container {
        grid-template-columns: 1fr;
      }
    }

    /* Desenho artístico do prédio com ícones de status EMBUTIDOS */
    .building-art {
      background: linear-gradient(145deg, #0C0C18, #0A0A14);
      position: relative;
      border-right: 1px solid rgba(102, 0, 204, 0.4);
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .svg-wrapper {
      position: relative;
      width: 100%;
      max-width: 240px;
      margin: 0 auto;
    }

    .building-svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
    }

    /* Container dos ícones sobrepostos no desenho */
    .icons-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .icon-marker {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: auto;
      cursor: pointer;
      transition: 0.1s ease;
      z-index: 20;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .icon-marker:hover {
      transform: scale(1.1);
      z-index: 30;
    }
    .icon-valid { background: #00E676; color: #000; }
    .icon-lock { background: #FFD600; color: #000; }
    .icon-prob { background: #FF5252; color: white; }
    .icon-other { background: #D500F9; color: white; }

    /* tooltip flutuante */
    .marker-tooltip {
      position: absolute;
      background: #1A1A2E;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 16px;
      white-space: nowrap;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      border: 1px solid #AA66FF;
    }

    /* Grade das salas */
    .grid-floors {
      padding: 18px;
      overflow-y: auto;
      max-height: 620px;
      background: rgba(0,0,0,0.2);
    }

    .floor-line {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 12px;
      margin-bottom: 8px;
      align-items: center;
    }

    .floor-number {
      background: rgba(102, 0, 204, 0.25);
      border-radius: 14px;
      padding: 8px 5px;
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      border: 1px solid rgba(102, 0, 204, 0.5);
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
      gap: 8px;
    }

    .room-card {
      background: rgba(30, 30, 55, 0.6);
      border-radius: 12px;
      padding: 8px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(2px);
    }
    .room-card.valid { background: #00E676cc; color: #000; border-color: #00E676; }
    .room-card.lock { background: #FFD600cc; color: #000; border-color: #FFD600; }
    .room-card.prob { background: #FF5252cc; color: white; border-color: #FF5252; }
    .room-card.other { background: #D500F9cc; color: white; border-color: #D500F9; }
    .room-card.active-room {
      outline: 3px solid white;
      transform: scale(1.02);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6600CC;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: bold;
      opacity: 0;
      transition: 0.2s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(-5px);}
    .small-note {
      font-size: 10px;
      text-align: center;
      margin-top: 12px;
      color: #8a8ac0;
    }
  </style>
</head>
<body>

<div class="dashboard">
  <!-- Painel de Controle -->
  <div class="card">
    <div class="card-header">
      <h2>🔍 VISTORIA TÉCNICA</h2>
    </div>
    <div class="field-group">
      <label>👤 AUDITOR RESPONSÁVEL</label>
      <input type="text" id="auditorName" class="field" placeholder="Ex: Carlos Mendes" value="André Costa">
    </div>
    <div class="field-group">
      <label>🏢 EMPREENDIMENTO</label>
      <select id="buildingSelect" class="field">
        <option value="Eco Berrini">Eco Berrini</option>
        <option value="Chucri Zaidan">Chucri Zaidan</option>
      </select>
    </div>
    <div class="field-group">
      <label>📍 ENDEREÇO</label>
      <input type="text" id="addressField" class="field" readonly placeholder="Endereço automático">
    </div>
    <div class="row-2">
      <div class="field-group">
        <label>🏬 ANDAR</label>
        <select id="floorSelect" class="field"></select>
      </div>
      <div class="field-group">
        <label>🚪 SALA / UNIDADE</label>
        <select id="roomSelect" class="field"></select>
      </div>
    </div>
    
    <div class="status-bar">
      <div class="status-btn" data-status="valid"><span class="dot-icon dot-valid"></span> VALIDADA</div>
      <div class="status-btn" data-status="lock"><span class="dot-icon dot-lock"></span> TRANCADA</div>
      <div class="status-btn" data-status="prob"><span class="dot-icon dot-prob"></span> PROBLEMAS</div>
      <div class="status-btn" data-status="other"><span class="dot-icon dot-other"></span> OUTROS</div>
    </div>
    
    <button id="clearAllBtn" class="btn btn-outline">🗑️ LIMPAR TODOS OS REGISTROS</button>
    <button id="exportPngBtn" class="btn">📸 EXPORTAR MAPA (PNG)</button>
    <div class="small-note">💡 Clique nos ícones sobre o desenho do prédio ou na grade lateral para navegar e aplicar status.</div>
  </div>

  <!-- MAPA COM ÍCONES DENTRO DO DESENHO -->
  <div class="map-main" id="mapCaptureArea">
    <div class="map-header">
      <div class="map-title">
        <h3>🏙️ RELATÓRIO – MAPA DO PRÉDIO</h3>
        <div class="map-meta" id="metaInfo">Carregando...</div>
      </div>
      <div class="legend-icons">
        <div class="leg-item"><span class="dot-icon dot-valid"></span> Validada</div>
        <div class="leg-item"><span class="dot-icon dot-lock"></span> Trancada</div>
        <div class="leg-item"><span class="dot-icon dot-prob"></span> Problemas</div>
        <div class="leg-item"><span class="dot-icon dot-other"></span> Outros</div>
      </div>
    </div>
    
    <div class="map-body-container">
      <!-- LADO ESQUERDO: DESENHO ESTILIZADO DO PRÉDIO COM ÍCONES SOBREPOSTOS -->
      <div class="building-art">
        <div class="svg-wrapper" style="position: relative;">
          <svg class="building-svg" viewBox="0 0 240 500" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3A2A5F"/>
                <stop offset="100%" stop-color="#1F1A3A"/>
              </linearGradient>
              <filter id="shadow" x="-0.02" y="-0.02" width="1.06" height="1.06">
                <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
                <feOffset dx="2" dy="2"/>
                <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
                <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- Estrutura principal -->
            <rect x="45" y="30" width="150" height="440" rx="16" fill="url(#wallGrad)" stroke="#AA66FF" stroke-width="1.8" filter="url(#shadow)"/>
            <!-- Janelas linha vertical -->
            <rect x="65" y="65" width="25" height="35" rx="4" fill="#2A2350" stroke="#BB99FF" stroke-width="1"/>
            <rect x="110" y="65" width="25" height="35" rx="4" fill="#2A2350" stroke="#BB99FF" stroke-width="1"/>
            <rect x="155" y="65" width="25" height="35" rx="4" fill="#2A2350" stroke="#BB99FF" stroke-width="1"/>
            <!-- representação de andares (linhas) -->
            <line x1="50" y1="120" x2="190" y2="120" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <line x1="50" y1="180" x2="190" y2="180" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <line x1="50" y1="240" x2="190" y2="240" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <line x1="50" y1="300" x2="190" y2="300" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <line x1="50" y1="360" x2="190" y2="360" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <line x1="50" y1="420" x2="190" y2="420" stroke="#AA88FF" stroke-width="1.2" stroke-dasharray="3 3"/>
            <text x="25" y="80" fill="#C0C0FF" font-size="8" font-weight="bold">ZONA</text>
            <text x="22" y="100" fill="#D9C8FF" font-size="9" font-weight="bold">ALTA</text>
            <text x="22" y="380" fill="#D9C8FF" font-size="9" font-weight="bold">ZONA</text>
            <text x="22" y="400" fill="#D9C8FF" font-size="9" font-weight="bold">BAIXA</text>
            <text x="200" y="460" fill="#AA99FF" font-size="7">Eco Berrini</text>
          </svg>
          
          <!-- CONTÊINER DOS ÍCONES FLUTUANTES SOBRE O DESENHO (relatório em ícones) -->
          <div id="dynamicIconsContainer" class="icons-overlay"></div>
        </div>
        <div style="margin-top: 12px; font-size: 10px; text-align: center; color: #AA99FF;">⬤ Ícones representam salas com vistoria</div>
      </div>
      
      <!-- GRADE DETALHADA DAS SALAS -->
      <div class="grid-floors" id="roomsGridContainer"></div>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast">✅ Ação concluída</div>

<script>
  // --------------------------------------------------------------
  // DADOS DOS PRÉDIOS (Eco Berrini com 32 andares / 15 salas cada)
  // --------------------------------------------------------------
  const buildingsData = {
    "Eco Berrini": {
      address: "Av. Eng. Luís Carlos Berrini, 1376 - São Paulo/SP",
      floors: Array.from({length: 32}, (_, i) => String(i+1).padStart(2,'0')).reverse(),
      roomsPerFloor: Array.from({length: 15}, (_, i) => String(i+1).padStart(2,'0'))
    },
    "Chucri Zaidan": {
      address: "Av. Dr. Chucri Zaidan, 2460 - São Paulo/SP",
      floors: Array.from({length: 32}, (_, i) => String(i+1).padStart(2,'0')).reverse(),
      roomsPerFloor: Array.from({length: 13}, (_, i) => String(i+1).padStart(2,'0'))
    }
  };

  // Estado dos registros (vistorias)
  let vistoriaEntries = []; // { building, floor, room, status }
  let currentBuilding = "Eco Berrini";
  let currentFloor = "32";
  let currentRoom = "01";

  // DOM elements
  const buildingSelect = document.getElementById("buildingSelect");
  const addressField = document.getElementById("addressField");
  const floorSelect = document.getElementById("floorSelect");
  const roomSelect = document.getElementById("roomSelect");
  const auditorName = document.getElementById("auditorName");
  const metaInfoSpan = document.getElementById("metaInfo");
  const roomsGridContainer = document.getElementById("roomsGridContainer");
  const iconsContainer = document.getElementById("dynamicIconsContainer");
  const toastMsg = document.getElementById("toastMsg");

  function showToast(text) {
    toastMsg.textContent = text;
    toastMsg.classList.add("show");
    setTimeout(() => toastMsg.classList.remove("show"), 2000);
  }

  function saveToLocal() {
    localStorage.setItem("vistoria_eco_map", JSON.stringify(vistoriaEntries));
  }

  function loadFromLocal() {
    const saved = localStorage.getItem("vistoria_eco_map");
    if(saved) vistoriaEntries = JSON.parse(saved);
    else vistoriaEntries = [];
  }

  // Obter status de uma sala específica
  function getStatus(building, floor, room) {
    const entry = vistoriaEntries.find(e => e.building === building && e.floor === floor && e.room === room);
    return entry ? entry.status : null;
  }

  // Atualizar ou adicionar registro
  function setStatus(building, floor, room, status) {
    const idx = vistoriaEntries.findIndex(e => e.building === building && e.floor === floor && e.room === room);
    if(idx !== -1) vistoriaEntries[idx] = { building, floor, room, status };
    else vistoriaEntries.push({ building, floor, room, status });
    saveToLocal();
    refreshAll();
    showToast(`📍 ${floor}-S${room} → ${statusText(status)}`);
  }

  function statusText(st) {
    if(st==="valid") return "Validada";
    if(st==="lock") return "Trancada";
    if(st==="prob") return "Problemas";
    return "Outros";
  }

  // Atualiza selects de andar e sala
  function updateSelectors() {
    const data = buildingsData[currentBuilding];
    if(!data) return;
    addressField.value = data.address;
    const floorsList = data.floors;
    floorSelect.innerHTML = "";
    floorsList.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f;
      opt.textContent = `Andar ${f}`;
      floorSelect.appendChild(opt);
    });
    if(!floorsList.includes(currentFloor)) currentFloor = floorsList[0];
    floorSelect.value = currentFloor;
    
    const roomsList = data.roomsPerFloor;
    roomSelect.innerHTML = "";
    roomsList.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = `Sala ${r}`;
      roomSelect.appendChild(opt);
    });
    if(!roomsList.includes(currentRoom)) currentRoom = roomsList[0];
    roomSelect.value = currentRoom;
  }

  // Renderiza a grade detalhada (direita)
  function renderRoomsGrid() {
    const data = buildingsData[currentBuilding];
    if(!data) return;
    const floors = data.floors;
    const rooms = data.roomsPerFloor;
    let html = "";
    for(let fl of floors) {
      html += `<div class="floor-line">
        <div class="floor-number">${fl}</div>
        <div class="rooms-grid">`;
      for(let rm of rooms) {
        const status = getStatus(currentBuilding, fl, rm);
        let statusClass = "";
        if(status === "valid") statusClass = "valid";
        else if(status === "lock") statusClass = "lock";
        else if(status === "prob") statusClass = "prob";
        else if(status === "other") statusClass = "other";
        const activeClass = (currentFloor === fl && currentRoom === rm) ? "active-room" : "";
        html += `<div class="room-card ${statusClass} ${activeClass}" data-floor="${fl}" data-room="${rm}">
                  ${fl}-S${rm}
                </div>`;
      }
      html += `</div></div>`;
    }
    roomsGridContainer.innerHTML = html;
    
    // eventos clique na grade
    document.querySelectorAll(".room-card").forEach(card => {
      card.addEventListener("click", (e) => {
        const fl = card.dataset.floor;
        const rm = card.dataset.room;
        if(fl && rm) {
          currentFloor = fl;
          currentRoom = rm;
          floorSelect.value = currentFloor;
          roomSelect.value = currentRoom;
          refreshAll();
        }
      });
    });
  }

  // GERAR ÍCONES SOBRE O SVG (posições fixas relativas para cada andar simbólico)
  function renderIconsOnDrawing() {
    iconsContainer.innerHTML = "";
    const data = buildingsData[currentBuilding];
    if(!data) return;
    // Mapeamento y aproximado para cada andar (32 andares => mapear de 30 a 440)
    // Andar 32 fica em Y~55, Andar 01 fica Y~435
    const allEntriesForBuilding = vistoriaEntries.filter(e => e.building === currentBuilding);
    if(allEntriesForBuilding.length === 0) return;
    
    // definir posições fixas para os ícones baseado no número do andar (visual)
    allEntriesForBuilding.forEach(entry => {
      const floorNum = parseInt(entry.floor);
      // mapeia Y: floor 32 => y=55, floor 1 => y=435
      const yPos = 435 - ((floorNum - 1) * (380 / 31));
      // X varia conforme a sala (até 3 colunas no desenho)
      const roomNum = parseInt(entry.room);
      let xPos = 75 + ((roomNum % 5) * 22);
      if(xPos > 190) xPos = 170;
      if(xPos < 65) xPos = 70;
      
      let iconClass = "";
      let iconChar = "✓";
      if(entry.status === "valid") { iconClass = "icon-valid"; iconChar = "✓"; }
      else if(entry.status === "lock") { iconClass = "icon-lock"; iconChar = "🔒"; }
      else if(entry.status === "prob") { iconClass = "icon-prob"; iconChar = "⚠"; }
      else if(entry.status === "other") { iconClass = "icon-other"; iconChar = "◉"; }
      
      const iconDiv = document.createElement("div");
      iconDiv.className = `icon-marker ${iconClass}`;
      iconDiv.style.left = `${xPos}px`;
      iconDiv.style.top = `${yPos}px`;
      iconDiv.innerHTML = `<span style="font-size:11px;">${iconChar}</span>`;
      iconDiv.title = `${entry.floor}-S${entry.room} : ${statusText(entry.status)}`;
      
      // Clique no ícone seleciona a sala e mostra
      iconDiv.addEventListener("click", (e) => {
        e.stopPropagation();
        currentFloor = entry.floor;
        currentRoom = entry.room;
        floorSelect.value = currentFloor;
        roomSelect.value = currentRoom;
        refreshAll();
        showToast(`Sala selecionada: ${entry.floor}-S${entry.room}`);
      });
      iconsContainer.appendChild(iconDiv);
    });
  }

  // Atualiza header de meta
  function updateMeta() {
    const totalReg = vistoriaEntries.filter(e => e.building === currentBuilding).length;
    const auditor = auditorName.value.trim() || "Não informado";
    const dateStr = new Date().toLocaleString("pt-BR");
    metaInfoSpan.innerHTML = `🏢 ${currentBuilding}  |  👤 ${auditor}  |  📅 ${dateStr}  |  🏷️ Registros: ${totalReg}`;
  }

  // refresh total do mapa e ícones
  function refreshAll() {
    updateSelectors();
    renderRoomsGrid();
    renderIconsOnDrawing();
    updateMeta();
  }

  // Evento de mudança de prédio
  buildingSelect.addEventListener("change", (e) => {
    currentBuilding = e.target.value;
    const floors = buildingsData[currentBuilding].floors;
    currentFloor = floors[0];
    currentRoom = buildingsData[currentBuilding].roomsPerFloor[0];
    refreshAll();
  });

  floorSelect.addEventListener("change", (e) => {
    currentFloor = e.target.value;
    refreshAll();
  });
  roomSelect.addEventListener("change", (e) => {
    currentRoom = e.target.value;
    refreshAll();
  });
  auditorName.addEventListener("input", () => updateMeta());

  // Ações dos status
  document.querySelectorAll(".status-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const statusVal = btn.dataset.status;
      if(!currentBuilding || !currentFloor || !currentRoom) return;
      setStatus(currentBuilding, currentFloor, currentRoom, statusVal);
    });
  });

  document.getElementById("clearAllBtn").addEventListener("click", () => {
    if(confirm("⚠️ Limpar TODOS os registros de vistoria deste navegador?")) {
      vistoriaEntries = [];
      saveToLocal();
      refreshAll();
      showToast("Todos os registros foram removidos.");
    }
  });

  // Export PNG
  document.getElementById("exportPngBtn").addEventListener("click", async () => {
    const element = document.getElementById("mapCaptureArea");
    showToast("Gerando PNG...");
    try {
      const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#0A0A14", useCORS: true });
      const link = document.createElement("a");
      const ts = new Date().toISOString().slice(0,19).replace(/:/g, "-");
      link.download = `vistoria_${currentBuilding}_${ts}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      showToast("✅ Mapa exportado com sucesso!");
    } catch(e) {
      showToast("❌ Erro ao gerar imagem");
    }
  });

  // Inicialização
  loadFromLocal();
  currentBuilding = "Eco Berrini";
  currentFloor = "32";
  currentRoom = "01";
  refreshAll();
</script>
</body>
</html>
