<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>Vistoria Técnica Vivo | Design Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
  --vivo-purple: #6600CC;
  --vivo-purple-light: #8833FF;
  --vivo-purple-glow: rgba(102, 0, 204, 0.2);
  --grad-primary: linear-gradient(135deg, #6600CC 0%, #8833FF 100%);
  --grad-success: linear-gradient(135deg, #00C853 0%, #00E676 100%);
  --grad-warning: linear-gradient(135deg, #FFD600 0%, #FFEA00 100%);
  --grad-danger: linear-gradient(135deg, #FF3B3B 0%, #FF6B6B 100%);
  --grad-occupied: linear-gradient(135deg, #FF9800 0%, #FFB74D 100%);
  --green: #00C853;
  --yellow: #FFD600;
  --red: #FF3B3B;
  --orange: #FF9800;
  --white: #FFFFFF;
  --black: #1A1A2E;
  --gray-500: #9A9AAD;
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
  --shadow-glow: 0 0 20px rgba(102, 0, 204, 0.3);
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%);
  color: var(--white);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding: 20px;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: linear-gradient(rgba(102, 0, 204, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(102, 0, 204, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  z-index: 1;
}

@media (min-width: 980px) {
  body { padding: 24px; }
  .app {
    flex-direction: row;
    gap: 28px;
    align-items: flex-start;
  }
  .app > :first-child {
    width: 400px;
    flex-shrink: 0;
    position: sticky;
    top: 24px;
  }
  .app > :last-child {
    flex: 1;
    min-width: 0;
  }
}

.card, .section {
  background: rgba(26, 26, 46, 0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(102, 0, 204, 0.25);
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  transition: var(--transition-base);
}

h2 {
  font-size: 22px;
  font-weight: 800;
  background: var(--grad-primary);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 24px;
  letter-spacing: -0.3px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

h2::before { content: '✨'; background: none; color: var(--vivo-purple-light); }

h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-500);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

label {
  display: block;
  margin: 16px 0 8px 0;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--gray-500);
  letter-spacing: 0.5px;
}

.form-field, .form-select {
  width: 100%;
  border: 1.5px solid rgba(102, 0, 204, 0.2);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--white);
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: var(--transition-fast);
  cursor: pointer;
}

.form-field:focus, .form-select:focus {
  border-color: var(--vivo-purple);
  background: rgba(102, 0, 204, 0.1);
  box-shadow: 0 0 0 3px var(--vivo-purple-glow);
}

.form-select option { background: #2A2A3E; color: var(--white); }

.number-input-group { display: flex; gap: 16px; margin-bottom: 8px; }
.number-input-group > div { flex: 1; }

.status-strip {
  display: flex;
  gap: 12px;
  margin: 20px 0 24px;
  flex-wrap: wrap;
}

.status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px 20px;
  border-radius: 60px;
  color: var(--white);
  background: rgba(102, 0, 204, 0.1);
  border: 1.5px solid rgba(102, 0, 204, 0.25);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: var(--transition-base);
  flex: 1;
  min-width: 100px;
  position: relative;
  overflow: hidden;
}

.status:hover { background: rgba(102, 0, 204, 0.25); transform: translateY(-2px); border-color: var(--vivo-purple); }

.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.valid { background: var(--green); box-shadow: 0 0 10px rgba(0, 200, 83, 0.5); }
.dot.lock { background: var(--yellow); box-shadow: 0 0 10px rgba(255, 214, 0, 0.5); }
.dot.prob { background: var(--red); box-shadow: 0 0 10px rgba(255, 59, 59, 0.5); }
.dot.occupied { background: var(--orange); box-shadow: 0 0 10px rgba(255, 152, 0, 0.5); }

.photo-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(102, 0, 204, 0.2); }
.photo-label { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--gray-500); }
.photo-upload-btn {
  background: rgba(102, 0, 204, 0.15);
  border: 1.5px dashed rgba(102, 0, 204, 0.4);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition-base);
  font-size: 13px;
  font-weight: 600;
}
.photo-upload-btn:hover { background: rgba(102, 0, 204, 0.25); border-color: var(--vivo-purple); transform: translateY(-2px); }

.photo-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 85px));
  gap: 12px;
  margin-top: 16px;
}

.photo-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(102, 0, 204, 0.3);
  background: rgba(0, 0, 0, 0.4);
}
.photo-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.photo-delete {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(0, 0, 0, 0.75);
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 12px;
  color: var(--red);
  font-weight: bold;
}
.photo-delete:hover { background: var(--red); color: white; }

.btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  background: var(--grad-primary);
  color: var(--white);
  font-weight: 700;
  padding: 12px;
  cursor: pointer;
  font-size: 13px;
  transition: var(--transition-base);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 0, 204, 0.4); }

.row { display: flex; gap: 12px; margin-top: 20px; }
.row button { flex: 1; }

.created-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  max-height: 450px;
  overflow-y: auto;
  padding: 4px;
}

.room-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(102, 0, 204, 0.25);
  background: linear-gradient(135deg, rgba(102, 0, 204, 0.08), rgba(102, 0, 204, 0.02));
  min-width: 130px;
  cursor: pointer;
  transition: var(--transition-base);
}
.room-card:hover { border-color: var(--vivo-purple); transform: translateY(-3px); box-shadow: var(--shadow-glow); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 800;
  background: rgba(102, 0, 204, 0.3);
  border-radius: 12px;
  padding: 6px 12px;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  border-radius: 40px;
  padding: 5px 12px;
  width: fit-content;
}
.pill.valid { background: var(--grad-success); color: var(--black); }
.pill.lock { background: var(--grad-warning); color: var(--black); }
.pill.prob { background: var(--grad-danger); color: white; }
.pill.occupied { background: var(--grad-occupied); color: var(--black); }

.report-box {
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.3);
  overflow: visible;
  border: 1px solid rgba(102, 0, 204, 0.3);
}

.report-title {
  background: linear-gradient(135deg, rgba(102, 0, 204, 0.2), rgba(76, 0, 153, 0.2));
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(102, 0, 204, 0.3);
}
.report-title span { font-size: 16px; font-weight: 800; background: var(--grad-primary); -webkit-background-clip: text; background-clip: text; color: transparent; }
.report-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-action {
  border: 1.5px solid rgba(102, 0, 204, 0.3);
  background: rgba(102, 0, 204, 0.15);
  color: var(--white);
  font-weight: 600;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: var(--transition-fast);
}
.btn-action:hover { background: rgba(102, 0, 204, 0.3); transform: translateY(-2px); }
.btn-share { background: linear-gradient(135deg, #25D366, #128C7E); border: none; }

/* Mock do celular - MAIS LARGO */
.phone-wrap {
  margin: 12px auto;
  width: 100%;
  max-width: 560px;
  border-radius: 48px;
  padding: 16px 14px 20px;
  background: linear-gradient(180deg, #2A2A3E 0%, #1A1A2E 100%);
  box-shadow: var(--shadow-lg), 0 0 0 8px rgba(102, 0, 204, 0.1);
  border: 1px solid rgba(102, 0, 204, 0.3);
  position: relative;
  overflow: hidden;
}

.phone-notch {
  width: 180px;
  height: 28px;
  background: #0F0F1A;
  border-radius: 0 0 20px 20px;
  margin: -8px auto 12px;
  position: relative;
}

.phone-screen {
  background: #0A0A12;
  border-radius: 32px;
  overflow: auto;
  position: relative;
  max-height: 700px;
}

.phone-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 10px 10px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.04));
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.vivo-logo {
  font-weight: 900;
  letter-spacing: 2px;
  font-size: 12px;
  background: linear-gradient(135deg, #fff, #d9c9ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  padding: 4px 12px;
  border-radius: 40px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.phone-screen .report-content {
  background: transparent;
  padding: 24px 24px 28px;
  font-size: 14px;
  line-height: 1.6;
  min-height: 520px;
}

.report-content .h-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(102, 0, 204, 0.4), transparent);
  margin: 16px 0;
}
.report-content .title { font-weight: 800; font-size: 16px; letter-spacing: -0.2px; color: var(--vivo-purple-light); margin-bottom: 12px; }
.report-content .kvs { margin: 12px 0 0; }
.report-content .kv { display: flex; gap: 14px; font-size: 13px; margin: 10px 0; }
.report-content .kv b { color: var(--vivo-purple-light); min-width: 90px; text-transform: uppercase; font-size: 12px; font-weight: 700; }
.report-content .bullet { margin: 10px 0 10px 20px; font-size: 13px; }

.report-room-photos {
  margin: 20px 0;
  padding: 16px;
  background: rgba(102, 0, 204, 0.08);
  border-radius: 18px;
}
.report-room-title { font-weight: 700; color: var(--vivo-purple-light); margin-bottom: 12px; font-size: 13px; }
.report-photo-thumbnails { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
.report-thumb {
  width: 80px;
  height: 80px;
  border-radius: 14px;
  object-fit: cover;
  border: 2px solid var(--vivo-purple);
  cursor: pointer;
}

.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: rgba(102, 0, 204, 0.95);
  backdrop-filter: blur(12px);
  padding: 12px 22px;
  border-radius: 60px;
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transform: translateY(20px);
  transition: var(--transition-base);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

.share-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(12px);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
.share-modal.show { display: flex; }

.share-card {
  background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(20, 20, 36, 0.95));
  backdrop-filter: blur(20px);
  border: 1px solid rgba(102, 0, 204, 0.4);
  border-radius: 32px;
  padding: 28px;
  max-width: 360px;
  width: 90%;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.share-card h4 { margin-bottom: 24px; font-size: 20px; text-align: center; background: var(--grad-primary); -webkit-background-clip: text; background-clip: text; color: transparent; }
.share-buttons { display: flex; flex-direction: column; gap: 12px; }
.share-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border: none;
  border-radius: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-fast);
}
.share-btn:hover { transform: translateY(-2px); }
.share-btn.whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); color: #fff; }
.share-btn.teams { background: linear-gradient(135deg, #6264A7, #464775); color: #fff; }
.share-btn.email { background: linear-gradient(135deg, #EA4335, #C5221F); color: #fff; }
.share-btn.download { background: var(--grad-primary); color: #fff; }

.close-modal {
  background: rgba(102, 0, 204, 0.2);
  border: 1px solid rgba(102, 0, 204, 0.3);
  border-radius: 18px;
  padding: 12px;
  margin-top: 16px;
  color: #fff;
  cursor: pointer;
  width: 100%;
  font-weight: 600;
}

.fullscreen-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  z-index: 20000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.fullscreen-modal.show { display: flex; }
.fullscreen-modal img { max-width: 95%; max-height: 95%; border-radius: 24px; }

.small { font-size: 11px; color: var(--gray-500); text-align: center; margin-top: 16px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: var(--vivo-purple); border-radius: 10px; }
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h2>Vistoria Técnica</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Nome completo do responsável"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="form-select">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço será preenchido automaticamente"/>

    <div class="number-input-group">
      <div>
        <label>🏬 Andar</label>
        <select id="floorSelect" class="form-select"></select>
      </div>
      <div>
        <label>🚪 Sala</label>
        <select id="roomSelect" class="form-select"></select>
      </div>
    </div>

    <label>📌 Status da Sala</label>
    <div class="status-strip">
      <button class="status" data-status="valid"><span class="dot valid"></span>Validada</button>
      <button class="status" data-status="lock"><span class="dot lock"></span>Trancada</button>
      <button class="status" data-status="prob"><span class="dot prob"></span>Problemas</button>
      <button class="status" data-status="occupied"><span class="dot occupied"></span>Ocupada</button>
    </div>

    <div class="photo-section">
      <div class="photo-label">📸 Fotos da Sala <span id="currentDisplayFloor">01</span>-<span id="currentDisplayRoom">SL01</span></div>
      <div id="photoUploadBtn" class="photo-upload-btn">📷 + Adicionar foto</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
      <div id="photoGallery" class="photo-gallery"></div>
    </div>

    <div class="row">
      <button id="btnClear" class="btn">🗑️ Limpar Todos os Dados</button>
    </div>
  </div>

  <div class="viewer">
    <div class="section">
      <h3>📦 Salas vistoriadas <span id="roomsCount" style="color: var(--vivo-purple-light);">0</span></h3>
      <div id="createdGrid" class="created-grid">
        <p class="small" style="text-align:center;width:100%">Nenhuma sala registrada ainda</p>
      </div>
    </div>

    <div class="section">
      <div class="report-box">
        <div class="report-title">
          <span>📋 Relatório de Vistoria</span>
          <div class="report-actions">
            <label style="display:inline-flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
              <input id="useAI" type="checkbox" checked style="accent-color:#6600CC;"> IA ligada
            </label>
            <button id="btnShare" class="btn-action btn-share">📱 Compartilhar</button>
          </div>
        </div>

        <div id="phoneMock" class="phone-wrap">
          <div class="phone-notch"></div>
          <div id="reportCaptureArea" class="phone-screen">
            <div id="relatorio" class="report-content">
              <div class="title">Relatório de Vistoria</div>
              <div class="h-line"></div>
              <div class="bullet">Aguardando registros...</div>
            </div>
            <div class="phone-footer">
              <div class="vivo-logo">VIVO</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="shareModal" class="share-modal">
  <div class="share-card">
    <h4>✨ Compartilhar Relatório</h4>
    <div class="share-buttons">
      <button id="shareWhatsApp" class="share-btn whatsapp">💬 WhatsApp</button>
      <button id="shareTeams" class="share-btn teams">💼 Teams</button>
      <button id="shareEmail" class="share-btn email">📧 E-mail</button>
      <button id="shareSave" class="share-btn download">📸 Salvar imagem</button>
    </div>
    <button id="closeModal" class="close-modal">Fechar</button>
  </div>
</div>

<div id="fullscreenModal" class="fullscreen-modal" onclick="closeFullscreen()">
  <img id="fullscreenImage" src="">
</div>

<div class="toast"></div>

<script>
const STORAGE_KEY = "vistoria_simple_v2";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let currentFloor = 1, currentRoom = 1, currentImageData = null;

function populateFloorOptions() {
  const floorSelect = document.getElementById("floorSelect");
  floorSelect.innerHTML = '<option value="">Selecione</option>';
  for(let i = 1; i <= 32; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `${i}° Andar`;
    floorSelect.appendChild(option);
  }
}

function populateRoomOptions() {
  const roomSelect = document.getElementById("roomSelect");
  roomSelect.innerHTML = '<option value="">Selecione</option>';
  for(let i = 1; i <= 50; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `SL${String(i).padStart(2, '0')}`;
    roomSelect.appendChild(option);
  }
}

const pad2 = n => String(n).padStart(2,"0");
const formatRoomNumber = n => `SL${String(n).padStart(2, '0')}`;
const statusName = s => s==="valid"?"Validada":s==="lock"?"Trancada":s==="prob"?"Problemas":"Ocupada";
const statusClass = s => s==="valid"?"valid":s==="lock"?"lock":s==="prob"?"prob":"occupied";
const statusEmoji = s => s==="valid"?"✅":s==="lock"?"🔒":s==="prob"?"❌":"🟠";

const floorSelect = document.getElementById("floorSelect");
const roomSelect = document.getElementById("roomSelect");
const dispFloor = document.getElementById("currentDisplayFloor");
const dispRoom = document.getElementById("currentDisplayRoom");
const createdGrid = document.getElementById("createdGrid");
const predioSel = document.getElementById("predio");
const enderecoInp = document.getElementById("endereco");
const auditorInp = document.getElementById("auditor");
const photoInput = document.getElementById("photoInput");
const photoBtn = document.getElementById("photoUploadBtn");
const shareModal = document.getElementById("shareModal");

function updateCurrentDisplay(){
  currentFloor = parseInt(floorSelect.value) || 1;
  currentRoom = parseInt(roomSelect.value) || 1;
  dispFloor.textContent = pad2(currentFloor);
  dispRoom.textContent = formatRoomNumber(currentRoom);
}

floorSelect.addEventListener("change", () => { updateCurrentDisplay(); renderCurrentPhotos(); });
roomSelect.addEventListener("change", () => { updateCurrentDisplay(); renderCurrentPhotos(); });

const roomKey = (f,r)=>`A${pad2(f)}-${formatRoomNumber(r)}`;
const getRoomPhotos = (f,r)=> JSON.parse(localStorage.getItem(`photos_${roomKey(f,r)}`)||"[]");
const saveRoomPhotos= (f,r,arr)=> localStorage.setItem(`photos_${roomKey(f,r)}`, JSON.stringify(arr));

function addPhotoToRoom(f,r,photo){
  const arr = getRoomPhotos(f,r); arr.push(photo); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos();
  showToast("📸 Foto adicionada!");
}

function deletePhotoFromRoom(f,r,idx){
  const arr = getRoomPhotos(f,r); arr.splice(idx,1); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos(); showToast("📸 Foto removida");
}

function renderCurrentPhotos(){
  const gal = document.getElementById("photoGallery");
  const photos = getRoomPhotos(currentFloor,currentRoom);
  if(!photos.length){ gal.innerHTML = '<p class="small">Nenhuma foto</p>'; return; }
  gal.innerHTML = "";
  photos.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="photo-item";
    div.innerHTML = `
      <img src="${p}" onclick="showFullscreenImage('${p}')">
      <div class="photo-delete" onclick="event.stopPropagation(); deletePhotoFromRoom(${currentFloor},${currentRoom},${i})">✕</div>`;
    gal.appendChild(div);
  });
}

function showFullscreenImage(src){ document.getElementById("fullscreenImage").src=src; document.getElementById("fullscreenModal").classList.add("show"); }
function closeFullscreen(){ document.getElementById("fullscreenModal").classList.remove("show"); }
window.deletePhotoFromRoom=deletePhotoFromRoom; window.showFullscreenImage=showFullscreenImage;

document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const status = btn.dataset.status, f=currentFloor, r=currentRoom;
    const idx = entries.findIndex(e=> e.f===f && e.r===r);
    if(idx>=0) entries[idx].status = status; else entries.push({f,r,status});
    persist(); renderCreated(); renderReportWithPhotos();
    showToast(`✅ A${pad2(f)}-${formatRoomNumber(r)}: ${statusName(status)}`);
  });
});

function renderCreated(){
  const sorted = [...entries].sort((a,b)=> a.f-b.f || a.r-b.r);
  document.getElementById("roomsCount").textContent = entries.length;
  if(!sorted.length){ createdGrid.innerHTML='<p class="small">Nenhuma sala registrada</p>'; return; }
  createdGrid.innerHTML = "";
  sorted.forEach(it=>{
    const photos = getRoomPhotos(it.f,it.r), has = photos.length>0;
    const card=document.createElement("div"); card.className = "room-card"+(has?' has-photo':'');
    card.onclick=()=>{ floorSelect.value = it.f; roomSelect.value = it.r; updateCurrentDisplay(); renderCurrentPhotos(); };
    card.innerHTML = `
      <div class="badge">A${pad2(it.f)} • ${formatRoomNumber(it.r)}${has?' 📸':''}</div>
      <div class="pill ${statusClass(it.status)}">${statusEmoji(it.status)} ${statusName(it.status)}</div>
      ${has ? `<div class="photo-indicator">📸 ${photos.length} foto(s)</div>` : ''}`;
    createdGrid.appendChild(card);
  });
}

function renderReportWithPhotos(){
  const predio = predioSel.value || "Não selecionado";
  const endereco = enderecoInp.value || "Não informado";
  const auditor = auditorInp.value || "Não informado";
  const useAI = !!document.getElementById("useAI")?.checked;
  const dataStr = new Date().toLocaleString("pt-BR");

  const stats = {valid:0, lock:0, prob:0, occupied:0};
  const floors = {};
  entries.forEach(e=>{
    stats[e.status] = (stats[e.status]||0)+1;
    if(!floors[e.f]) floors[e.f] = {valid:[], lock:[], prob:[], occupied:[]};
    floors[e.f][e.status].push(e.r);
  });

  const total = entries.length;
  const totalFotos = entries.reduce((acc, e) => acc + getRoomPhotos(e.f, e.r).length, 0);

  let html = `
    <div class="title">📊 ${useAI ? 'Resumo IA' : 'Relatório'}</div>
    <div class="h-line"></div>
    <div class="kvs">
      <div class="kv"><b>Prédio</b><span>${predio}</span></div>
      <div class="kv"><b>Endereço</b><span>${endereco}</span></div>
      <div class="kv"><b>Data</b><span>${dataStr}</span></div>
      <div class="kv"><b>Auditor</b><span>${auditor}</span></div>
    </div>
    <div class="h-line"></div>`;

  if(total > 0){
    const headline = `Vistoria de ${total} sala(s) concluída. ${stats.valid} validações, ${stats.prob} problema(s), ${stats.lock} bloqueio(s) e ${stats.occupied} ocupada(s).`;
    html += `<div class="bullet">${headline}</div><div class="h-line"></div>`;
    
    html += `<div class="title">📈 Indicadores</div><div class="h-line"></div>`;
    html += `<div class="bullet">✅ Validadas: ${stats.valid}</div>`;
    html += `<div class="bullet">🔒 Trancadas: ${stats.lock}</div>`;
    html += `<div class="bullet">❌ Problemas: ${stats.prob}</div>`;
    html += `<div class="bullet">🟠 Ocupadas: ${stats.occupied}</div><div class="h-line"></div>`;
    
    html += `<div class="title">📍 Detalhamento</div><div class="h-line"></div>`;
    Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(f => {
      const a = floors[f];
      const parts = [];
      if(a.valid.length) parts.push(`✅ ${a.valid.length} (${a.valid.sort((x,y)=>x-y).map(r=>formatRoomNumber(r)).join(", ")})`);
      if(a.lock.length) parts.push(`🔒 ${a.lock.length} (${a.lock.sort((x,y)=>x-y).map(r=>formatRoomNumber(r)).join(", ")})`);
      if(a.prob.length) parts.push(`❌ ${a.prob.length} (${a.prob.sort((x,y)=>x-y).map(r=>formatRoomNumber(r)).join(", ")})`);
      if(a.occupied.length) parts.push(`🟠 ${a.occupied.length} (${a.occupied.sort((x,y)=>x-y).map(r=>formatRoomNumber(r)).join(", ")})`);
      html += `<div class="bullet">• Andar ${pad2(f)}: ${parts.join(" | ")}</div>`;
    });
  } else {
    html += `<div class="bullet">Nenhuma sala registrada.</div>`;
  }

  if(totalFotos > 0){
    html += `<div class="h-line"></div><div class="title">📸 Evidências (${totalFotos} foto${totalFotos>1?'s':''})</div><div class="h-line"></div>`;
    entries.forEach(item=>{
      const photos = getRoomPhotos(item.f,item.r);
      if(photos.length){
        html += `<div class="report-room-photos">
          <div class="report-room-title">${statusEmoji(item.status)} A${pad2(item.f)}-${formatRoomNumber(item.r)} — ${statusName(item.status)}</div>
          <div class="report-photo-thumbnails">` + photos.map(p=>`<img src="${p}" class="report-thumb" onclick="showFullscreenImage('${p}')">`).join("") + `</div>
        </div>`;
      }
    });
  }

  document.getElementById("relatorio").innerHTML = html;
}

async function generateImage(){
  const phone = document.getElementById("phoneMock");
  if(!phone){ showToast("Erro"); return null; }
  showToast("📸 Gerando imagem...");
  
  await new Promise(resolve => setTimeout(resolve, 200));
  
  try{
    const canvas = await html2canvas(phone, {
      scale: 2.2,
      backgroundColor: null,
      logging: false,
      useCORS: true,
      allowTaint: false,
      windowWidth: phone.scrollWidth,
      windowHeight: phone.scrollHeight
    });
    return canvas.toDataURL('image/png');
  }catch(e){ 
    showToast("❌ Erro: " + e.message); 
    return null; 
  }
}

async function openShareModal(){ 
  const d = await generateImage(); 
  if(!d) return; 
  currentImageData = d; 
  shareModal.classList.add("show"); 
}

function shareToWhatsApp(){
  if(!currentImageData) return;
  const text = `✨ RELATÓRIO DE VISTORIA ✨\n🏢 ${predioSel.value||"Prédio"}\n👤 ${auditorInp.value||"Auditor"}\n📅 ${new Date().toLocaleString("pt-BR")}\n📊 ${entries.length} sala(s)`;
  if(navigator.share){
    fetch(currentImageData).then(r=>r.blob()).then(b=>{
      navigator.share({title:'Relatório', text, files:[new File([b],"relatorio.png",{type:"image/png"})]});
    }).catch(()=> window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`));
  } else {
    window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`);
  }
  shareModal.classList.remove("show");
}

function shareToTeams(){
  if(!currentImageData) return;
  const msg = `✨ Relatório - ${predioSel.value||"Vistoria"}\n👤 ${auditorInp.value||"Auditor"}\n📊 ${entries.length} sala(s)`;
  navigator.clipboard.writeText(msg);
  showToast("✅ Mensagem copiada!");
  const a = document.createElement('a');
  a.download = `vistoria.png`;
  a.href = currentImageData;
  a.click();
  shareModal.classList.remove("show");
}

function shareToEmail(){
  if(!currentImageData) return;
  const subject = `Relatório - ${predioSel.value||"Vistoria"}`;
  const body = `Relatório gerado em ${new Date().toLocaleString("pt-BR")}\nAuditor: ${auditorInp.value||"Não informado"}\nTotal: ${entries.length} sala(s)`;
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  setTimeout(()=>{ const a=document.createElement('a'); a.download=`vistoria.png`; a.href=currentImageData; a.click(); }, 300);
  shareModal.classList.remove("show");
}

function shareSaveImage(){
  if(!currentImageData) return;
  const a = document.createElement('a');
  a.download = `vistoria_${predioSel.value||"relatorio"}.png`;
  a.href = currentImageData;
  a.click();
  shareModal.classList.remove("show");
  showToast("✅ Imagem salva!");
}

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function showToast(msg){ 
  let t = document.querySelector(".toast"); 
  if(!t){ t = document.createElement("div"); t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg; 
  t.classList.add("show"); 
  setTimeout(()=>t.classList.remove("show"), 2500); 
}

photoBtn.addEventListener("click", ()=> photoInput.click());
photoInput.addEventListener("change",(e)=>{
  [...e.target.files].forEach(file=>{ 
    const rd = new FileReader(); 
    rd.onload = ev => addPhotoToRoom(currentFloor, currentRoom, ev.target.result); 
    rd.readAsDataURL(file); 
  });
  photoInput.value = "";
});

document.getElementById("btnShare").addEventListener("click", openShareModal);
document.getElementById("shareWhatsApp").addEventListener("click", shareToWhatsApp);
document.getElementById("shareTeams").addEventListener("click", shareToTeams);
document.getElementById("shareEmail").addEventListener("click", shareToEmail);
document.getElementById("shareSave").addEventListener("click", shareSaveImage);
document.getElementById("closeModal").addEventListener("click", ()=> shareModal.classList.remove("show"));
shareModal.addEventListener("click",(e)=>{ if(e.target===shareModal) shareModal.classList.remove("show"); });
document.getElementById("useAI").addEventListener("change", renderReportWithPhotos);

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar TODOS os dados?")) return;
  entries = [];
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith("photos_")) localStorage.removeItem(k); }
  auditorInp.value = ""; predioSel.value = ""; enderecoInp.value = "";
  persist(); renderCreated(); renderReportWithPhotos(); renderCurrentPhotos();
  showToast("✓ Dados removidos");
});

predioSel.addEventListener("change", ()=>{
  const v = predioSel.value;
  if(v==="Eco Berrini") enderecoInp.value = "Av. Eng. Luís Carlos Berrini, 1376 - SP";
  else if(v==="Chucri Zaidan") enderecoInp.value = "Av. Dr. Chucri Zaidan, 2460 - SP";
  else enderecoInp.value = "";
  renderReportWithPhotos();
});

(function init(){
  populateFloorOptions();
  populateRoomOptions();
  floorSelect.value = "1";
  roomSelect.value = "1";
  updateCurrentDisplay();
  renderCreated(); renderReportWithPhotos(); renderCurrentPhotos();
})();
</script>
</body>
</html>
