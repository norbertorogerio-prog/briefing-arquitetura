<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Salas Comerciais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .room-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .room-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .room-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }

        .room-details {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .edit-btn, .delete-btn {
            padding: 5px 12px;
            font-size: 0.85rem;
            width: auto;
        }

        .edit-btn {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .delete-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .status.available {
            background: #d4edda;
            color: #155724;
        }

        .status.occupied {
            background: #f8d7da;
            color: #721c24;
        }

        .status.maintenance {
            background: #fff3cd;
            color: #856404;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Gerenciador de Salas Comerciais</h1>
            <p>Adicione e gerencie suas salas de forma eficiente</p>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>➕ Adicionar Nova Sala</h2>
                <form id="roomForm">
                    <div class="form-group">
                        <label for="roomName">Nome da Sala *</label>
                        <input type="text" id="roomName" required placeholder="Ex: Sala 101, Sala Executiva, etc.">
                    </div>
                    
                    <div class="form-group">
                        <label for="roomNumber">Número/Identificador *</label>
                        <input type="text" id="roomNumber" required placeholder="Ex: 101, A-01, SL01">
                    </div>
                    
                    <div class="form-group">
                        <label for="roomFloor">Andar</label>
                        <input type="text" id="roomFloor" placeholder="Ex: 1º Andar, Térreo">
                    </div>
                    
                    <div class="form-group">
                        <label for="roomStatus">Status</label>
                        <select id="roomStatus">
                            <option value="available">✅ Disponível</option>
                            <option value="occupied">🔒 Ocupada</option>
                            <option value="maintenance">🔧 Manutenção</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="roomCapacity">Capacidade (pessoas)</label>
                        <input type="number" id="roomCapacity" placeholder="Ex: 10, 20, 50">
                    </div>
                    
                    <button type="submit">Adicionar Sala</button>
                </form>
            </div>

            <div class="card">
                <h2>📊 Estatísticas</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalRooms">0</div>
                        <div class="stat-label">Total de Salas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="availableRooms">0</div>
                        <div class="stat-label">Disponíveis</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="occupiedRooms">0</div>
                        <div class="stat-label">Ocupadas</div>
                    </div>
                </div>
                
                <h2 style="margin-top: 20px;">📋 Lista de Salas</h2>
                <div class="room-list" id="roomList">
                    <div class="empty-state">
                        Nenhuma sala cadastrada. Adicione sua primeira sala!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rooms = [];

        // Carregar salas do localStorage
        function loadRooms() {
            const savedRooms = localStorage.getItem('commercialRooms');
            if (savedRooms) {
                rooms = JSON.parse(savedRooms);
            }
            updateDisplay();
        }

        // Salvar salas no localStorage
        function saveRooms() {
            localStorage.setItem('commercialRooms', JSON.stringify(rooms));
        }

        // Atualizar exibição
        function updateDisplay() {
            updateRoomList();
            updateStats();
        }

        // Atualizar lista de salas
        function updateRoomList() {
            const roomListElement = document.getElementById('roomList');
            
            if (rooms.length === 0) {
                roomListElement.innerHTML = '<div class="empty-state">✨ Nenhuma sala cadastrada. Adicione sua primeira sala!</div>';
                return;
            }
            
            roomListElement.innerHTML = rooms.map((room, index) => `
                <div class="room-item">
                    <div class="room-info">
                        <div class="room-name">
                            ${room.name || room.number}
                            <span class="status ${room.status}">
                                ${getStatusText(room.status)}
                            </span>
                        </div>
                        <div class="room-details">
                            ${room.number ? `📌 ${room.number}` : ''}
                            ${room.floor ? ` | 🏢 ${room.floor}` : ''}
                            ${room.capacity ? ` | 👥 ${room.capacity} pessoas` : ''}
                        </div>
                    </div>
                    <div class="room-actions">
                        <button class="edit-btn" onclick="editRoom(${index})">✏️ Editar</button>
                        <button class="delete-btn" onclick="deleteRoom(${index})">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        // Obter texto do status
        function getStatusText(status) {
            const statusMap = {
                'available': '✅ Disponível',
                'occupied': '🔒 Ocupada',
                'maintenance': '🔧 Manutenção'
            };
            return statusMap[status] || status;
        }

        // Atualizar estatísticas
        function updateStats() {
            const total = rooms.length;
            const available = rooms.filter(room => room.status === 'available').length;
            const occupied = rooms.filter(room => room.status === 'occupied').length;
            
            document.getElementById('totalRooms').textContent = total;
            document.getElementById('availableRooms').textContent = available;
            document.getElementById('occupiedRooms').textContent = occupied;
        }

        // Adicionar sala
        function addRoom(event) {
            event.preventDefault();
            
            const name = document.getElementById('roomName').value;
            const number = document.getElementById('roomNumber').value;
            const floor = document.getElementById('roomFloor').value;
            const status = document.getElementById('roomStatus').value;
            const capacity = document.getElementById('roomCapacity').value;
            
            if (!name && !number) {
                alert('Por favor, informe pelo menos o nome ou número da sala!');
                return;
            }
            
            const newRoom = {
                id: Date.now(),
                name: name || '',
                number: number || '',
                floor: floor || '',
                status: status,
                capacity: capacity || ''
            };
            
            rooms.push(newRoom);
            saveRooms();
            updateDisplay();
            
            // Limpar formulário
            document.getElementById('roomForm').reset();
            
            // Mensagem de sucesso
            showNotification('Sala adicionada com sucesso!', 'success');
        }

        // Editar sala
        function editRoom(index) {
            const room = rooms[index];
            
            const newName = prompt('Nome da sala:', room.name);
            if (newName !== null) room.name = newName;
            
            const newNumber = prompt('Número/Identificador:', room.number);
            if (newNumber !== null) room.number = newNumber;
            
            const newFloor = prompt('Andar:', room.floor);
            if (newFloor !== null) room.floor = newFloor;
            
            const newStatus = prompt('Status (available/occupied/maintenance):', room.status);
            if (newStatus !== null && ['available', 'occupied', 'maintenance'].includes(newStatus)) {
                room.status = newStatus;
            }
            
            const newCapacity = prompt('Capacidade:', room.capacity);
            if (newCapacity !== null) room.capacity = newCapacity;
            
            saveRooms();
            updateDisplay();
            showNotification('Sala atualizada com sucesso!', 'success');
        }

        // Excluir sala
        function deleteRoom(index) {
            if (confirm('Tem certeza que deseja excluir esta sala?')) {
                rooms.splice(index, 1);
                saveRooms();
                updateDisplay();
                showNotification('Sala excluída com sucesso!', 'success');
            }
        }

        // Mostrar notificação
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#4CAF50' : '#f44336'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Adicionar estilos de animação
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Event listener
        document.getElementById('roomForm').addEventListener('submit', addRoom);
        
        // Inicializar
        loadRooms();
    </script>
</body>
</html>
