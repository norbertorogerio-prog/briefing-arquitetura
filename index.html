<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria Prédio Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0b15;
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#121225;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:none;
  background:#1f1f3a;
  color:#fff;
  font-size:14px;
}

.status{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.status button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:700;
}

.valid{background:#00c853;}
.lock{background:#ffd600;color:#000;}
.prob{background:#ff3b3b;}
.occ{background:#888;}

.btn{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#6A00FF,#9D4DFF);
  color:#fff;
  font-weight:700;
}

/* KPIs */
.kpis{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.kpi{
  flex:1;
  min-width:100px;
  background:#1a1a30;
  padding:15px;
  border-radius:16px;
  text-align:center;
}

.building{
  margin-top:20px;
}

.floor{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}

.floor-number{
  width:40px;
  font-size:12px;
  opacity:.7;
}

.floor-bar{
  flex:1;
  height:12px;
  background:#222;
  border-radius:10px;
  display:flex;
  overflow:hidden;
}

.segment{
  height:100%;
}

.valid-bg{background:#00c853;}
.lock-bg{background:#ffd600;}
.prob-bg{background:#ff3b3b;}
.occ-bg{background:#888;}

</style>
</head>

<body>
<div class="container">

<div class="card">

<h3>Cadastro</h3>

<select id="floor"></select>
<select id="room"></select>

<div class="status">
  <button class="valid" onclick="add('valid')">Validado</button>
  <button class="lock" onclick="add('lock')">Lock</button>
  <button class="prob" onclick="add('prob')">Problema</button>
  <button class="occ" onclick="add('occ')">Ocupado</button>
</div>

<button class="btn" onclick="importar()">📲 Importar</button>

</div>

<div class="card">

<div class="kpis">
  <div class="kpi"><b id="total">0</b><br>Salas</div>
  <div class="kpi"><b id="valid">0</b><br>Validado</div>
  <div class="kpi"><b id="lock">0</b><br>Lock</div>
  <div class="kpi"><b id="prob">0</b><br>Problema</div>
</div>

<div class="building" id="building"></div>

</div>

</div>

<script>

// ===== DATA =====
let data = {};

// ===== POPULAR SELECT =====
for(let i=1;i<=32;i++){
  floor.innerHTML += `<option value="${i}">${String(i).padStart(2,'0')}</option>`;
}

for(let i=1;i<=50;i++){
  room.innerHTML += `<option value="${i}">${String(i).padStart(2,'0')}</option>`;
}

// ===== ADD SALA =====
function add(status){
  const f = floor.value;
  const r = room.value;

  if(!data[f]) data[f] = {};

  // NÃO sobrescreve errado → salva por sala única
  data[f][r] = status;

  render();
}

// ===== RENDER =====
function render(){

  let total=0, v=0, l=0, p=0, o=0;

  let html="";

  for(let f=32; f>=1; f--){

    let floors = data[f] || {};

    let count = {
      valid:0,
      lock:0,
      prob:0,
      occ:0
    };

    Object.values(floors).forEach(s=>{
      total++;
      count[s]++;

      if(s==="valid") v++;
      if(s==="lock") l++;
      if(s==="prob") p++;
      if(s==="occ") o++;
    });

    let sum = Object.values(count).reduce((a,b)=>a+b,0);

    let bar="";

    if(sum>0){
      for(let key in count){
        if(count[key]>0){
          bar += `<div class="segment ${key}-bg" style="width:${(count[key]/sum)*100}%"></div>`;
        }
      }
    }

    html += `
    <div class="floor">
      <div class="floor-number">${String(f).padStart(2,'0')}</div>
      <div class="floor-bar">${bar}</div>
    </div>`;
  }

  building.innerHTML = html;

  document.getElementById("total").innerText = total;
  document.getElementById("valid").innerText = v;
  document.getElementById("lock").innerText = l;
  document.getElementById("prob").innerText = p;
}

// ===== IMPORTAR =====
function importar(){
  const texto = `Relatório:\nTotal salas: ${total.innerText}`;
  navigator.clipboard.writeText(texto);
  alert("Relatório copiado! Cole no Teams / WhatsApp");
}

</script>

</body>
</html>
