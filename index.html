<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Relatório de Vistoria | Vivo (Mapa)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root{
      --bg1:#0F0F1A; --bg2:#1A1A2E;
      --card:rgba(26,26,46,.78);
      --stroke:rgba(102,0,204,.28);
      --purple:#6600CC; --purple2:#4C0099;
      --txt:#fff; --muted:#b7b7c8;

      --ok:#00C853;
      --warn:#FFD600;
      --bad:#FF3B3B;
      --other:#AA00FF;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(135deg,var(--bg2),var(--bg1));
      color:var(--txt);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      min-height:100vh;
      padding:18px;
    }

    .app{max-width:1500px;margin:0 auto;display:grid;gap:16px}
    @media(min-width:1040px){
      .app{grid-template-columns:380px 1fr;align-items:start}
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 26px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }

    h2{
      margin:0 0 14px 0;
      font-weight:800;
      font-size:18px;
      background:linear-gradient(135deg,#6600CC,#8833FF);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      display:inline-block;
    }
    label{
      display:block;
      margin:12px 0 6px;
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.35px;
    }
    .field{
      width:100%;
      border:1.5px solid rgba(102,0,204,.22);
      border-radius:12px;
      background:rgba(255,255,255,.05);
      color:#fff;
      padding:10px 12px;
      font-size:13px;
      outline:none;
      transition:.15s;
    }
    .field:focus{
      border-color:#6600CC;
      box-shadow:0 0 0 3px rgba(102,0,204,.20);
      background:rgba(102,0,204,.10);
    }
    .row{display:flex;gap:10px}
    .row > *{flex:1}

    .status-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .status{
      flex:1;
      min-width:120px;
      border-radius:999px;
      padding:10px 12px;
      cursor:pointer;
      border:1.5px solid rgba(102,0,204,.32);
      background:rgba(102,0,204,.14);
      color:#fff;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.15s;
      user-select:none;
    }
    .status:hover{transform:translateY(-1px);background:rgba(102,0,204,.26)}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.ok{background:var(--ok);box-shadow:0 0 8px rgba(0,200,83,.5)}
    .dot.warn{background:var(--warn);box-shadow:0 0 8px rgba(255,214,0,.45)}
    .dot.bad{background:var(--bad);box-shadow:0 0 8px rgba(255,59,59,.45)}
    .dot.other{background:var(--other);box-shadow:0 0 8px rgba(170,0,255,.45)}

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#6600CC,#4C0099);
      transition:.15s;
      margin-top:12px;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(102,0,204,.25)}
    .btn.ghost{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      font-weight:800;
    }

    /* ===== MAPA ===== */
    .map-wrap{
      display:grid;
      gap:14px;
    }
    .map-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .map-title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .map-title h3{
      margin:0;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.3px;
      color:var(--muted);
    }
    .map-title .meta{
      font-size:12px;
      color:#cfc3ff;
      font-weight:700;
    }

    .legend{
      display:flex;gap:10px;flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }
    .leg{
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .leg i{width:10px;height:10px;border-radius:3px;display:inline-block}

    .map-body{
      display:grid;
      grid-template-columns: 260px 1fr;
      gap:14px;
      align-items:stretch;
    }
    @media(max-width:1039px){
      .map-body{grid-template-columns:1fr}
    }

    .building{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(102,0,204,.25);
      border-radius:16px;
      padding:14px;
      position:relative;
      overflow:hidden;
      min-height:560px;
    }

    /* desenho simples via SVG */
    .building svg{width:100%;height:100%}
    .zones{
      position:absolute;
      left:10px;
      top:14px;
      bottom:14px;
      width:100px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      pointer-events:none;
      opacity:.95;
    }
    .zone{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:10px;
      font-size:11px;
      font-weight:900;
      color:#fff;
      line-height:1.25;
    }
    .zone b{display:block;color:#cfc3ff;margin-top:4px;font-weight:900}

    .gridbox{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(102,0,204,.25);
      border-radius:16px;
      padding:14px;
      overflow:auto;
    }

    .floor-row{
      display:grid;
      grid-template-columns: 64px 1fr;
      gap:10px;
      align-items:center;
      margin-bottom:7px;
    }
    .floor-tag{
      font-size:12px;
      font-weight:900;
      color:#cfc3ff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 6px;
      border-radius:12px;
      background:rgba(102,0,204,.14);
      border:1px solid rgba(102,0,204,.22);
    }

    .cells{
      display:grid;
      gap:7px;
      align-items:center;
    }

    .cell{
      height:30px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      box-shadow:0 2px 8px rgba(0,0,0,.18);
      transition:.12s;
      white-space:nowrap;
    }
    .cell:hover{transform:translateY(-1px);filter:brightness(1.06)}
    .cell.empty{
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:rgba(255,255,255,.22);
      box-shadow:none;
      cursor:default;
    }

    /* cores por status */
    .s-ok{background:rgba(0,200,83,.80)}
    .s-warn{background:rgba(255,214,0,.85); color:#1A1A2E}
    .s-bad{background:rgba(255,59,59,.82)}
    .s-other{background:rgba(170,0,255,.75)}

    .cell.active{
      outline:3px solid rgba(255,255,255,.35);
      transform:translateY(-1px);
    }

    .toast{
      position:fixed;right:16px;bottom:16px;
      background:rgba(102,0,204,.95);
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      opacity:0;
      transform:translateY(8px);
      transition:.18s;
      pointer-events:none;
      z-index:9999;
    }
    .toast.show{opacity:1;transform:translateY(0)}
    .small{margin-top:10px;font-size:11px;color:#aab;text-align:center}
  </style>
</head>

<body>
<div class="app">

  <!-- CONTROLE -->
  <div class="card">
    <h2>✨ Vistoria Técnica</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="field" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="field" placeholder="Automático" />

    <div class="row">
      <div>
        <label>🏬 Andar</label>
        <select id="floorInput" class="field"></select>
      </div>
      <div>
        <label>🚪 Sala</label>
        <select id="roomInput" class="field"></select>
      </div>
    </div>

    <label>📌 Status</label>
    <div class="status-strip">
      <div class="status" data-status="valid"><span class="dot ok"></span>Validada</div>
      <div class="status" data-status="lock"><span class="dot warn"></span>Trancada</div>
      <div class="status" data-status="prob"><span class="dot bad"></span>Problemas</div>
      <div class="status" data-status="other"><span class="dot other"></span>Outros</div>
    </div>

    <button id="btnPng" class="btn">📸 Salvar PNG do Mapa</button>
    <button id="btnClear" class="btn ghost">🗑️ Limpar Tudo</button>

    <p class="small">💡 Selecione andar/sala e clique no status → aparece no mapa</p>
  </div>

  <!-- MAPA -->
  <div class="card map-wrap" id="mapCapture">
    <div class="map-header">
      <div class="map-title">
        <h3>📋 Relatório – Mapa do Prédio</h3>
        <div class="meta" id="metaLine">Aguardando...</div>
      </div>

      <div class="legend">
        <span class="leg"><i style="background:rgba(0,200,83,.85)"></i>Validada</span>
        <span class="leg"><i style="background:rgba(255,214,0,.90)"></i>Trancada</span>
        <span class="leg"><i style="background:rgba(255,59,59,.85)"></i>Problemas</span>
        <span class="leg"><i style="background:rgba(170,0,255,.80)"></i>Outros</span>
      </div>
    </div>

    <div class="map-body">
      <div class="building">
        <div class="zones">
          <div class="zone">
            Zona Alta
            <b>(Pisos 16 a 32)</b>
          </div>
          <div class="zone">
            Zona Baixa
            <b>(Pisos 01 a 15)</b>
          </div>
        </div>

        <!-- Desenho simples do prédio (estilo ícone) -->
        <svg viewBox="0 0 280 520" aria-label="Prédio">
          <defs>
            <linearGradient id="g1" x1="0" x2="1">
              <stop offset="0" stop-color="rgba(255,255,255,.18)"/>
              <stop offset="1" stop-color="rgba(255,255,255,.05)"/>
            </linearGradient>
          </defs>

          <!-- base -->
          <rect x="40" y="420" width="200" height="70" rx="10" fill="url(#g1)" stroke="rgba(255,255,255,.22)" stroke-width="2"/>
          <rect x="60" y="438" width="40" height="36" rx="6" fill="rgba(0,0,0,.20)" stroke="rgba(255,255,255,.18)" />
          <rect x="180" y="438" width="40" height="36" rx="6" fill="rgba(0,0,0,.20)" stroke="rgba(255,255,255,.18)" />

          <!-- torre -->
          <rect x="90" y="60" width="100" height="360" rx="12" fill="url(#g1)" stroke="rgba(255,255,255,.24)" stroke-width="2"/>

          <!-- janelas -->
          <g fill="rgba(0,0,0,.25)" stroke="rgba(255,255,255,.12)">
            <!-- 14 linhas -->
            <script type="application/ecmascript"><![CDATA[
              // (SVG estático; janelas desenhadas via JS abaixo no init)
            ]]></script>
          </g>

          <!-- contorno lateral -->
          <path d="M90 80 L65 110 L65 420 L90 420" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4"/>
          <path d="M190 80 L215 110 L215 420 L190 420" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4"/>
        </svg>
      </div>

      <div class="gridbox">
        <div id="grid"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ===== Modelo (EDITE CONFORME ANEXO) =====
   - Andares e salas com 2 dígitos: "01".."32"
   - Cada andar tem lista de salas disponíveis (colunas do mapa) */
const PREDIOS_MODEL = {
  "Eco Berrini": {
    endereco: "Av. Eng. Luís Carlos Berrini, 1376 - SP",
    andares: {
      "01": ["01","02","03","04","05","06","07","08","09","10","11","12","13","14","15"],
      "02": ["01","02","03","04","05","06","07","08","09","10","11","12","13","14","15"],
      "03": ["01","02","03","04","05","06","07","08","09","10","11","12","13","14","15"],
      // ... até 32
      "32": ["01","02","03","04","05","06","07","08","09","10","11","12","13","14","15"]
    }
  },
  "Chucri Zaidan": {
    endereco: "Av. Dr. Chucri Zaidan, 2460 - SP",
    andares: {
      "01": ["01","02","03","04","05","06","07","08","09","10","11","12","13"],
      "02": ["01","02","03","04","05","06","07","08","09","10","11","12","13"],
      "03": ["01","02","03","04","05","06","07","08","09","10","11","12","13"],
      // ... até 32
      "32": ["01","02","03","04","05","06","07","08","09","10","11","12","13"]
    }
  }
};

/* ===== Estado ===== */
const STORAGE_KEY = "vistoria_map_v1";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

let currentFloor = "01";
let currentRoom  = "01";

/* ===== DOM ===== */
const auditorInp = document.getElementById("auditor");
const predioSel  = document.getElementById("predio");
const endInp     = document.getElementById("endereco");
const floorSel   = document.getElementById("floorInput");
const roomSel    = document.getElementById("roomInput");
const gridEl     = document.getElementById("grid");
const metaLine   = document.getElementById("metaLine");
const toastEl    = document.getElementById("toast");

/* ===== Helpers ===== */
const pad2 = n => String(n).padStart(2,"0");

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"), 2000);
}

function persist(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function statusToClass(s){
  if(s==="valid") return "s-ok";
  if(s==="lock")  return "s-warn";
  if(s==="prob")  return "s-bad";
  return "s-other";
}

function statusToName(s){
  if(s==="valid") return "Validada";
  if(s==="lock")  return "Trancada";
  if(s==="prob")  return "Problemas";
  return "Outros";
}

function getModel(){
  return PREDIOS_MODEL[predioSel.value] || null;
}

function setOptions(selectEl, arr, keep){
  selectEl.innerHTML = "";
  (arr||[]).forEach(v=>{
    const o=document.createElement("option");
    o.value=v; o.textContent=v;
    selectEl.appendChild(o);
  });
  if(keep && arr.includes(keep)) selectEl.value = keep;
  else selectEl.value = arr[0] || "01";
}

function refreshSelectors(keepFloor, keepRoom){
  const m = getModel();
  if(!m){
    endInp.value = "";
    setOptions(floorSel, ["01"], "01");
    setOptions(roomSel,  ["01"], "01");
    currentFloor="01"; currentRoom="01";
    render();
    return;
  }

  endInp.value = m.endereco || "";
  const floors = Object.keys(m.andares||{}).sort((a,b)=>parseInt(a)-parseInt(b));
  setOptions(floorSel, floors.length?floors:["01"], keepFloor);

  const rooms = (m.andares[floorSel.value] || ["01"]).slice().sort((a,b)=>parseInt(a)-parseInt(b));
  setOptions(roomSel, rooms, keepRoom);

  currentFloor = floorSel.value;
  currentRoom  = roomSel.value;

  render();
}

function entryIndex(floor, room){
  return entries.findIndex(e => e.predio===predioSel.value && e.floor===floor && e.room===room);
}

/* ===== Render do MAPA (estilo da imagem) ===== */
function render(){
  const predio = predioSel.value || "Não selecionado";
  const auditor = auditorInp.value || "Não informado";
  const dataStr = new Date().toLocaleString("pt-BR");
  metaLine.textContent = `🏢 ${predio}  •  👤 ${auditor}  •  🕒 ${dataStr}  •  📌 Registros: ${entries.filter(e=>e.predio===predioSel.value).length}`;

  const m = getModel();
  if(!m){
    gridEl.innerHTML = `<div style="color:#9aa;font-weight:800">Selecione um prédio para carregar o mapa.</div>`;
    return;
  }

  // Descobre maior quantidade de salas (colunas) para padronizar a grade
  const floors = Object.keys(m.andares).map(x=>parseInt(x)).sort((a,b)=>b-a); // 32..1
  let maxCols = 1;
  floors.forEach(f=>{
    const arr = m.andares[pad2(f)] || [];
    if(arr.length > maxCols) maxCols = arr.length;
  });

  // Monta cada andar
  let html = "";
  floors.forEach(f=>{
    const f2 = pad2(f);
    const rooms = (m.andares[f2] || []).slice().sort((a,b)=>parseInt(a)-parseInt(b));

    html += `<div class="floor-row">
      <div class="floor-tag">${f2}</div>
      <div class="cells" style="grid-template-columns: repeat(${maxCols}, minmax(86px, 1fr));">`;

    // Para cada coluna, desenha sala se existir, senão vazio
    for(let i=0;i<maxCols;i++){
      const r = rooms[i];
      if(!r){
        html += `<div class="cell empty">—</div>`;
        continue;
      }

      // procura status salvo
      const idx = entries.findIndex(e => e.predio===predioSel.value && e.floor===f2 && e.room===r);
      const st = idx>=0 ? entries[idx].status : null;

      const cls = st ? statusToClass(st) : "empty";
      const active = (currentFloor===f2 && currentRoom===r) ? "active" : "";
      const label = `${f2}-S${r}`;

      html += `<div class="cell ${st?cls:"empty"} ${active}" data-floor="${f2}" data-room="${r}" title="${label}${st?(" — "+statusToName(st)):""}">${label}</div>`;
    }

    html += `</div></div>`;
  });

  gridEl.innerHTML = html;

  // clique em célula para selecionar
  gridEl.querySelectorAll(".cell").forEach(c=>{
    if(c.classList.contains("empty") && !c.dataset.floor) return;
    c.addEventListener("click", ()=>{
      if(!c.dataset.floor) return;
      currentFloor = c.dataset.floor;
      currentRoom  = c.dataset.room;
      floorSel.value = currentFloor;

      // ao trocar andar, atualiza salas
      const rooms = (m.andares[currentFloor] || ["01"]).slice().sort((a,b)=>parseInt(a)-parseInt(b));
      setOptions(roomSel, rooms, currentRoom);

      render();
    });
  });
}

/* ===== Ações ===== */
predioSel.addEventListener("change", ()=> refreshSelectors(currentFloor, currentRoom));
floorSel.addEventListener("change", ()=>{
  const m=getModel(); if(!m) return;
  currentFloor = floorSel.value;
  const rooms = (m.andares[currentFloor] || ["01"]).slice().sort((a,b)=>parseInt(a)-parseInt(b));
  setOptions(roomSel, rooms, rooms[0] || "01");
  currentRoom = roomSel.value;
  render();
});
roomSel.addEventListener("change", ()=>{ currentRoom = roomSel.value; render(); });

document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const st = btn.dataset.status;
    const pred = predioSel.value;
    if(!pred) return showToast("Selecione o prédio primeiro.");

    const idx = entryIndex(currentFloor, currentRoom);
    const obj = { predio: pred, floor: currentFloor, room: currentRoom, status: st };

    if(idx>=0) entries[idx] = obj;
    else entries.push(obj);

    persist();
    render();
    showToast(`✓ ${currentFloor}-S${currentRoom}: ${statusToName(st)}`);
  });
});

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar todos os registros?")) return;
  entries = [];
  persist();
  render();
  showToast("✓ Dados removidos");
});

document.getElementById("btnPng").addEventListener("click", async ()=>{
  const el = document.getElementById("mapCapture");
  showToast("📸 Gerando PNG...");
  try{
    const canvas = await html2canvas(el, {scale:2, backgroundColor:null, useCORS:true});
    const data = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    const pred = predioSel.value || "predio";
    const ts = new Date().toISOString().slice(0,19).replace(/:/g,"-");
    a.download = `mapa_vistoria_${pred}_${ts}.png`;
    a.href = data;
    a.click();
    showToast("✅ PNG salvo!");
  }catch(e){
    showToast("❌ Falha ao gerar PNG");
  }
});

/* ===== Boot ===== */
(function init(){
  refreshSelectors("01","01");
})();
</script>
</body>
</html>
