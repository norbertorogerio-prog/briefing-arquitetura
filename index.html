<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Relatório de Vistoria | Vivo (32 andares)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root{
      --bg1:#0F0F1A; --bg2:#1A1A2E;
      --card:rgba(26,26,46,.78);
      --stroke:rgba(102,0,204,.28);
      --purple:#6600CC; --purple2:#4C0099;
      --txt:#fff; --muted:#b7b7c8;

      --ok:#00C853;
      --warn:#FFD600;
      --bad:#FF3B3B;
      --other:#AA00FF;

      --shadow:0 10px 26px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(135deg,var(--bg2),var(--bg1));
      color:var(--txt);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      min-height:100vh;
      padding:18px;
    }
    .app{max-width:1500px;margin:0 auto;display:grid;gap:16px}
    @media(min-width:1040px){
      .app{grid-template-columns:380px 1fr;align-items:start}
    }
    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }
    h2{
      margin:0 0 14px 0;
      font-weight:800;
      font-size:18px;
      background:linear-gradient(135deg,#6600CC,#8833FF);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      display:inline-block;
    }
    label{
      display:block;
      margin:12px 0 6px;
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.35px;
    }
    .field{
      width:100%;
      border:1.5px solid rgba(102,0,204,.22);
      border-radius:12px;
      background:rgba(255,255,255,.05);
      color:#fff;
      padding:10px 12px;
      font-size:13px;
      outline:none;
      transition:.15s;
    }
    .field:focus{
      border-color:#6600CC;
      box-shadow:0 0 0 3px rgba(102,0,204,.20);
      background:rgba(102,0,204,.10);
    }
    .row{display:flex;gap:10px}
    .row > *{flex:1}

    .status-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .status{
      flex:1;
      min-width:120px;
      border-radius:999px;
      padding:10px 12px;
      cursor:pointer;
      border:1.5px solid rgba(102,0,204,.32);
      background:rgba(102,0,204,.14);
      color:#fff;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.15s;
      user-select:none;
    }
    .status:hover{transform:translateY(-1px);background:rgba(102,0,204,.26)}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.ok{background:var(--ok);box-shadow:0 0 8px rgba(0,200,83,.5)}
    .dot.warn{background:var(--warn);box-shadow:0 0 8px rgba(255,214,0,.45)}
    .dot.bad{background:var(--bad);box-shadow:0 0 8px rgba(255,59,59,.45)}
    .dot.other{background:var(--other);box-shadow:0 0 8px rgba(170,0,255,.45)}

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#6600CC,#4C0099);
      transition:.15s;
      margin-top:12px;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(102,0,204,.25)}
    .btn.ghost{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      font-weight:800;
    }

    /* ===== RELATÓRIO (prédio + lista 32 andares) ===== */
    .report-wrap{display:grid;gap:14px}
    .report-header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap
    }
    .report-title{display:flex;flex-direction:column;gap:6px}
    .report-title h3{
      margin:0;font-size:14px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)
    }
    .report-title .meta{font-size:12px;color:#cfc3ff;font-weight:700;line-height:1.35}

    .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .leg{
      display:inline-flex;gap:8px;align-items:center;font-size:12px;font-weight:800;
      padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .leg i{width:10px;height:10px;border-radius:3px;display:inline-block}

    .report-body{
      display:grid;
      grid-template-columns: 300px 1fr;
      gap:14px;
      align-items:stretch;
    }
    @media(max-width:1039px){
      .report-body{grid-template-columns:1fr}
    }

    .building{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(102,0,204,.25);
      border-radius:16px;
      padding:14px;
      position:relative;
      min-height:720px;
      overflow:hidden;
    }

    /* silhueta do prédio */
    .building .silhouette{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:14px;
      width:220px;
      height:660px;
      opacity:.95;
      pointer-events:none;
      z-index:1;
    }

    /* grade interna (32 andares) para marcar “tem vistoria” */
    .floors-overlay{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:70px;
      width:170px;
      height:520px;
      display:grid;
      grid-template-rows:repeat(32, 1fr);
      gap:2px;
      z-index:2;
      pointer-events:none;
    }
    .floor-slot{
      border-radius:4px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      position:relative;
      overflow:hidden;
    }
    .floor-slot.has::before{
      content:"";
      position:absolute; inset:0;
      background:rgba(102,0,204,.18);
    }
    .floor-slot.has::after{
      content:"";
      position:absolute; right:6px; top:50%;
      transform:translateY(-50%);
      width:10px;height:10px;border-radius:50%;
      background:rgba(255,255,255,.45);
      box-shadow:0 0 10px rgba(255,255,255,.22);
    }

    .zones{
      position:absolute;
      left:14px;
      top:14px;
      bottom:14px;
      width:120px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      pointer-events:none;
      z-index:3;
      opacity:.96;
    }
    .zone{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:10px;
      font-size:11px;
      font-weight:900;
      color:#fff;
      line-height:1.25;
    }
    .zone b{display:block;color:#cfc3ff;margin-top:4px;font-weight:900}

    .floors-list{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(102,0,204,.25);
      border-radius:16px;
      padding:14px;
      overflow:auto;
      max-height:720px;
    }

    .floor-line{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      margin-bottom:10px;
    }
    .floor-line:hover{border-color:rgba(102,0,204,.35);background:rgba(102,0,204,.10)}
    .floor-badge{
      min-width:92px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(102,0,204,.14);
      border:1px solid rgba(102,0,204,.22);
      color:#cfc3ff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .chips{display:flex;flex-wrap:wrap;gap:8px;flex:1}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 2px 10px rgba(0,0,0,.18);
      user-select:none;
      transition:.12s;
      white-space:nowrap;
    }
    .chip:hover{transform:translateY(-1px);filter:brightness(1.04)}
    .chip .mini{width:9px;height:9px;border-radius:3px;display:inline-block}
    .chip.ok{background:rgba(0,200,83,.80)}
    .chip.ok .mini{background:rgba(0,0,0,.35)}
    .chip.warn{background:rgba(255,214,0,.88); color:#1A1A2E}
    .chip.warn .mini{background:rgba(0,0,0,.35)}
    .chip.bad{background:rgba(255,59,59,.82)}
    .chip.bad .mini{background:rgba(255,255,255,.35)}
    .chip.other{background:rgba(170,0,255,.75)}
    .chip.other .mini{background:rgba(255,255,255,.35)}

    .chip.active{
      outline:3px solid rgba(255,255,255,.35);
      transform:translateY(-1px);
    }

    .empty-floor{
      color:rgba(255,255,255,.35);
      font-weight:800;
      font-size:12px;
      padding:4px 0;
    }

    .toast{
      position:fixed;right:16px;bottom:16px;
      background:rgba(102,0,204,.95);
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      opacity:0;
      transform:translateY(8px);
      transition:.18s;
      pointer-events:none;
      z-index:9999;
    }
    .toast.show{opacity:1;transform:translateY(0)}
    .small{margin-top:10px;font-size:11px;color:#aab;text-align:center}
  </style>
</head>

<body>
<div class="app">

  <!-- CONTROLE -->
  <div class="card">
    <h2>✨ Vistoria Técnica</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="field" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="field" placeholder="Automático"/>

    <div class="row">
      <div>
        <label>🏬 Andar</label>
        <select id="floorInput" class="field"></select>
      </div>
      <div>
        <label>🚪 Sala</label>
        <select id="roomInput" class="field"></select>
      </div>
    </div>

    <label>📌 Status</label>
    <div class="status-strip">
      <div class="status" data-status="valid"><span class="dot ok"></span>Validada</div>
      <div class="status" data-status="lock"><span class="dot warn"></span>Trancada</div>
      <div class="status" data-status="prob"><span class="dot bad"></span>Problemas</div>
      <div class="status" data-status="other"><span class="dot other"></span>Outros</div>
    </div>

    <button id="btnPng" class="btn">📸 Salvar PNG do Relatório</button>
    <button id="btnClear" class="btn ghost">🗑️ Limpar Tudo</button>

    <p class="small">💡 Vai ficar: <b>Andar 32º</b> → <b>SL-10</b> / <b>SL-13</b> / ...</p>
  </div>

  <!-- RELATÓRIO -->
  <div class="card report-wrap" id="reportCapture">
    <div class="report-header">
      <div class="report-title">
        <h3>📋 Relatório – Prédio (32 andares)</h3>
        <div class="meta" id="metaLine">Aguardando...</div>
      </div>
      <div class="legend">
        <span class="leg"><i style="background:rgba(0,200,83,.85)"></i>Validada</span>
        <span class="leg"><i style="background:rgba(255,214,0,.90)"></i>Trancada</span>
        <span class="leg"><i style="background:rgba(255,59,59,.85)"></i>Problemas</span>
        <span class="leg"><i style="background:rgba(170,0,255,.80)"></i>Outros</span>
      </div>
    </div>

    <div class="report-body">
      <!-- DESENHO DO PRÉDIO -->
      <div class="building">
        <div class="zones">
          <div class="zone">Zona Alta<b>(Pisos 16 a 32)</b></div>
          <div class="zone">Zona Baixa<b>(Pisos 01 a 15)</b></div>
        </div>

        <!-- Silhueta -->
        <svg class="silhouette" viewBox="0 0 220 660" aria-hidden="true">
          <defs>
            <linearGradient id="gg" x1="0" x2="1">
              <stop offset="0" stop-color="rgba(255,255,255,.16)"/>
              <stop offset="1" stop-color="rgba(255,255,255,.05)"/>
            </linearGradient>
          </defs>
          <!-- base -->
          <rect x="20" y="570" width="180" height="70" rx="12" fill="url(#gg)" stroke="rgba(255,255,255,.20)" stroke-width="2"/>
          <rect x="38" y="590" width="42" height="36" rx="8" fill="rgba(0,0,0,.22)" stroke="rgba(255,255,255,.12)"/>
          <rect x="140" y="590" width="42" height="36" rx="8" fill="rgba(0,0,0,.22)" stroke="rgba(255,255,255,.12)"/>
          <!-- torre -->
          <rect x="60" y="40" width="100" height="530" rx="14" fill="url(#gg)" stroke="rgba(255,255,255,.22)" stroke-width="2"/>
          <!-- laterais -->
          <path d="M60 70 L35 105 L35 570 L60 570" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4"/>
          <path d="M160 70 L185 105 L185 570 L160 570" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4"/>
          <text x="110" y="650" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle">VIVO</text>
        </svg>

        <!-- 32 slots (marca se tem vistoria naquele andar) -->
        <div class="floors-overlay" id="floorsOverlay"></div>
      </div>

      <!-- LISTA ANDARES -->
      <div class="floors-list" id="floorsList"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ===== Modelo: 32 andares fixos + qtd salas por prédio ===== */
const PREDIOS_MODEL = {
  "Eco Berrini": { endereco:"Av. Eng. Luís Carlos Berrini, 1376 - SP", maxSalas: 15 },
  "Chucri Zaidan": { endereco:"Av. Dr. Chucri Zaidan, 2460 - SP", maxSalas: 13 }
};

/* ===== Estado ===== */
const STORAGE_KEY = "vistoria_predio_32_v1";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

let currentFloor = "01";
let currentRoom  = "01";

/* ===== DOM ===== */
const auditorInp = document.getElementById("auditor");
const predioSel  = document.getElementById("predio");
const endInp     = document.getElementById("endereco");
const floorSel   = document.getElementById("floorInput");
const roomSel    = document.getElementById("roomInput");
const metaLine   = document.getElementById("metaLine");
const toastEl    = document.getElementById("toast");

const floorsOverlay = document.getElementById("floorsOverlay");
const floorsList    = document.getElementById("floorsList");

/* ===== Helpers ===== */
const pad2 = n => String(n).padStart(2,"0");

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"), 2000);
}
function persist(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function statusToKey(s){
  if(s==="valid") return "ok";
  if(s==="lock") return "warn";
  if(s==="prob") return "bad";
  return "other";
}
function statusToName(s){
  if(s==="valid") return "Validada";
  if(s==="lock") return "Trancada";
  if(s==="prob") return "Problemas";
  return "Outros";
}

/* retorna “Andar 32º” */
function floorLabel(f2){
  const n = parseInt(f2,10);
  return `Andar ${n}º`;
}

/* lista de andares 01..32 */
const FLOORS_32 = Array.from({length:32}, (_,i)=>pad2(i+1));

function setOptions(selectEl, arr, keep){
  selectEl.innerHTML = "";
  arr.forEach(v=>{
    const o=document.createElement("option");
    o.value=v; o.textContent=v;
    selectEl.appendChild(o);
  });
  selectEl.value = (keep && arr.includes(keep)) ? keep : (arr[0] || "01");
}

function refreshSelectors(){
  const pred = predioSel.value;
  if(!pred){
    endInp.value="";
    setOptions(floorSel, FLOORS_32, "01");
    setOptions(roomSel, ["01"], "01");
    currentFloor="01"; currentRoom="01";
    render();
    return;
  }

  endInp.value = PREDIOS_MODEL[pred].endereco || "";

  setOptions(floorSel, FLOORS_32, currentFloor);

  const max = PREDIOS_MODEL[pred].maxSalas || 15;
  const rooms = Array.from({length:max},(_,i)=>pad2(i+1));
  setOptions(roomSel, rooms, currentRoom);

  currentFloor = floorSel.value;
  currentRoom  = roomSel.value;

  render();
}

function entryIndex(pred, floor, room){
  return entries.findIndex(e => e.predio===pred && e.floor===floor && e.room===room);
}

/* ===== Render principal ===== */
function render(){
  const predio = predioSel.value || "Não selecionado";
  const auditor = auditorInp.value || "Não informado";
  const dataStr = new Date().toLocaleString("pt-BR");

  const predEntries = entries.filter(e=>e.predio===predioSel.value);
  metaLine.innerHTML = `🏢 <b>${predio}</b> &nbsp;•&nbsp; 👤 <b>${auditor}</b> &nbsp;•&nbsp; 🕒 <b>${dataStr}</b><br>📌 Registros: <b>${predEntries.length}</b>`;

  // overlay (32 slots)
  floorsOverlay.innerHTML = "";
  // slots são desenhados do topo (andar 32) ao fundo (andar 01)
  const floorsDesc = [...FLOORS_32].sort((a,b)=>parseInt(b)-parseInt(a));
  floorsDesc.forEach(f2=>{
    const has = predEntries.some(e=>e.floor===f2);
    const div = document.createElement("div");
    div.className = "floor-slot" + (has ? " has" : "");
    floorsOverlay.appendChild(div);
  });

  // lista de andares (Andar 32º -> SL-xx)
  if(!predioSel.value){
    floorsList.innerHTML = `<div style="color:#9aa;font-weight:800">Selecione um prédio para montar o relatório.</div>`;
    return;
  }

  // agrupa por andar
  const byFloor = {};
  predEntries.forEach(e=>{
    if(!byFloor[e.floor]) byFloor[e.floor]=[];
    byFloor[e.floor].push(e);
  });

  let html = "";
  floorsDesc.forEach(f2=>{
    const items = (byFloor[f2] || []).slice().sort((a,b)=>parseInt(a.room)-parseInt(b.room));
    html += `<div class="floor-line">
      <div class="floor-badge">${floorLabel(f2)}</div>
      <div class="chips">`;

    if(!items.length){
      html += `<div class="empty-floor">— sem registro</div>`;
    }else{
      items.forEach(it=>{
        const sKey = statusToKey(it.status);
        const active = (currentFloor===it.floor && currentRoom===it.room) ? "active" : "";
        html += `<div class="chip ${sKey} ${active}" data-floor="${it.floor}" data-room="${it.room}" data-status="${it.status}" title="${floorLabel(it.floor)} • SL-${it.room} • ${statusToName(it.status)}">
          <span class="mini"></span> SL-${it.room}
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  floorsList.innerHTML = html;

  // clique no chip seleciona no formulário
  floorsList.querySelectorAll(".chip").forEach(ch=>{
    ch.addEventListener("click", ()=>{
      currentFloor = ch.dataset.floor;
      currentRoom  = ch.dataset.room;
      floorSel.value = currentFloor;
      roomSel.value  = currentRoom;
      render();
      showToast(`📍 Selecionado: ${floorLabel(currentFloor)} • SL-${currentRoom}`);
    });
  });
}

/* ===== Eventos ===== */
predioSel.addEventListener("change", ()=>{
  // reset básico ao trocar prédio
  currentFloor = "01";
  currentRoom  = "01";
  refreshSelectors();
});

floorSel.addEventListener("change", ()=>{
  currentFloor = floorSel.value;
  render();
});
roomSel.addEventListener("change", ()=>{
  currentRoom = roomSel.value;
  render();
});

document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const pred = predioSel.value;
    if(!pred) return showToast("Selecione o prédio primeiro.");

    const st = btn.dataset.status;
    const idx = entryIndex(pred, currentFloor, currentRoom);
    const obj = { predio: pred, floor: currentFloor, room: currentRoom, status: st };

    if(idx>=0) entries[idx] = obj;
    else entries.push(obj);

    persist();
    render();
    showToast(`✓ ${floorLabel(currentFloor)} • SL-${currentRoom}: ${statusToName(st)}`);
  });
});

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar todos os registros?")) return;
  entries = [];
  persist();
  render();
  showToast("✓ Dados removidos");
});

document.getElementById("btnPng").addEventListener("click", async ()=>{
  const el = document.getElementById("reportCapture");
  showToast("📸 Gerando PNG...");
  try{
    const canvas = await html2canvas(el, {scale:2, backgroundColor:null, useCORS:true});
    const data = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    const pred = predioSel.value || "predio";
    const ts = new Date().toISOString().slice(0,19).replace(/:/g,"-");
    a.download = `relatorio_predio_32_${pred}_${ts}.png`;
    a.href = data;
    a.click();
    showToast("✅ PNG salvo!");
  }catch(e){
    showToast("❌ Falha ao gerar PNG");
  }
});

/* ===== Boot ===== */
(function init(){
  // inicia com selects padrão (sem prédio selecionado)
  setOptions(floorSel, FLOORS_32, "01");
  setOptions(roomSel, ["01"], "01");
  render();
})();
</script>
</body>
</html>
