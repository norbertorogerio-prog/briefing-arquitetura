<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relatório Executivo | VIVO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --purple:#6600CC;
  --bg:#0f0f1a;
  --card:#1a1a2e;
  --text:#fff;
  --muted:#aaa;
  --green:#00C853;
  --red:#FF3B3B;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0b0b12;
  color:#fff;
  font-family:'Inter',sans-serif;
  padding:20px;
}

/* ===== LAYOUT ===== */
.container{
  display:grid;
  grid-template-columns: 360px 1fr;
  gap:20px;
}

/* ===== FORM ===== */
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

input,select{
  width:100%;
  margin-top:6px;
  margin-bottom:12px;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

/* ===== BOARD ===== */
.board{
  background:var(--bg);
  border-radius:16px;
  padding:24px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:800;
}

.meta{
  font-size:12px;
  color:var(--muted);
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:12px;
  margin-bottom:20px;
}

.kpi{
  background:#151526;
  border-radius:12px;
  padding:14px;
  text-align:center;
}

.kpi .v{
  font-size:20px;
  font-weight:800;
}

.kpi .l{
  font-size:11px;
  color:var(--muted);
}

/* BLOCKS */
.block{
  margin-top:16px;
}

.block h3{
  font-size:13px;
  margin-bottom:6px;
  color:#bbb;
}

.text{
  font-size:13px;
  line-height:1.6;
}

/* PHOTOS */
.photo{
  width:100%;
  margin-top:8px;
  border-radius:10px;
}

/* BUTTON */
.btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--purple);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- ESQUERDA -->
<div class="card">

<label>Auditor</label>
<input id="auditor">

<label>Prédio</label>
<input id="predio">

<label>Endereço</label>
<input id="endereco">

<label>Andar</label>
<input id="andar" type="number">

<label>Sala</label>
<input id="sala" type="number">

<select id="status">
<option value="valid">Validada</option>
<option value="prob">Problema</option>
<option value="lock">Trancada</option>
</select>

<button class="btn" onclick="add()">Adicionar</button>
<button class="btn" onclick="exportPNG()">Exportar PNG</button>

</div>

<!-- DIREITA -->
<div id="board" class="board">

<div class="header">
  <div>
    <div class="title">Relatório Executivo</div>
    <div id="meta" class="meta"></div>
  </div>
</div>

<div id="kpis" class="kpis"></div>

<div id="resumo" class="block"></div>
<div id="detalhe" class="block"></div>
<div id="fotos" class="block"></div>

</div>

</div>

<script>

let data=[];

function add(){
  const item={
    a:andar.value,
    s:sala.value,
    st:status.value
  };
  data.push(item);
  render();
}

function render(){

  let total=data.length;
  let prob=data.filter(x=>x.st=="prob").length;
  let valid=data.filter(x=>x.st=="valid").length;

  let score = total ? Math.round((valid/total)*100) : 0;

  meta.innerText = `${predio.value} • ${new Date().toLocaleString()} • ${auditor.value}`;

  kpis.innerHTML=`
  <div class="kpi"><div class="v">${total}</div><div class="l">Salas</div></div>
  <div class="kpi"><div class="v">${valid}</div><div class="l">OK</div></div>
  <div class="kpi"><div class="v">${prob}</div><div class="l">Problemas</div></div>
  <div class="kpi"><div class="v">${score}%</div><div class="l">Saúde</div></div>
  <div class="kpi"><div class="v">${total>0?"Ativo":"-"}</div><div class="l">Status</div></div>
  `;

  resumo.innerHTML=`
  <h3>Resumo Executivo</h3>
  <div class="text">
  Foram avaliadas ${total} salas. 
  ${prob>0 ? `Identificados ${prob} pontos críticos.` : "Nenhum problema relevante."}
  Score geral: ${score}%.
  </div>
  `;

  detalhe.innerHTML=`<h3>Detalhamento</h3>`+
  data.map(d=>`<div class="text">Andar ${d.a} Sala ${d.s} - ${d.st}</div>`).join("");

}

async function exportPNG(){
  const canvas = await html2canvas(document.getElementById("board"),{scale:2});
  const link=document.createElement("a");
  link.download="relatorio.png";
  link.href=canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
