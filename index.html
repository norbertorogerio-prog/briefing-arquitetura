<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria Executivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0b14;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:#121225;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

select, button{
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  border:none;
  background:#1b1b35;
  color:#fff;
}

button{
  background:linear-gradient(135deg,#6a00ff,#9b3bff);
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.metric{
  background:#1a1a30;
  padding:16px;
  border-radius:14px;
  text-align:center;
}

.metric h1{
  margin:0;
}

.building{
  display:flex;
  flex-direction:column-reverse;
  gap:4px;
}

.floor{
  background:#1a1a2e;
  border-left:5px solid #6a00ff;
  padding:8px;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Cadastro</h2>

<select id="predio">
<option value="">Selecione</option>
<option value="Eco Berrini">Eco Berrini</option>
<option value="Chucri Zaidan">Chucri Zaidan</option>
</select>

<select id="andar"></select>
<select id="sala"></select>

<select id="status">
<option value="valid">Validada</option>
<option value="lock">Trancada</option>
<option value="prob">Problemas</option>
<option value="other">Outros</option>
</select>

<button onclick="add()">Adicionar</button>
<button onclick="share()">Compartilhar</button>

</div>

<div id="report" class="card">

<h2>Relatório Executivo</h2>
<p id="meta"></p>

<div class="grid">
<div class="metric"><h1 id="total">0</h1>Salas</div>
<div class="metric"><h1 id="ok">0</h1>OK</div>
<div class="metric"><h1 id="prob">0</h1>Problemas</div>
<div class="metric"><h1 id="health">0%</h1>Saúde</div>
</div>

<h3>Resumo</h3>
<p id="resumo"></p>

<h3>Prédio</h3>
<div id="building" class="building"></div>

</div>

</div>

<script>

const andarSelect = document.getElementById("andar");
const salaSelect = document.getElementById("sala");

for(let i=1;i<=32;i++){
  andarSelect.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}

for(let i=1;i<=50;i++){
  salaSelect.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}

let data=[];

function add(){
  const item={
    andar:andar.value,
    sala:sala.value,
    status:status.value
  }
  data.push(item);
  render();
}

function render(){

  let ok=0, prob=0;

  data.forEach(d=>{
    if(d.status==="valid") ok++;
    if(d.status==="prob") prob++;
  });

  total.innerText=data.length;
  okEl.innerText=ok;
  probEl.innerText=prob;

  let health = data.length ? Math.round((ok/data.length)*100) : 0;
  healthEl.innerText=health+"%";

  resumo.innerText=`Foram avaliadas ${data.length} salas. ${prob?prob+" problemas encontrados":"Nenhum problema relevante"}.`;

  building.innerHTML="";
  data.forEach(d=>{
    building.innerHTML += `<div class="floor">Andar ${d.andar} Sala ${d.sala} - ${d.status}</div>`;
  });

  const predio = document.getElementById("predio").value;

  let endereco="";
  if(predio==="Eco Berrini") endereco="Av. Eng. Luís Carlos Berrini, 1376 - São Paulo";
  if(predio==="Chucri Zaidan") endereco="Av. Dr. Chucri Zaidan, 2460 - Teatro Vivo";

  meta.innerText=`${predio} • ${endereco} • ${new Date().toLocaleString()}`;
}

async function share(){

  const canvas = await html2canvas(document.getElementById("report"));
  const blob = await new Promise(res=>canvas.toBlob(res));

  const file = new File([blob], "relatorio.png",{type:"image/png"});

  if(navigator.share){
    navigator.share({
      files:[file],
      title:"Relatório",
      text:"Relatório executivo"
    });
  }else{
    alert("Compartilhamento não suportado");
  }
}

</script>

</body>
</html>
