<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Torre de 32 andares</title>

<style>
  body{
    font-family: Segoe UI, Arial, sans-serif;
    background:#f2f4f7;
    padding:20px;
  }

  /* Layout geral (mantém direita) */
  .wrap{
    display:flex;
    gap:24px;
    align-items:flex-start;
  }

  /* ======= ESQUERDA (VOLTA "SIMPLES") ======= */
  .controls{
    width:260px;
    background:transparent;   /* sem card */
    padding:0;                /* sem espaçamento de card */
    border:none;              /* sem borda */
    box-shadow:none;          /* sem sombra */
    border-radius:0;          /* sem arredondamento */
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .controls label{
    font-size:12px;
    color:#333;
    font-weight:600;
    margin-top:6px;
  }
  .controls select,
  .controls input{
    padding:6px;
    border:1px solid #bbb;
    border-radius:4px;        /* simples */
    font-size:14px;
    background:#fff;
  }
  .controls button{
    margin-top:8px;
    padding:8px;
    border:1px solid #777;
    border-radius:4px;        /* simples */
    background:#e9e9e9;       /* simples */
    cursor:pointer;
    font-weight:600;
  }

  /* ======= DIREITA (MANTÉM) ======= */
  .tower{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .floor-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .floor-label{
    width:90px;
    text-align:right;
    font-weight:600;
    color:#222;
  }
  .floor-bar{
    width:280px;
    height:26px;
    background:#fff;
    border:1px solid #ccc;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:0 8px;
  }
  .slot{
    min-width:60px;
    text-align:center;
    font-weight:700;
    font-size:12px;
    border-radius:999px;
    padding:3px 10px;
    color:#666;
    background:transparent;
  }
</style>
</head>

<body>

<div class="wrap">

  <!-- ESQUERDA (revertida / simples) -->
  <div class="controls">
    <label>Andar</label>
    <select id="floorSelect"></select>

    <label>Sala</label>
    <select id="roomSelect">
      <option value="01">Sala 01</option>
      <option value="02">Sala 02</option>
      <option value="03">Sala 03</option>
      <option value="04">Sala 04</option>
      <option value="05">Sala 05</option>
      <option value="06">Sala 06</option>
      <option value="07">Sala 07</option>
      <option value="08">Sala 08</option>
    </select>

    <label>Cor de fundo</label>
    <input type="color" id="bgColor" value="#1f6feb" />

    <label>Cor do texto</label>
    <input type="color" id="textColor" value="#ffffff" />

    <button type="button" onclick="applySelection()">Aplicar</button>
    <button type="button" onclick="clearFloor()">Limpar andar</button>
  </div>

  <!-- DIREITA (torre mantida) -->
  <div class="tower" id="tower"></div>

</div>

<script>
  const FLOORS = 32;
  const tower = document.getElementById("tower");
  const floorSelect = document.getElementById("floorSelect");

  // monta select 1..32
  for (let i = 1; i <= FLOORS; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i + "º";
    floorSelect.appendChild(opt);
  }
  floorSelect.value = 32;

  // monta torre 32..1 (visual)
  for (let floor = FLOORS; floor >= 1; floor--) {
    const row = document.createElement("div");
    row.className = "floor-row";

    const label = document.createElement("div");
    label.className = "floor-label";
    label.textContent = "Andar " + floor + "º";

    const bar = document.createElement("div");
    bar.className = "floor-bar";

    const slot = document.createElement("div");
    slot.className = "slot";
    slot.id = "slot-" + floor;
    slot.textContent = "—";

    bar.appendChild(slot);
    row.appendChild(label);
    row.appendChild(bar);
    tower.appendChild(row);
  }

  function applySelection() {
    const floor = floorSelect.value;
    const room = document.getElementById("roomSelect").value;
    const bg = document.getElementById("bgColor").value;
    const color = document.getElementById("textColor").value;

    const slot = document.getElementById("slot-" + floor);
    slot.textContent = "sl-" + room;
    slot.style.background = bg;
    slot.style.color = color;
  }

  function clearFloor() {
    const floor = floorSelect.value;
    const slot = document.getElementById("slot-" + floor);
    slot.textContent = "—";
    slot.style.background = "transparent";
    slot.style.color = "#666";
  }
</script>

</body>
</html>
