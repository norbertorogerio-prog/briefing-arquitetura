<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>Relatório de Vistoria | Vivo</title>

<!-- Fonte + html2canvas para gerar PNG -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --vivo-purple:#6600CC; --vivo-purple-dark:#4C0099; --vivo-purple-light:#8833FF;
  --vivo-purple-glow:rgba(102,0,204,.2); --black:#1A1A2E; --gray:#4A4A5A;
  --gray-light:#6A6A7A; --white:#FFF; --green:#00C853; --yellow:#FFD600;
  --red:#FF3B3B; --orange:#FF9800; --shadow-md:0 4px 12px rgba(0,0,0,.15);
  --grad-primary:linear-gradient(135deg,#6600CC 0%,#4C0099 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(135deg,#1A1A2E 0%,#0F0F1A 100%);
  color:var(--white);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  min-height:100vh; padding:20px;
}
.app{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
@media(min-width:980px){
  body{padding:24px}
  .app{flex-direction:row;gap:24px;align-items:flex-start}
  .app> :first-child{width:380px;flex-shrink:0}
  .app> :last-child{flex:1;min-width:0}
}
.card{
  background:rgba(26,26,46,.8); backdrop-filter:blur(10px);
  border:1px solid rgba(102,0,204,.3); border-radius:20px; padding:20px; box-shadow:var(--shadow-md);
}
h2{margin:0 0 20px 0;font-weight:700;font-size:18px;background:var(--grad-primary);
  -webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
h3{margin:0 0 12px 0;font-size:14px;color:#B7B7C8;font-weight:600;text-transform:uppercase}
label{display:block;margin:12px 0 6px 0;font-size:11px;font-weight:600;text-transform:uppercase;color:#B7B7C8}

.form-field{
  width:100%; border:1.5px solid rgba(102,0,204,.2); border-radius:12px;
  background:rgba(255,255,255,.05); color:var(--white); padding:10px 14px; font-size:13px; outline:none; transition:.2s;
}
.form-field:focus{border-color:var(--vivo-purple); background:rgba(102,0,204,.1); box-shadow:0 0 0 3px var(--vivo-purple-glow)}
select.form-field{ cursor:pointer; appearance:none; background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat:no-repeat; background-position:right 12px center; background-size:20px;}

.number-input-group{display:flex;gap:12px;margin-bottom:8px}
.number-input-group .form-field{flex:1}

/* STATUS */
.status-strip{display:flex;gap:10px;margin:16px 0 20px;flex-wrap:wrap}
.status{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:40px;
  color:var(--white); background:rgba(102,0,204,.15); border:1.5px solid rgba(102,0,204,.3);
  cursor:pointer;font-size:13px;font-weight:600;transition:.2s; flex:1; min-width:90px;
}
.status:hover{background:rgba(102,0,204,.3); transform:translateY(-2px)}
.status:active{transform:translateY(0)}
.dot{width:10px;height:10px;border-radius:50%}
.dot.valid{background:var(--green); box-shadow:0 0 8px rgba(0,200,83,.5)}
.dot.lock{background:var(--yellow);box-shadow:0 0 8px rgba(255,214,0,.5)}
.dot.prob{background:var(--red);   box-shadow:0 0 8px rgba(255,59,59,.5)}
.dot.ocupado{background:var(--orange);box-shadow:0 0 8px rgba(255,152,0,.5)}

/* FOTOS */
.photo-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(102,0,204,.3)}
.photo-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:10px}
.photo-upload-btn{
  background:rgba(102,0,204,.2); border:1.5px dashed rgba(102,0,204,.5);
  border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:.2s; font-size:13px; font-weight:500;
}
.photo-upload-btn:hover{background:rgba(102,0,204,.3); border-color:var(--vivo-purple)}
.photo-gallery{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.photo-item{position:relative;width:80px;height:80px;border-radius:12px;overflow:hidden;border:2px solid rgba(102,0,204,.3);background:rgba(0,0,0,.3)}
.photo-item img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.photo-delete{
  position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--red);transition:.2s
}
.photo-delete:hover{background:var(--red);color:#fff;transform:scale(1.1)}

/* BOTÃO */
.btn{
  width:100%; border:none; border-radius:12px; background:var(--grad-primary);
  color:var(--white); font-weight:700; padding:10px; cursor:pointer; font-size:12px; transition:.2s;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(102,0,204,.4)}
.row{display:flex;gap:10px;margin-top:16px} .row button{flex:1}

/* VISOR DIREITO */
.viewer{display:grid;gap:16px}
.section{background:rgba(26,26,46,.6); backdrop-filter:blur(10px); border:1px solid rgba(102,0,204,.2); border-radius:20px; padding:20px}
.small{font-size:11px;color:#9aa; margin-top:12px; text-align:center}

/* GRADE DE ITENS - SALAS VISTORIADAS (MAIS COMPACTA) */
.created-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  max-height:320px;
  overflow-y:auto;
  padding:2px;
}
.room-card{
  display:inline-flex;
  flex-direction:row;
  align-items:center;
  gap:8px;
  padding:6px 12px;
  border-radius:30px;
  border:1px solid rgba(102,0,204,.2);
  background:rgba(102,0,204,.1);
  transition:.2s;
  cursor:pointer;
}
.room-card:hover{
  border-color:var(--vivo-purple);
  background:rgba(102,0,204,.25);
  transform:translateY(-1px);
}
.room-card.has-photo{
  border-left:3px solid var(--green);
}
.photo-indicator{
  font-size:9px;
  color:var(--green);
  margin-left:4px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  font-weight:700;
  color:#eae6ff;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:600;
  border-radius:30px;
  padding:2px 8px;
}
.pill.valid{background:var(--green);}
.pill.lock{background:var(--yellow);color:#1A1A2E;}
.pill.prob{background:var(--red);}
.pill.ocupado{background:var(--orange);}

/* RELATÓRIO */
.report-box{
  border-radius:16px;
  background:rgba(0,0,0,.3);
  overflow:visible;
  border:1px solid rgba(102,0,204,.3);
}
.report-title{
  background:linear-gradient(135deg,rgba(102,0,204,.2) 0%,rgba(76,0,153,.2) 100%);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(102,0,204,.3);
}
.report-title span{
  font-size:14px;
  font-weight:700;
  background:var(--grad-primary);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.report-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn-action{
  border:1.5px solid rgba(102,0,204,.3);
  background:rgba(102,0,204,.15);
  color:var(--white);
  font-weight:600;
  font-size:12px;
  padding:6px 14px;
  border-radius:40px;
  cursor:pointer;
  transition:.2s;
}
.btn-action:hover{
  background:rgba(102,0,204,.3);
  transform:translateY(-1px);
}
.btn-share{
  background:linear-gradient(135deg,#6600CC 0%,#8833FF 100%);
  border:none;
}
.btn-png{
  background:linear-gradient(135deg,#4C0099 0%,#6600CC 100%);
  border:none;
}

/* Phone mock */
.phone-wrap{
  margin:10px auto;
  width:100%;
  max-width:380px;
  border-radius:40px;
  padding:12px 10px 14px;
  background:linear-gradient(180deg,#5d05c7 0%, #4C0099 100%);
  box-shadow:0 20px 50px rgba(102,0,204,.35);
  border:2px solid rgba(255,255,255,.08);
  position:relative;
}
.phone-notch{width:160px;height:20px;background:rgba(0,0,0,.35);border-radius:0 0 12px 12px;margin:0 auto 8px}
.phone-screen{
  background:#0f0f1a;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.06);
  overflow:visible;
  position:relative;
}
.phone-footer{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px 10px 14px;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.04));
  border-top:1px solid rgba(255,255,255,.08)
}
.vivo-logo{
  font-weight:900;
  letter-spacing:2px;
  font-size:12px;
  background:linear-gradient(135deg,#fff 0%,#d9c9ff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  border:1px solid rgba(255,255,255,.25);
  padding:4px 10px;
  border-radius:999px;
}

/* Conteúdo na "tela" - MAIS COMPACTO */
.phone-screen .report-content{
  background:transparent;
  padding:14px 14px 12px;
  max-height:560px;
  overflow-y:auto;
  overflow-x:hidden;
  font-size:12px;
  line-height:1.45;
  word-wrap:break-word;
}
.report-content .h-line{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  margin:8px 0;
}
.report-content .title{
  font-weight:700;
  font-size:13px;
  letter-spacing:.2px;
  color:#eae6ff;
  margin-bottom:4px;
}
.report-content .kvs{margin:4px 0 0}
.report-content .kv{
  display:flex;
  gap:8px;
  font-size:11px;
  margin:2px 0;
  flex-wrap:wrap;
}
.report-content .kv b{
  color:#cfc3ff;
  min-width:70px;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.3px;
}
.report-content .bullet{margin:2px 0 2px 12px}

/* Indicadores mais compactos */
.report-content .indicadores-list{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin:6px 0 4px;
}
.report-content .indicador-item{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.05);
  border-radius:30px;
  padding:4px 12px;
  font-size:11px;
}
.report-content .indicador-dot{
  width:8px;
  height:8px;
  border-radius:50%;
}
.report-content .indicador-nome{
  font-weight:500;
}
.report-content .indicador-valor{
  font-weight:700;
  font-size:13px;
  margin-left:4px;
}

/* Detalhamento por andar - MAIS COMPACTO */
.detalhe-andar{
  margin:8px 0 0;
}
.andar-linha{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
  margin:6px 0;
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.andar-tag{
  background:rgba(102,0,204,.3);
  border-radius:20px;
  padding:2px 8px;
  font-size:10px;
  font-weight:700;
  min-width:65px;
  text-align:center;
}
.andar-salas{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  flex:1;
}
.sala-status-item{
  display:inline-flex;
  align-items:center;
  gap:3px;
  background:rgba(255,255,255,.08);
  border-radius:20px;
  padding:2px 8px;
  font-size:10px;
}
.sala-status-item .sala-num{
  font-weight:600;
  font-size:10px;
}

/* Fotos dentro do relatório - PEQUENAS */
.report-room-photos{
  margin:8px 0;
  padding:8px;
  background:rgba(102,0,204,.1);
  border-radius:10px;
}
.report-room-title{
  font-weight:600;
  color:var(--vivo-purple-light);
  margin-bottom:6px;
  font-size:11px;
}
.report-photo-thumbnails{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:4px;
}
.report-thumb{
  width:45px;
  height:45px;
  border-radius:8px;
  object-fit:cover;
  border:1.5px solid var(--vivo-purple);
  cursor:pointer;
  transition:.2s;
}
.report-thumb:hover{
  transform:scale(1.05);
}

/* Toast + Modais */
.toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:rgba(102,0,204,.95);
  backdrop-filter:blur(10px);
  padding:10px 18px;
  border-radius:40px;
  font-size:12px;
  font-weight:500;
  z-index:9999;
  opacity:0;
  transform:translateY(10px);
  transition:.2s;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}
.share-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(8px);
  z-index:10000;
  align-items:center;
  justify-content:center;
}
.share-modal.show{display:flex}
.share-card{
  background:rgba(26,26,46,.95);
  backdrop-filter:blur(20px);
  border:1px solid rgba(102,0,204,.4);
  border-radius:24px;
  padding:24px;
  max-width:340px;
  width:90%;
}
.share-card h4{margin-bottom:20px;font-size:18px;text-align:center}
.share-buttons{display:flex;flex-direction:column;gap:12px}
.share-btn{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  border:none;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
}
.share-btn.whatsapp{background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);color:#fff}
.share-btn.teams{background:linear-gradient(135deg,#6264A7 0%,#464775 100%);color:#fff}
.share-btn.email{background:linear-gradient(135deg,#EA4335 0%,#C5221F 100%);color:#fff}
.share-btn.download{background:var(--grad-primary);color:#fff}
.close-modal{
  background:rgba(102,0,204,.2);
  border:1px solid rgba(102,0,204,.3);
  border-radius:14px;
  padding:10px;
  margin-top:12px;
  color:#fff;
  cursor:pointer;
  width:100%;
}
.fullscreen-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  z-index:20000;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.fullscreen-modal.show{display:flex}
.fullscreen-modal img{max-width:95%;max-height:95%;border-radius:16px;box-shadow:0 0 50px rgba(102,0,204,.5)}
</style>
</head>
<body>
<div class="app">

  <!-- ESQUERDA -->
  <div class="card">
    <h2>✨ Vistoria Técnica</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="form-field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço automático"/>

    <div class="number-input-group">
      <div style="flex:1">
        <label>🏬 Andar</label>
        <select id="floorInput" class="form-field"></select>
      </div>
      <div style="flex:1">
        <label>🚪 Sala</label>
        <select id="roomInput" class="form-field"></select>
      </div>
    </div>

    <label>📌 Status</label>
    <div class="status-strip">
      <button class="status" data-status="valid"><span class="dot valid"></span>Validada</button>
      <button class="status" data-status="lock"><span class="dot lock"></span>Trancada</button>
      <button class="status" data-status="prob"><span class="dot prob"></span>Problemas</button>
      <button class="status" data-status="ocupado"><span class="dot ocupado"></span>Ocupado</button>
    </div>

    <div class="photo-section">
      <div class="photo-label">📸 Fotos da Sala <span id="currentDisplayFloor">01</span>-<span id="currentDisplayRoom">01</span></div>
      <div id="photoUploadBtn" class="photo-upload-btn">📷 + Adicionar foto</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
      <div id="photoGallery" class="photo-gallery"></div>
    </div>

    <div class="row">
      <button id="btnClear" class="btn">🗑️ Limpar Tudo</button>
    </div>

    <p class="small">💡 Selecione andar/sala → clique no status para registrar</p>
  </div>

  <!-- DIREITA -->
  <div class="viewer">
    <div class="section">
      <h3>📦 Salas vistoriadas</h3>
      <div id="createdGrid" class="created-grid">
        <p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p>
      </div>
    </div>

    <div class="section">
      <div class="report-box">
        <div class="report-title">
          <span>📋 Relatório de Vistoria</span>
          <div class="report-actions">
            <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;">
              <input id="useAI" type="checkbox" checked style="accent-color:#6600CC"> IA ligada
            </label>
            <button id="btnShare" class="btn-action btn-share">📱 Compartilhar</button>
            <button id="btnPNG" class="btn-action btn-png">📸 Salvar PNG</button>
          </div>
        </div>

        <div id="phoneMock" class="phone-wrap">
          <div class="phone-notch"></div>
          <div id="reportCaptureArea" class="phone-screen">
            <div id="relatorio" class="report-content">
              <div class="title">Relatório</div>
              <div class="h-line"></div>
              <div class="bullet">Aguardando registros...</div>
            </div>
            <div class="phone-footer">
              <div class="vivo-logo">VIVO</div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- Modais -->
<div id="shareModal" class="share-modal">
  <div class="share-card">
    <h4>✨ Compartilhar Relatório</h4>
    <div class="share-buttons">
      <button id="shareWhatsApp" class="share-btn whatsapp">💬 WhatsApp</button>
      <button id="shareTeams" class="share-btn teams">💼 Teams</button>
      <button id="shareEmail" class="share-btn email">📧 E-mail</button>
      <button id="shareSave" class="share-btn download">📸 Salvar imagem</button>
    </div>
    <button id="closeModal" class="close-modal">Fechar</button>
  </div>
</div>
<div id="fullscreenModal" class="fullscreen-modal" onclick="closeFullscreen()">
  <img id="fullscreenImage" src="">
</div>
<div class="toast"></div>

<script>
/* ===== Estado ===== */
const STORAGE_KEY = "vistoria_simple_v2";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let currentFloor = 1, currentRoom = 1, currentImageData = null;

/* ===== Helpers ===== */
const pad2 = n => String(n).padStart(2,"0");
const statusName  = s => s==="valid"?"Validada":s==="lock"?"Trancada":s==="prob"?"Problemas":"Ocupado";
const statusClass = s => s==="valid"?"valid":s==="lock"?"lock":s==="prob"?"prob":"ocupado";
const statusEmoji = s => s==="valid"?"✅":s==="lock"?"🔒":s==="prob"?"❌":"🟠";

/* ===== Gerar opções dos selects ===== */
function populateFloorSelect() {
  const floorSelect = document.getElementById("floorInput");
  floorSelect.innerHTML = "";
  for(let i = 1; i <= 32; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `${pad2(i)}° Andar`;
    if(i === currentFloor) option.selected = true;
    floorSelect.appendChild(option);
  }
}
function populateRoomSelect() {
  const roomSelect = document.getElementById("roomInput");
  roomSelect.innerHTML = "";
  for(let i = 1; i <= 50; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `Sala ${pad2(i)}`;
    if(i === currentRoom) option.selected = true;
    roomSelect.appendChild(option);
  }
}

/* ===== DOM ===== */
const floorInput   = document.getElementById("floorInput");
const roomInput    = document.getElementById("roomInput");
const dispFloor    = document.getElementById("currentDisplayFloor");
const dispRoom     = document.getElementById("currentDisplayRoom");
const createdGrid  = document.getElementById("createdGrid");
const predioSel    = document.getElementById("predio");
const enderecoInp  = document.getElementById("endereco");
const auditorInp   = document.getElementById("auditor");
const photoInput   = document.getElementById("photoInput");
const photoBtn     = document.getElementById("photoUploadBtn");
const shareModal   = document.getElementById("shareModal");

function updateCurrentDisplay(){
  currentFloor = Math.min(32, Math.max(1, parseInt(floorInput.value)||1));
  currentRoom  = Math.min(50, Math.max(1, parseInt(roomInput.value)||1));
  floorInput.value = currentFloor;
  roomInput.value = currentRoom;
  dispFloor.textContent = pad2(currentFloor);
  dispRoom.textContent = pad2(currentRoom);
}
floorInput.addEventListener("change", ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });
roomInput.addEventListener("change",  ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });

/* ===== Fotos ===== */
const roomKey = (f,r)=>`A${pad2(f)}-S${pad2(r)}`;
const getRoomPhotos = (f,r)=> JSON.parse(localStorage.getItem(`photos_${roomKey(f,r)}`)||"[]");
const saveRoomPhotos= (f,r,arr)=> localStorage.setItem(`photos_${roomKey(f,r)}`, JSON.stringify(arr));
function addPhotoToRoom(f,r,photo){
  const arr = getRoomPhotos(f,r); arr.push(photo); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos();
}
function deletePhotoFromRoom(f,r,idx){
  const arr = getRoomPhotos(f,r); arr.splice(idx,1); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos(); showToast("📸 Foto removida");
}
function renderCurrentPhotos(){
  const gal = document.getElementById("photoGallery");
  const photos = getRoomPhotos(currentFloor,currentRoom);
  if(!photos.length){ gal.innerHTML = '<p class="small" style="text-align:center;width:100%">Nenhuma foto</p>'; return; }
  gal.innerHTML = "";
  photos.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="photo-item";
    div.innerHTML = `<img src="${p}" onclick="showFullscreenImage('${p}')"><div class="photo-delete" onclick="event.stopPropagation(); deletePhotoFromRoom(${currentFloor},${currentRoom},${i})">✕</div>`;
    gal.appendChild(div);
  });
}
function showFullscreenImage(src){ const m=document.getElementById("fullscreenModal"),i=document.getElementById("fullscreenImage"); i.src=src; m.classList.add("show"); }
function closeFullscreen(){ document.getElementById("fullscreenModal").classList.remove("show"); }
window.deletePhotoFromRoom=deletePhotoFromRoom; window.showFullscreenImage=showFullscreenImage; window.closeFullscreen=closeFullscreen;

/* ===== Registrar sala ===== */
document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const status = btn.dataset.status, f=currentFloor, r=currentRoom;
    const idx = entries.findIndex(e=> e.f===f && e.r===r);
    if(idx>=0) entries[idx].status = status; else entries.push({f,r,status});
    persist(); renderCreated(); renderReportWithPhotos();
    showToast(`✅ A${pad2(f)}-S${pad2(r)}: ${statusName(status)}`);
  });
});

/* ===== Grade de itens - MAIS COMPACTA ===== */
function renderCreated(){
  const sorted = [...entries].sort((a,b)=> a.f-b.f || a.r-b.r);
  const title = document.querySelector('.section h3');
  title.innerHTML = `📦 Salas vistoriadas (${entries.length})`;
  if(!sorted.length){ createdGrid.innerHTML='<p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p>'; return; }
  createdGrid.innerHTML="";
  sorted.forEach(it=>{
    const photos = getRoomPhotos(it.f,it.r), has = photos.length>0;
    const card=document.createElement("div"); card.className = "room-card"+(has?' has-photo':'');
    card.onclick=()=>{ floorInput.value=it.f; roomInput.value=it.r; updateCurrentDisplay(); renderCurrentPhotos(); };
    card.innerHTML = `
      <div class="badge">A${pad2(it.f)} • S${pad2(it.r)}${has?' <span class="photo-indicator">📸</span>':''}</div>
      <div class="pill ${statusClass(it.status)}">${statusEmoji(it.status)} ${statusName(it.status)}</div>
    `;
    createdGrid.appendChild(card);
  });
}

/* ===== IA com layout compacto ===== */
function aiComposeReportText({predio,endereco,auditor,entries,totalFotos}){
  const stats={valid:0,lock:0,prob:0,ocupado:0}, floors={};
  entries.forEach(e=>{
    stats[e.status]=(stats[e.status]||0)+1;
    if(!floors[e.f]) floors[e.f]={valid:[],lock:[],prob:[],ocupado:[]};
    floors[e.f][e.status].push(e.r);
  });
  const dataStr=new Date().toLocaleString("pt-BR");

  const meta = `<div class="kv"><b>Prédio</b><span>${predio||"—"}</span></div>
<div class="kv"><b>Endereço</b><span>${endereco||"—"}</span></div>
<div class="kv"><b>Data</b><span>${dataStr}</span></div>
<div class="kv"><b>Auditor</b><span>${auditor||"—"}</span></div>`;

  const indicadoresHtml = `<div class="title">Indicadores</div><div class="h-line"></div>
<div class="indicadores-list">
  <div class="indicador-item"><div class="indicador-dot" style="background:#00C853;"></div><span class="indicador-nome">Validada</span><span class="indicador-valor">${stats.valid}</span></div>
  <div class="indicador-item"><div class="indicador-dot" style="background:#FFD600;"></div><span class="indicador-nome">Trancada</span><span class="indicador-valor">${stats.lock}</span></div>
  <div class="indicador-item"><div class="indicador-dot" style="background:#FF3B3B;"></div><span class="indicador-nome">Problemas</span><span class="indicador-valor">${stats.prob}</span></div>
  <div class="indicador-item"><div class="indicador-dot" style="background:#FF9800;"></div><span class="indicador-nome">Ocupado</span><span class="indicador-valor">${stats.ocupado}</span></div>
</div>`;

  let detalheHtml = "";
  if(entries.length>0){
    detalheHtml = `<div class="title">Detalhamento</div><div class="h-line"></div><div class="detalhe-andar">`;
    Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(f => {
      const a = floors[f];
      const salasItems = [];
      if(a.valid.length) a.valid.sort((x,y)=>x-y).forEach(s => salasItems.push(`<span class="sala-status-item"><span>✅</span><span class="sala-num">${pad2(s)}</span></span>`));
      if(a.lock.length) a.lock.sort((x,y)=>x-y).forEach(s => salasItems.push(`<span class="sala-status-item"><span>🔒</span><span class="sala-num">${pad2(s)}</span></span>`));
      if(a.prob.length) a.prob.sort((x,y)=>x-y).forEach(s => salasItems.push(`<span class="sala-status-item"><span>❌</span><span class="sala-num">${pad2(s)}</span></span>`));
      if(a.ocupado.length) a.ocupado.sort((x,y)=>x-y).forEach(s => salasItems.push(`<span class="sala-status-item"><span>🟠</span><span class="sala-num">${pad2(s)}</span></span>`));
      detalheHtml += `<div class="andar-linha"><div class="andar-tag">Andar ${pad2(f)}</div><div class="andar-salas">${salasItems.join("") || "—"}</div></div>`;
    });
    detalheHtml += `</div>`;
  } else {
    detalheHtml = `<div class="title">Detalhamento</div><div class="h-line"></div><div class="bullet">Sem entradas.</div>`;
  }
  const fotos = totalFotos?`📸 ${totalFotos} foto(s) registrada(s)`:"";
  const fotosHtml = fotos ? `<div class="h-line"></div><div class="bullet">${fotos}</div>` : "";

  return `<div class="title">Resumo IA</div><div class="h-line"></div><div class="kvs">${meta}</div><div class="h-line"></div>${indicadoresHtml}<div class="h-line"></div>${detalheHtml}${fotosHtml}`;
}

/* ===== Relatório ===== */
function renderReportWithPhotos(){
  const predio = predioSel.value || "Não selecionado";
  const endereco = enderecoInp.value || "Não informado";
  const auditor = auditorInp.value || "Não informado";
  const useAI = !!document.getElementById("useAI")?.checked;

  let totalFotos = 0; const roomsWithPhotos = [];
  entries.forEach(item=>{
    const photos = getRoomPhotos(item.f,item.r);
    if(photos.length){ totalFotos += photos.length; roomsWithPhotos.push({room:`A${pad2(item.f)}-S${pad2(item.r)}`,status:statusName(item.status),statusEmoji:statusEmoji(item.status),photos}); }
  });

  let mainHtml;
  if(useAI){
    mainHtml = aiComposeReportText({predio,endereco,auditor,entries,totalFotos});
  }else{
    const dataStr = new Date().toLocaleString("pt-BR");
    const stats={valid:0,lock:0,prob:0,ocupado:0};
    entries.forEach(e=> stats[e.status]=(stats[e.status]||0)+1);
    mainHtml = `<div class="title">Relatório</div><div class="h-line"></div><div class="kvs"><div class="kv"><b>Prédio</b><span>${predio}</span></div><div class="kv"><b>Endereço</b><span>${endereco}</span></div><div class="kv"><b>Data</b><span>${dataStr}</span></div><div class="kv"><b>Auditor</b><span>${auditor}</span></div></div><div class="h-line"></div><div class="title">Indicadores</div><div class="h-line"></div><div class="indicadores-list"><div class="indicador-item"><div class="indicador-dot" style="background:#00C853;"></div><span class="indicador-nome">Validada</span><span class="indicador-valor">${stats.valid}</span></div><div class="indicador-item"><div class="indicador-dot" style="background:#FFD600;"></div><span class="indicador-nome">Trancada</span><span class="indicador-valor">${stats.lock}</span></div><div class="indicador-item"><div class="indicador-dot" style="background:#FF3B3B;"></div><span class="indicador-nome">Problemas</span><span class="indicador-valor">${stats.prob}</span></div><div class="indicador-item"><div class="indicador-dot" style="background:#FF9800;"></div><span class="indicador-nome">Ocupado</span><span class="indicador-valor">${stats.ocupado}</span></div></div>`;
  }

  let photosHtml = "";
  if(roomsWithPhotos.length){
    photosHtml = `<div class="h-line"></div><div class="title">Evidências</div><div class="h-line"></div>`;
    roomsWithPhotos.forEach(r=>{
      photosHtml += `<div class="report-room-photos"><div class="report-room-title">${r.statusEmoji} ${r.room} — ${r.status}</div><div class="report-photo-thumbnails">` + r.photos.map(p=>`<img src="${p}" class="report-thumb" onclick="showFullscreenImage('${p}')" loading="lazy">`).join("") + `</div></div>`;
    });
  }

  document.getElementById("relatorio").innerHTML = mainHtml + photosHtml;
}

/* ===== PNG ===== */
async function generateImage(){
  const phone = document.getElementById("phoneMock");
  if(!phone){ showToast("Nada para gerar"); return null; }
  showToast("📸 Gerando imagem...");
  try{
    const canvas = await html2canvas(phone, { scale: 2.5, backgroundColor: null, logging: false, useCORS: true, windowWidth: phone.scrollWidth, windowHeight: phone.scrollHeight });
    return canvas.toDataURL('image/png');
  }catch(e){ showToast("❌ Erro"); return null; }
}
async function saveAsPNG(){
  const data = await generateImage(); if(!data) return;
  const link=document.createElement('a'); link.download=`vistoria_${predioSel.value||"vistoria"}.png`; link.href=data; link.click(); showToast("✅ Imagem salva!");
}

/* ===== Compartilhar ===== */
async function openShareModal(){ const d=await generateImage(); if(d){ currentImageData=d; shareModal.classList.add("show"); } }
function shareToWhatsApp(){ if(currentImageData){ const text=`Vistoria ${predioSel.value||"Prédio"} - ${auditorInp.value||"Auditor"}`; window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`); } shareModal.classList.remove("show"); }
function shareToTeams(){ if(currentImageData){ navigator.clipboard.writeText(`Relatório Vistoria ${predioSel.value}`); showToast("Copiado"); } shareModal.classList.remove("show"); }
function shareToEmail(){ if(currentImageData){ window.location.href=`mailto:?subject=Relatório Vistoria`; } shareModal.classList.remove("show"); }
function shareSaveImage(){ if(currentImageData){ const a=document.createElement('a'); a.download=`vistoria.png`; a.href=currentImageData; a.click(); } shareModal.classList.remove("show"); showToast("✅ Imagem salva!"); }

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function showToast(msg){ let t=document.querySelector(".toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }

/* ===== Listeners ===== */
photoBtn.addEventListener("click", ()=> photoInput.click());
photoInput.addEventListener("change",(e)=>{
  const files=[...e.target.files];
  files.forEach(file=>{ const rd=new FileReader(); rd.onload=ev=> addPhotoToRoom(currentFloor,currentRoom,ev.target.result); rd.readAsDataURL(file); });
  photoInput.value="";
});

document.getElementById("btnPNG").addEventListener("click", saveAsPNG);
document.getElementById("btnShare").addEventListener("click", openShareModal);
document.getElementById("shareWhatsApp").addEventListener("click", shareToWhatsApp);
document.getElementById("shareTeams").addEventListener("click", shareToTeams);
document.getElementById("shareEmail").addEventListener("click", shareToEmail);
document.getElementById("shareSave").addEventListener("click", shareSaveImage);
document.getElementById("closeModal").addEventListener("click", ()=> shareModal.classList.remove("show"));
shareModal.addEventListener("click",(e)=>{ if(e.target===shareModal) shareModal.classList.remove("show"); });
document.getElementById("useAI").addEventListener("change", renderReportWithPhotos);

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar TODOS os registros e fotos?")) return;
  entries=[];
  const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith("photos_")) keys.push(k); }
  keys.forEach(k=> localStorage.removeItem(k));
  auditorInp.value=""; predioSel.value=""; enderecoInp.value="";
  persist(); renderCreated(); renderReportWithPhotos(); renderCurrentPhotos(); showToast("✓ Todos os dados removidos");
});

predioSel.addEventListener("change", ()=>{
  const v=predioSel.value;
  if(v==="Eco Berrini") enderecoInp.value="Av. Eng. Luís Carlos Berrini, 1376 - SP";
  else if(v==="Chucri Zaidan") enderecoInp.value="Av. Dr. Chucri Zaidan, 2460 - SP";
  else enderecoInp.value="";
  renderReportWithPhotos();
});

/* ===== Boot ===== */
(function init(){
  populateFloorSelect();
  populateRoomSelect();
  updateCurrentDisplay();
  renderCreated(); renderReportWithPhotos(); renderCurrentPhotos();
})();
</script>
</body>
</html>
