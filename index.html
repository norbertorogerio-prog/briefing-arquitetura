<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
<title>Relatório de Vistoria | Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #F5F7FB;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 32px 24px;
  color: #1E293B;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  gap: 28px;
  align-items: flex-start;
}

/* Painel Esquerdo - Formulário */
.form-panel {
  flex: 0 0 380px;
  background: white;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  overflow: hidden;
  position: sticky;
  top: 24px;
}

.form-header {
  background: linear-gradient(135deg, #6600CC, #7C3AED);
  padding: 20px 24px;
  color: white;
}

.form-header h2 {
  font-size: 18px;
  font-weight: 700;
}

.form-header p {
  font-size: 12px;
  opacity: 0.9;
  margin-top: 6px;
}

.form-body {
  padding: 24px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #64748B;
  margin-bottom: 6px;
}

.form-control {
  width: 100%;
  padding: 12px 14px;
  font-size: 14px;
  border: 1.5px solid #E2E8F0;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.form-control:focus {
  outline: none;
  border-color: #6600CC;
  box-shadow: 0 0 0 3px rgba(102,0,204,0.1);
}

.form-row {
  display: flex;
  gap: 12px;
}

.form-row .form-group {
  flex: 1;
}

/* Status Buttons */
.status-group {
  margin: 20px 0 16px;
}

.status-group label {
  margin-bottom: 10px;
}

.status-buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.status-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  border-radius: 40px;
  border: 1.5px solid #E2E8F0;
  background: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.status-btn:hover {
  border-color: #6600CC;
  background: #F9F5FF;
  transform: translateY(-1px);
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.dot-valid { background: #10B981; }
.dot-lock { background: #F59E0B; }
.dot-prob { background: #EF4444; }
.dot-other { background: #8B5CF6; }

/* Photo Section */
.photo-section {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid #E9EEF3;
}

.photo-label {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #1E293B;
}

.upload-btn {
  background: #FAFCFE;
  border: 1.5px dashed #CBD5E1;
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #5B6E8C;
  transition: all 0.2s;
}

.upload-btn:hover {
  background: #F1F5F9;
  border-color: #6600CC;
  color: #6600CC;
}

.photo-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
  min-height: 80px;
}

.photo-item {
  position: relative;
  width: 75px;
  height: 75px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid #E9EEF3;
}

.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-delete {
  position: absolute;
  top: 3px;
  right: 3px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 11px;
  color: white;
}

.btn-clear {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border-radius: 40px;
  border: 1px solid #E2E8F0;
  background: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-clear:hover {
  background: #FEF2F2;
  border-color: #EF4444;
  color: #EF4444;
}

/* Painel Direito - Relatório */
.report-panel {
  flex: 1;
  background: white;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  overflow: hidden;
}

.report-header {
  padding: 20px 24px;
  background: white;
  border-bottom: 1px solid #E9EEF3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.report-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: #0F172A;
}

.ai-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #F1F5F9;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 500;
}

.ai-toggle input {
  accent-color: #6600CC;
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.action-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.action-btn {
  padding: 6px 14px;
  border-radius: 40px;
  border: 1px solid #E2E8F0;
  background: white;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.action-btn:hover {
  border-color: #6600CC;
  background: #F9F5FF;
  color: #6600CC;
}

/* Salas Registradas */
.rooms-section {
  padding: 16px 24px;
  background: #FAFCFE;
  border-bottom: 1px solid #E9EEF3;
}

.rooms-section h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  color: #64748B;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.rooms-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.room-card {
  background: white;
  border: 1px solid #E9EEF3;
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 100px;
}

.room-card:hover {
  border-color: #6600CC;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.room-card.has-photo {
  border-left: 3px solid #10B981;
}

.room-number {
  font-weight: 700;
  font-size: 13px;
  color: #0F172A;
  margin-bottom: 4px;
}

.room-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
}
.status-valid { background: #E8F9F0; color: #0B6E41; }
.status-lock { background: #FEF3E2; color: #B45309; }
.status-prob { background: #FEE9E9; color: #C53030; }
.status-other { background: #F0E9FF; color: #6D28D9; }

/* Conteúdo do Relatório */
.report-content {
  padding: 28px;
  max-height: 550px;
  overflow-y: auto;
}

/* Estilos do Resumo Inteligente - igual à imagem */
.resumo-title {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, #6600CC, #8B5CF6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 24px;
}

.info-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.info-card {
  background: #F8FAFE;
  border-radius: 16px;
  padding: 16px;
  border: 1px solid #E9EEF3;
}

.info-card .label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #8B9AB0;
  margin-bottom: 6px;
}

.info-card .value {
  font-size: 15px;
  font-weight: 700;
  color: #0F172A;
  word-break: break-word;
}

.divider {
  height: 1px;
  background: #E9EEF3;
  margin: 20px 0;
}

.resumo-texto {
  font-size: 14px;
  color: #334155;
  line-height: 1.5;
  margin-bottom: 20px;
  padding: 12px 0;
}

.stats-list {
  margin: 16px 0;
}

.stat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #F0F2F5;
}

.stat-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.stat-marker {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.marker-valid { background: #10B981; }
.marker-lock { background: #F59E0B; }
.marker-prob { background: #EF4444; }
.marker-other { background: #8B5CF6; }

.stat-name {
  font-weight: 500;
  font-size: 14px;
  color: #334155;
}

.stat-number {
  font-weight: 800;
  font-size: 18px;
  color: #0F172A;
}

/* Detalhamento por andar */
.floor-detail {
  margin-top: 24px;
  background: #F8FAFE;
  border-radius: 16px;
  padding: 20px;
}

.floor-title {
  font-weight: 700;
  font-size: 14px;
  color: #6600CC;
  margin-bottom: 16px;
}

.floor-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.floor-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}

.floor-badge {
  background: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 12px;
  color: #6600CC;
  border: 1px solid #E2E8F0;
  white-space: nowrap;
}

.floor-rooms {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex: 1;
  font-size: 13px;
  color: #475569;
}

/* Evidências */
.evidence-section {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #E9EEF3;
}

.evidence-title {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 16px;
  color: #0F172A;
}

.evidence-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.evidence-card {
  background: #F8FAFE;
  border-radius: 16px;
  padding: 16px;
  border: 1px solid #E9EEF3;
}

.evidence-room {
  font-weight: 700;
  font-size: 13px;
  color: #6600CC;
  margin-bottom: 12px;
}

.evidence-photos {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.evidence-photo {
  width: 70px;
  height: 70px;
  border-radius: 12px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #E9EEF3;
  transition: 0.2s;
}

.evidence-photo:hover {
  border-color: #6600CC;
  transform: scale(1.03);
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #94A3B8;
  font-size: 14px;
}

/* Modais */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
.modal.show { display: flex; }
.modal-img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
  cursor: pointer;
}
.share-card {
  background: white;
  border-radius: 28px;
  padding: 28px;
  max-width: 320px;
  width: 90%;
  text-align: center;
}
.share-card h4 { margin-bottom: 20px; font-size: 20px; }
.share-buttons { display: flex; flex-direction: column; gap: 12px; }
.share-btn { padding: 12px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; }
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #1E293B;
  color: white;
  padding: 12px 24px;
  border-radius: 60px;
  font-size: 13px;
  opacity: 0;
  transition: 0.2s;
  z-index: 9999;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <!-- PAINEL ESQUERDO -->
  <div class="form-panel">
    <div class="form-header">
      <h2>📋 Vistoria Técnica</h2>
      <p>Registre andar, sala e status</p>
    </div>
    <div class="form-body">
      <div class="form-group">
        <label>👤 Nome do responsável</label>
        <input type="text" id="auditor" class="form-control" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label>🏢 PRÉDIO</label>
        <select id="predio" class="form-control">
          <option value="">Selecione</option>
          <option value="Eco Berrini">Eco Berrini</option>
          <option value="Chucri Zaidan">Chucri Zaidan</option>
        </select>
      </div>
      <div class="form-group">
        <label>📍 ENDEREÇO</label>
        <input type="text" id="endereco" class="form-control" placeholder="Endereço automático">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ANDAR</label>
          <input type="number" id="floorInput" class="form-control" min="1" max="32" value="1">
        </div>
        <div class="form-group">
          <label>SALA</label>
          <input type="number" id="roomInput" class="form-control" min="1" max="50" value="1">
        </div>
      </div>

      <div class="status-group">
        <label>Status da Sala</label>
        <div class="status-buttons">
          <button class="status-btn" data-status="valid"><span class="status-dot dot-valid"></span>Validada</button>
          <button class="status-btn" data-status="lock"><span class="status-dot dot-lock"></span>Trancada</button>
          <button class="status-btn" data-status="prob"><span class="status-dot dot-prob"></span>Problemas</button>
          <button class="status-btn" data-status="other"><span class="status-dot dot-other"></span>Outros</button>
        </div>
      </div>

      <div class="photo-section">
        <div class="photo-label">📸 Fotos <span id="currentRoomLabel">A01-S01</span></div>
        <div id="uploadBtn" class="upload-btn">+ Adicionar foto</div>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
        <div id="photoGallery" class="photo-grid"></div>
      </div>

      <button id="clearAllBtn" class="btn-clear">🗑️ Limpar todos os registros</button>
    </div>
  </div>

  <!-- PAINEL DIREITO - RELATÓRIO -->
  <div class="report-panel">
    <div class="report-header">
      <h2>📄 Relatório de Vistoria</h2>
      <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <label class="ai-toggle">
          <input type="checkbox" id="useAI" checked> 🤖 IA Inteligente
        </label>
        <div class="action-buttons">
          <button id="shareBtn" class="action-btn">Compartilhar</button>
          <button id="pngBtn" class="action-btn">Salvar PNG</button>
          <button id="copyBtn" class="action-btn">Copiar</button>
          <button id="csvBtn" class="action-btn">Exportar CSV</button>
        </div>
      </div>
    </div>

    <div class="rooms-section">
      <h3>📦 Salas vistoriadas</h3>
      <div id="roomsList" class="rooms-list">
        <div style="color:#94A3B8; font-size:13px;">Nenhuma sala registrada</div>
      </div>
    </div>

    <div id="reportContent" class="report-content">
      <div class="empty-state">Nenhuma sala registrada. Selecione andar/sala e clique no status para adicionar.</div>
    </div>
  </div>
</div>

<!-- MODAIS -->
<div id="imageModal" class="modal" onclick="closeModal()">
  <img id="modalImage" class="modal-img" src="">
</div>
<div id="shareModal" class="modal">
  <div class="share-card">
    <h4>✨ Compartilhar</h4>
    <div class="share-buttons">
      <button id="shareWA" class="share-btn" style="background:#25D366; color:white;">💬 WhatsApp</button>
      <button id="shareEmail" class="share-btn" style="background:#EA4335; color:white;">📧 E-mail</button>
      <button id="shareImage" class="share-btn" style="background:linear-gradient(135deg,#6600CC,#8B5CF6); color:white;">📸 Salvar Imagem</button>
    </div>
    <button id="closeShareModal" style="margin-top:16px; padding:10px; border-radius:40px; border:1px solid #E2E8F0; background:white; cursor:pointer; width:100%;">Fechar</button>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ========== ESTADO ==========
let entries = JSON.parse(localStorage.getItem('vistoria_entries') || '[]');
let currentFloor = 1;
let currentRoom = 1;
let currentImageData = null;

// ========== FUNÇÕES AUXILIARES ==========
const pad2 = n => String(n).padStart(2, '0');
const roomKey = (f, r) => `A${pad2(f)}-S${pad2(r)}`;
const statusName = s => s === 'valid' ? 'Validada' : s === 'lock' ? 'Trancada' : s === 'prob' ? 'Problemas' : 'Outros';
const statusEmoji = s => s === 'valid' ? '✅' : s === 'lock' ? '🔒' : s === 'prob' ? '❌' : '◻️';
const statusClassStyle = s => s === 'valid' ? 'status-valid' : s === 'lock' ? 'status-lock' : s === 'prob' ? 'status-prob' : 'status-other';

// ========== GERENCIAMENTO DE FOTOS ==========
function getRoomPhotos(f, r) {
  return JSON.parse(localStorage.getItem(`photos_${roomKey(f, r)}`) || '[]');
}

function saveRoomPhotos(f, r, arr) {
  localStorage.setItem(`photos_${roomKey(f, r)}`, JSON.stringify(arr));
}

function addPhoto(f, r, photoData) {
  const photos = getRoomPhotos(f, r);
  photos.push(photoData);
  saveRoomPhotos(f, r, photos);
  if (currentFloor === f && currentRoom === r) renderCurrentPhotos();
  renderRoomsList();
  renderReport();
  showToast('📸 Foto adicionada');
}

function deletePhoto(f, r, idx) {
  const photos = getRoomPhotos(f, r);
  photos.splice(idx, 1);
  saveRoomPhotos(f, r, photos);
  if (currentFloor === f && currentRoom === r) renderCurrentPhotos();
  renderRoomsList();
  renderReport();
  showToast('📸 Foto removida');
}

function renderCurrentPhotos() {
  const gallery = document.getElementById('photoGallery');
  const photos = getRoomPhotos(currentFloor, currentRoom);
  document.getElementById('currentRoomLabel').innerText = roomKey(currentFloor, currentRoom);
  
  if (!photos.length) {
    gallery.innerHTML = '<div style="color:#94A3B8; font-size:12px; text-align:center; width:100%;">Nenhuma foto</div>';
    return;
  }
  
  gallery.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-item';
    div.innerHTML = `
      <img src="${p}" onclick="openImage('${p}')">
      <div class="photo-delete" onclick="event.stopPropagation(); deletePhoto(${currentFloor}, ${currentRoom}, ${i})">✕</div>
    `;
    gallery.appendChild(div);
  });
}

// ========== LISTA DE SALAS ==========
function renderRoomsList() {
  const container = document.getElementById('roomsList');
  if (!entries.length) {
    container.innerHTML = '<div style="color:#94A3B8; font-size:13px;">Nenhuma sala registrada</div>';
    return;
  }
  
  const sorted = [...entries].sort((a, b) => a.f - b.f || a.r - b.r);
  container.innerHTML = '';
  
  sorted.forEach(item => {
    const photos = getRoomPhotos(item.f, item.r);
    const hasPhoto = photos.length > 0;
    const card = document.createElement('div');
    card.className = `room-card ${hasPhoto ? 'has-photo' : ''}`;
    card.onclick = () => {
      document.getElementById('floorInput').value = item.f;
      document.getElementById('roomInput').value = item.r;
      updateCurrentDisplay();
      renderCurrentPhotos();
    };
    card.innerHTML = `
      <div class="room-number">${roomKey(item.f, item.r)} ${hasPhoto ? '📸' : ''}</div>
      <div class="room-status-badge ${statusClassStyle(item.status)}">${statusEmoji(item.status)} ${statusName(item.status)}</div>
    `;
    container.appendChild(card);
  });
}

// ========== REGISTRAR SALA ==========
function registerRoom(status) {
  const idx = entries.findIndex(e => e.f === currentFloor && e.r === currentRoom);
  if (idx >= 0) {
    entries[idx].status = status;
  } else {
    entries.push({ f: currentFloor, r: currentRoom, status });
  }
  localStorage.setItem('vistoria_entries', JSON.stringify(entries));
  renderRoomsList();
  renderReport();
  showToast(`✅ ${roomKey(currentFloor, currentRoom)}: ${statusName(status)}`);
}

// ========== GERAR RELATÓRIO (ESTILO IMAGEM) ==========
function renderReport() {
  const predio = document.getElementById('predio').value || 'Não informado';
  const endereco = document.getElementById('endereco').value || 'Não informado';
  const auditor = document.getElementById('auditor').value || 'Não informado';
  const useAI = document.getElementById('useAI').checked;
  const dateStr = new Date().toLocaleString('pt-BR');
  
  // Calcular estatísticas
  const stats = { valid: 0, lock: 0, prob: 0, other: 0 };
  const floorsMap = {};
  
  entries.forEach(e => {
    stats[e.status]++;
    if (!floorsMap[e.f]) floorsMap[e.f] = { valid: [], lock: [], prob: [], other: [] };
    floorsMap[e.f][e.status].push(e.r);
  });
  
  const total = entries.length;
  
  // Coletar fotos
  let totalFotos = 0;
  const roomsWithPhotos = [];
  entries.forEach(item => {
    const photos = getRoomPhotos(item.f, item.r);
    if (photos.length) {
      totalFotos += photos.length;
      roomsWithPhotos.push({
        room: roomKey(item.f, item.r),
        status: statusName(item.status),
        emoji: statusEmoji(item.status),
        photos
      });
    }
  });
  
  if (total === 0) {
    document.getElementById('reportContent').innerHTML = '<div class="empty-state">Nenhuma sala registrada. Selecione andar/sala e clique no status para adicionar.</div>';
    return;
  }
  
  let html = '';
  
  if (useAI) {
    // Título "Resumo Inteligente" igual à imagem
    html += `<div class="resumo-title">🤖 Resumo Inteligente</div>`;
    
    // Cards de informação
    html += `<div class="info-cards">
      <div class="info-card"><div class="label">PRÉDIO</div><div class="value">${predio}</div></div>
      <div class="info-card"><div class="label">ENDEREÇO</div><div class="value">${endereco}</div></div>
      <div class="info-card"><div class="label">DATA/HORA</div><div class="value">${dateStr}</div></div>
      <div class="info-card"><div class="label">AUDITOR</div><div class="value">${auditor}</div></div>
    </div>`;
    
    html += `<div class="divider"></div>`;
    
    // Texto de resumo
    const headline = `📌 Vistoria concluída com ${total} sala(s). ${stats.valid} validações, ${stats.prob} ocorrência(s) com problema, ${stats.lock} bloqueio(s).`;
    html += `<div class="resumo-texto">${headline}</div>`;
    
    html += `<div class="divider"></div>`;
    
    // Estatísticas em linhas
    html += `<div class="stats-list">
      <div class="stat-item"><div class="stat-left"><div class="stat-marker marker-valid"></div><span class="stat-name">Validada</span></div><div class="stat-number">${stats.valid}</div></div>
      <div class="stat-item"><div class="stat-left"><div class="stat-marker marker-lock"></div><span class="stat-name">Trancada</span></div><div class="stat-number">${stats.lock}</div></div>
      <div class="stat-item"><div class="stat-left"><div class="stat-marker marker-prob"></div><span class="stat-name">Problemas</span></div><div class="stat-number">${stats.prob}</div></div>
      <div class="stat-item"><div class="stat-left"><div class="stat-marker marker-other"></div><span class="stat-name">Outros</span></div><div class="stat-number">${stats.other}</div></div>
    </div>`;
    
    // Detalhamento por andar
    if (total > 0 && Object.keys(floorsMap).length > 0) {
      html += `<div class="floor-detail"><div class="floor-title">📊 Detalhamento por andar</div><div class="floor-list">`;
      
      Object.keys(floorsMap).map(Number).sort((a, b) => a - b).forEach(f => {
        const a = floorsMap[f];
        const parts = [];
        if (a.valid.length) parts.push(`✅ ${a.valid.length} (${a.valid.sort((x, y) => x - y).map(pad2).join(', ')})`);
        if (a.lock.length) parts.push(`🔒 ${a.lock.length} (${a.lock.sort((x, y) => x - y).map(pad2).join(', ')})`);
        if (a.prob.length) parts.push(`❌ ${a.prob.length} (${a.prob.sort((x, y) => x - y).map(pad2).join(', ')})`);
        if (a.other.length) parts.push(`◻️ ${a.other.length} (${a.other.sort((x, y) => x - y).map(pad2).join(', ')})`);
        
        html += `<div class="floor-row">
          <span class="floor-badge">Andar ${pad2(f)}</span>
          <div class="floor-rooms">${parts.join(' | ')}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    
    // Resumo de fotos
    if (totalFotos > 0) {
      html += `<div class="divider"></div>`;
      html += `<div class="resumo-texto">📸 Total de evidências fotográficas: ${totalFotos} foto(s).</div>`;
    }
  } else {
    // Modo simples
    html += `<div class="resumo-title">📋 Relatório de Vistoria</div>`;
    html += `<div class="info-cards">
      <div class="info-card"><div class="label">PRÉDIO</div><div class="value">${predio}</div></div>
      <div class="info-card"><div class="label">DATA</div><div class="value">${dateStr}</div></div>
      <div class="info-card"><div class="label">AUDITOR</div><div class="value">${auditor}</div></div>
      <div class="info-card"><div class="label">SALAS</div><div class="value">${total}</div></div>
    </div>`;
  }
  
  // Evidências fotográficas
  if (roomsWithPhotos.length > 0) {
    html += `<div class="evidence-section"><div class="evidence-title">📸 Evidências Fotográficas</div><div class="evidence-grid">`;
    roomsWithPhotos.forEach(r => {
      html += `<div class="evidence-card">
        <div class="evidence-room">${r.emoji} ${r.room} — ${r.status}</div>
        <div class="evidence-photos">`;
      r.photos.forEach(p => {
        html += `<img src="${p}" class="evidence-photo" onclick="openImage('${p}')">`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }
  
  document.getElementById('reportContent').innerHTML = html;
}

// ========== UTILITÁRIOS ==========
function updateCurrentDisplay() {
  currentFloor = Math.min(32, Math.max(1, parseInt(document.getElementById('floorInput').value) || 1));
  currentRoom = Math.min(50, Math.max(1, parseInt(document.getElementById('roomInput').value) || 1));
  document.getElementById('floorInput').value = currentFloor;
  document.getElementById('roomInput').value = currentRoom;
  renderCurrentPhotos();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

async function generateImage() {
  const el = document.getElementById('reportContent');
  if (!el) return null;
  showToast('📸 Gerando imagem...');
  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#FFFFFF', logging: false, useCORS: true });
    return canvas.toDataURL('image/png');
  } catch(e) {
    showToast('❌ Erro ao gerar imagem');
    return null;
  }
}

// ========== FUNÇÕES GLOBAIS ==========
window.openImage = (src) => {
  document.getElementById('modalImage').src = src;
  document.getElementById('imageModal').classList.add('show');
};
window.closeModal = () => document.getElementById('imageModal').classList.remove('show');
window.deletePhoto = deletePhoto;

// ========== EVENT LISTENERS ==========
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => registerRoom(btn.dataset.status));
});

document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change', (e) => {
  const files = [...e.target.files];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addPhoto(currentFloor, currentRoom, ev.target.result);
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (!confirm('⚠️ Limpar TODOS os registros e fotos?')) return;
  entries = [];
  localStorage.setItem('vistoria_entries', '[]');
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('photos_')) keys.push(k);
  }
  keys.forEach(k => localStorage.removeItem(k));
  document.getElementById('auditor').value = '';
  document.getElementById('predio').value = '';
  document.getElementById('endereco').value = '';
  renderRoomsList();
  renderReport();
  renderCurrentPhotos();
  showToast('✓ Todos os dados removidos');
});

document.getElementById('predio').addEventListener('change', () => {
  const v = document.getElementById('predio').value;
  const end = document.getElementById('endereco');
  if (v === 'Eco Berrini') end.value = 'Av. Eng. Luís Carlos Berrini, 1376 - SP';
  else if (v === 'Chucri Zaidan') end.value = 'Av. Dr. Chucri Zaidan, 2460 - SP';
  else end.value = '';
  renderReport();
});

document.getElementById('useAI').addEventListener('change', renderReport);
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('reportContent').innerText;
  navigator.clipboard.writeText(text);
  showToast('📋 Relatório copiado');
});
document.getElementById('csvBtn').addEventListener('click', () => {
  const rows = [['Andar', 'Sala', 'Status', 'Fotos']];
  entries.forEach(e => {
    rows.push([pad2(e.f), pad2(e.r), statusName(e.status), getRoomPhotos(e.f, e.r).length]);
  });
  const csv = rows.map(r => r.join(';')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `vistoria_${new Date().toISOString().slice(0, 19)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('🧾 CSV exportado');
});
document.getElementById('pngBtn').addEventListener('click', async () => {
  const img = await generateImage();
  if (img) {
    const a = document.createElement('a');
    a.download = `vistoria_${new Date().toISOString().slice(0, 19)}.png`;
    a.href = img;
    a.click();
    showToast('✅ Imagem salva');
  }
});
document.getElementById('shareBtn').addEventListener('click', async () => {
  currentImageData = await generateImage();
  if (currentImageData) document.getElementById('shareModal').classList.add('show');
});
document.getElementById('shareWA').addEventListener('click', () => {
  const text = `✨ Vistoria - ${document.getElementById('predio').value || 'Prédio'}\nAuditor: ${document.getElementById('auditor').value || '—'}\nData: ${new Date().toLocaleString('pt-BR')}`;
  window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`);
  document.getElementById('shareModal').classList.remove('show');
});
document.getElementById('shareEmail').addEventListener('click', () => {
  const subject = `Relatório Vistoria - ${document.getElementById('predio').value || 'Vistoria'}`;
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}`;
  document.getElementById('shareModal').classList.remove('show');
});
document.getElementById('shareImage').addEventListener('click', () => {
  if (currentImageData) {
    const a = document.createElement('a');
    a.download = `vistoria_imagem.png`;
    a.href = currentImageData;
    a.click();
  }
  document.getElementById('shareModal').classList.remove('show');
});
document.getElementById('closeShareModal').addEventListener('click', () => document.getElementById('shareModal').classList.remove('show'));

const floorInput = document.getElementById('floorInput');
const roomInput = document.getElementById('roomInput');
floorInput.addEventListener('input', updateCurrentDisplay);
roomInput.addEventListener('input', updateCurrentDisplay);

// ========== INICIALIZAÇÃO ==========
updateCurrentDisplay();
renderRoomsList();
renderReport();
</script>
</body>
</html>
