<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Salas - Prédio Comercial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        .building-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .building-card:hover {
            transform: translateY(-5px);
        }

        .building-card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
        }

        .building-image {
            background: linear-gradient(180deg, #2c3e50 0%, #3498db 100%);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .building-structure {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            position: relative;
        }

        .zone-alta {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px 10px 0 0;
            padding: 20px;
            text-align: center;
            color: white;
            font-weight: bold;
            position: relative;
        }

        .zone-alta::before {
            content: "🏢";
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
        }

        .floors-alta {
            background: rgba(255,255,255,0.1);
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .zone-baixa {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 0 0 10px 10px;
            padding: 20px;
            text-align: center;
            color: white;
            font-weight: bold;
            margin-top: 5px;
            position: relative;
        }

        .zone-baixa::before {
            content: "🏬";
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
        }

        .floors-baixa {
            background: rgba(255,255,255,0.1);
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .building-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .info-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 5px;
        }

        .rooms-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .rooms-card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            min-width: 80px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .stat-avaliada .stat-number { color: #10b981; }
        .stat-trancada .stat-number { color: #f59e0b; }
        .stat-ocupada .stat-number { color: #3b82f6; }
        .stat-problemas .stat-number { color: #ef4444; }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #f1f5f9;
            color: #475569;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: scale(1.05);
        }

        .rooms-list {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 12px;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
            border-left: 4px solid #ddd;
        }

        .room-item.status-avaliada { border-left-color: #10b981; }
        .room-item.status-trancada { border-left-color: #f59e0b; }
        .room-item.status-ocupada { border-left-color: #3b82f6; }
        .room-item.status-problemas { border-left-color: #ef4444; }

        .room-info {
            flex: 1;
        }

        .room-code {
            font-weight: bold;
            font-size: 1rem;
            color: #333;
        }

        .room-location {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }

        .room-location .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-right: 8px;
        }

        .badge-alta {
            background: #667eea;
            color: white;
        }

        .badge-baixa {
            background: #f5576c;
            color: white;
        }

        .room-status-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .status-select.status-avaliada { background: #10b98120; color: #10b981; border-color: #10b981; }
        .status-select.status-trancada { background: #f59e0b20; color: #f59e0b; border-color: #f59e0b; }
        .status-select.status-ocupada { background: #3b82f620; color: #3b82f6; border-color: #3b82f6; }
        .status-select.status-problemas { background: #ef444420; color: #ef4444; border-color: #ef4444; }

        .status-select:hover {
            transform: scale(1.02);
        }

        .btn-reset {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #dc2626;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }

            .stats {
                gap: 8px;
            }

            .stat-number {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Validação de Salas</h1>
            <p>Prédio Comercial | 32 Andares | 50 Salas</p>
        </div>

        <div class="main-grid">
            <div class="building-card">
                <h2>📍 Torre Comercial</h2>
                <div class="building-image">
                    <div class="building-structure">
                        <div class="zone-alta">
                            ZONA ALTA
                            <div class="floors-alta">
                                Pisos 17 a 32
                            </div>
                        </div>
                        <div class="zone-baixa">
                            ZONA BAIXA
                            <div class="floors-baixa">
                                Pisos 01 a 16
                            </div>
                        </div>
                    </div>
                </div>
                <div class="building-info">
                    <span class="info-tag">🏷️ Código: 32-SL13</span>
                    <span class="info-tag">📐 32 Andares</span>
                    <span class="info-tag">🚪 50 Salas Comerciais</span>
                    <span class="info-tag">✅ Sistema de Gestão</span>
                </div>
            </div>

            <div class="rooms-card">
                <h2>📋 Salas Comerciais</h2>
                
                <div class="stats" id="stats">
                    <div class="stat-item stat-avaliada">
                        <div class="stat-number" id="avaliadaCount">0</div>
                        <div class="stat-label">✓ Avaliada</div>
                    </div>
                    <div class="stat-item stat-trancada">
                        <div class="stat-number" id="trancadaCount">0</div>
                        <div class="stat-label">🔒 Trancada</div>
                    </div>
                    <div class="stat-item stat-ocupada">
                        <div class="stat-number" id="ocupadaCount">0</div>
                        <div class="stat-label">👥 Ocupada</div>
                    </div>
                    <div class="stat-item stat-problemas">
                        <div class="stat-number" id="problemasCount">0</div>
                        <div class="stat-label">⚠️ Problemas</div>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar sala por código...">
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="avaliada">✓ Avaliada</button>
                    <button class="filter-btn" data-filter="trancada">🔒 Trancada</button>
                    <button class="filter-btn" data-filter="ocupada">👥 Ocupada</button>
                    <button class="filter-btn" data-filter="problemas">⚠️ Problemas</button>
                </div>

                <div class="rooms-list" id="roomsList"></div>

                <button class="btn-reset" id="resetBtn">🔄 Resetar Todos os Status</button>
            </div>
        </div>
    </div>

    <script>
        // Status possíveis
        const STATUS = ['avaliada', 'trancada', 'ocupada', 'problemas'];
        const STATUS_LABELS = {
            avaliada: { text: '✓ Avaliada', icon: '✓', color: '#10b981' },
            trancada: { text: '🔒 Trancada', icon: '🔒', color: '#f59e0b' },
            ocupada: { text: '👥 Ocupada', icon: '👥', color: '#3b82f6' },
            problemas: { text: '⚠️ Problemas', icon: '⚠️', color: '#ef4444' }
        };

        // Gerar 50 salas distribuídas em 32 andares
        const generateRooms = () => {
            const rooms = [];
            const prefixes = ['SL', 'SB', 'AP', 'CO', 'AD'];
            
            for (let i = 1; i <= 50; i++) {
                // Distribuir andares de forma equilibrada
                const floor = Math.floor((i - 1) / (50 / 32)) + 1;
                const zone = floor >= 17 ? 'Alta' : 'Baixa';
                const prefix = prefixes[i % prefixes.length];
                const roomNumber = String(i).padStart(3, '0');
                const roomCode = `${floor.toString().padStart(2, '0')}-${prefix}${roomNumber}`;
                
                // Distribuir status iniciais
                let status;
                if (i <= 12) status = 'avaliada';
                else if (i <= 22) status = 'trancada';
                else if (i <= 38) status = 'ocupada';
                else status = 'problemas';
                
                rooms.push({
                    id: i,
                    code: roomCode,
                    floor: floor,
                    zone: zone,
                    status: status,
                    lastUpdate: new Date().toLocaleString('pt-BR')
                });
            }
            
            // Ordenar por andar e código
            return rooms.sort((a, b) => {
                if (a.floor === b.floor) return a.code.localeCompare(b.code);
                return a.floor - b.floor;
            });
        };

        let rooms = generateRooms();
        let searchTerm = '';
        let currentFilter = 'todos';

        // Atualizar estatísticas
        const updateStats = () => {
            const avaliada = rooms.filter(r => r.status === 'avaliada').length;
            const trancada = rooms.filter(r => r.status === 'trancada').length;
            const ocupada = rooms.filter(r => r.status === 'ocupada').length;
            const problemas = rooms.filter(r => r.status === 'problemas').length;
            
            document.getElementById('avaliadaCount').textContent = avaliada;
            document.getElementById('trancadaCount').textContent = trancada;
            document.getElementById('ocupadaCount').textContent = ocupada;
            document.getElementById('problemasCount').textContent = problemas;
        };

        // Atualizar status da sala
        const updateRoomStatus = (roomId, newStatus) => {
            const room = rooms.find(r => r.id === roomId);
            if (room) {
                room.status = newStatus;
                room.lastUpdate = new Date().toLocaleString('pt-BR');
                renderRoomsList();
                updateStats();
            }
        };

        // Resetar todos os status
        const resetAllStatus = () => {
            if (confirm('Tem certeza que deseja resetar todos os status? Esta ação não pode ser desfeita.')) {
                rooms.forEach(room => {
                    room.status = 'avaliada';
                    room.lastUpdate = new Date().toLocaleString('pt-BR');
                });
                renderRoomsList();
                updateStats();
            }
        };

        // Renderizar lista de salas
        const renderRoomsList = () => {
            let filteredRooms = rooms.filter(room => 
                room.code.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            if (currentFilter !== 'todos') {
                filteredRooms = filteredRooms.filter(room => room.status === currentFilter);
            }
            
            const roomsListHtml = filteredRooms.map(room => `
                <div class="room-item status-${room.status}">
                    <div class="room-info">
                        <div class="room-code">${room.code}</div>
                        <div class="room-location">
                            <span class="badge ${room.zone === 'Alta' ? 'badge-alta' : 'badge-baixa'}">
                                Zona ${room.zone}
                            </span>
                            Andar ${room.floor}
                            <span style="font-size: 0.7rem; color: #999; margin-left: 8px;">
                                • Última atualização: ${room.lastUpdate}
                            </span>
                        </div>
                    </div>
                    <div class="room-status-select">
                        <select class="status-select status-${room.status}" 
                                onchange="updateRoomStatus(${room.id}, this.value)"
                                style="padding: 6px 12px; border-radius: 20px; border: 1px solid #e2e8f0; background: white; font-size: 0.8rem; cursor: pointer;">
                            <option value="avaliada" ${room.status === 'avaliada' ? 'selected' : ''}>✓ Avaliada</option>
                            <option value="trancada" ${room.status === 'trancada' ? 'selected' : ''}>🔒 Trancada</option>
                            <option value="ocupada" ${room.status === 'ocupada' ? 'selected' : ''}>👥 Ocupada</option>
                            <option value="problemas" ${room.status === 'problemas' ? 'selected' : ''}>⚠️ Problemas</option>
                        </select>
                    </div>
                </div>
            `).join('');
            
            const roomsContainer = document.getElementById('roomsList');
            if (filteredRooms.length === 0) {
                roomsContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">Nenhuma sala encontrada</div>';
            } else {
                roomsContainer.innerHTML = roomsListHtml;
            }
        };

        // Configurar busca
        const setupSearch = () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderRoomsList();
            });
        };

        // Configurar filtros
        const setupFilters = () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderRoomsList();
                });
            });
        };

        // Inicializar
        const init = () => {
            setupSearch();
            setupFilters();
            renderRoomsList();
            updateStats();
            
            document.getElementById('resetBtn').addEventListener('click', resetAllStatus);
        };

        init();
    </script>
</body>
</html>
