<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relatório de Vistoria | Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f0f1a;
  color:#fff;
}

.app{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:flex;
  gap:20px;
}

.card{
  background:#1a1a2e;
  padding:20px;
  border-radius:16px;
  width:350px;
}

.viewer{
  flex:1;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}

.status{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:#333;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#6a00ff;
  color:#fff;
  font-weight:700;
}

.phone{
  margin:auto;
  width:320px;
  border-radius:30px;
  background:#000;
  padding:15px;
}

.screen{
  background:#0f0f1a;
  border-radius:20px;
  padding:15px;
}

</style>
</head>

<body>

<div class="app">

<div class="card">
<h2>Vistoria</h2>

<input id="auditor" placeholder="Auditor">

<select id="predio">
<option>Eco Berrini</option>
<option>Chucri Zaidan</option>
</select>

<input id="endereco" placeholder="Endereço">

<input id="andar" type="number" value="1">
<input id="sala" type="number" value="1">

<div class="status" data-status="valid">Validada</div>
<div class="status" data-status="lock">Trancada</div>
<div class="status" data-status="prob">Problemas</div>
<div class="status" data-status="other">Outros</div>

<button onclick="savePNG()">Exportar PNG</button>

</div>

<div class="viewer">

<div class="phone" id="capture">
<div class="screen" id="relatorio">
Aguardando dados...
</div>
</div>

</div>

</div>

<script>

let entries=[];

function statusName(s){
  return s==="valid"?"Validada":
         s==="lock"?"Trancada":
         s==="prob"?"Problemas":"Outros";
}

document.querySelectorAll(".status").forEach(btn=>{
  btn.onclick=()=>{

    let andar=parseInt(document.getElementById("andar").value);
    let sala=parseInt(document.getElementById("sala").value);

    let idx = entries.findIndex(e=>e.andar===andar && e.sala===sala);

    // ✅ CORREÇÃO DO BUG
    if(idx>=0){
      entries[idx].status = btn.dataset.status;
    }else{
      entries.push({
        andar,
        sala,
        status: btn.dataset.status
      });
    }

    render();
  }
});

function render(){

  let predio=document.getElementById("predio").value;
  let endereco=document.getElementById("endereco").value;
  let auditor=document.getElementById("auditor").value;

  let html=`
  <h3>Relatório</h3>
  <p>${predio}</p>
  <p>${endereco}</p>
  <p>${auditor}</p>
  <hr>
  `;

  if(entries.length===0){
    html+="Sem dados";
  }else{
    entries.forEach(e=>{
      html+=`<p>Andar ${e.andar} Sala ${e.sala} - ${statusName(e.status)}</p>`;
    });
  }

  document.getElementById("relatorio").innerHTML=html;
}

async function savePNG(){

  const el=document.getElementById("capture");

  const canvas=await html2canvas(el);
  const link=document.createElement("a");

  link.download="relatorio.png";
  link.href=canvas.toDataURL();

  link.click();
}

</script>

</body>
</html>
