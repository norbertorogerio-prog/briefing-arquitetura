<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>

<style>

body{
  background:linear-gradient(135deg,#1A1A2E 0%,#0F0F1A 100%);

}
.card{
  background:rgba(26,26,46,.8); backdrop-filter:blur(10px);
  border:1px solid rgba(102,0,204,.3); border-radius:20px; padding:20px; box-shadow:var(--shadow-md);
}
h2{margin:0 0 20px 0;font-weight:700;font-size:18px;background:var(--grad-primary);

.form-field{

}
.form-field:focus{border-color:var(--vivo-purple); background:rgba(102,0,204,.1); box-shadow:0 0 0 3px var(--vivo-purple-glow)}

.number-input-group{display:flex;gap:12px;margin-bottom:8px}
.number-input-group input{flex:1}

/* STATUS */
.status-strip{display:flex;gap:10px;margin:16px 0 20px;flex-wrap:wrap}
.status{

<body>
<div class="app">
  <!-- ESQUERDA - FORMULÁRIO (mantido igual) -->
  <div class="card">
    <h2>✨ Vistoria Técnica</h2>
    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Nome completo"/>
    <label>🏢 Prédio</label>
    <select id="predio" class="form-field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>
    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço automático"/>
    <div class="number-input-group">
      <div style="flex:1"><label>🏬 Andar</label><input type="number" id="floorInput" class="form-field" min="1" max="32" value="1"/></div>
      <div style="flex:1"><label>🚪 Sala</label><input type="number" id="roomInput" class="form-field" min="1" max="50" value="1"/></div>
    </div>
    <label>📌 Status</label>
    <div class="status-strip">
      <button class="status" data-status="valid"><span class="dot valid"></span>Validada</button>
      <button class="status" data-status="lock"><span class="dot lock"></span>Trancada</button>
      <button class="status" data-status="prob"><span class="dot prob"></span>Problemas</button>
      <button class="status" data-status="other"><span class="dot other"></span>Outros</button>
    </div>
    <div class="photo-section">
      <div class="photo-label">📸 Fotos da Sala <span id="currentDisplayFloor">01</span>-<span id="currentDisplayRoom">01</span></div>
      <div id="photoUploadBtn" class="photo-upload-btn">📷 + Adicionar foto (câmera ou galeria)</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
      <div id="photoGallery" class="photo-gallery"></div>
    </div>
    <div class="row"><button id="btnClear" class="btn">🗑️ Limpar Tudo</button></div>
    <p class="small">💡 Digite andar/sala → clique status para registrar</p>
  </div>

  <!-- DIREITA - RELATÓRIO COM ZONAS ALTA/BAIXA -->
  <div class="viewer">
    <div class="section">
      <h3>📦 Salas vistoriadas</h3>
      <div id="createdGrid" class="created-grid"><p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p></div>
    </div>
    <div class="section">
      <div class="report-box">
        <div class="report-title">
          <span>🏢 Relatório de Vistoria | Vivo</span>
          <div class="report-actions">
            <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;"><input id="useAI" type="checkbox" checked style="accent-color:#6600CC"> IA ligada</label>
            <button id="btnShare" class="btn-action btn-share">📱 Compartilhar</button>
            <button id="btnPNG" class="btn-action btn-png">📸 Salvar PNG</button>
            <button id="btnCopy" class="btn-action">📋 Copiar</button>
            <button id="btnCsv" class="btn-action">🧾 CSV</button>
          </div>
        </div>
        <!-- Área do relatório com visual de prédio (Zona Alta / Zona Baixa) -->
        <div id="reportBuildingArea" class="report-building">
          <div id="dynamicReport"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modais e demais elementos -->
<div id="shareModal" class="share-modal"><div class="share-card"><h4>✨ Compartilhar Relatório</h4><div class="share-buttons"><button id="shareWhatsApp" class="share-btn whatsapp">💬 WhatsApp</button><button id="shareTeams" class="share-btn teams">💼 Teams</button><button id="shareEmail" class="share-btn email">📧 E-mail</button><button id="shareSave" class="share-btn download">📸 Salvar imagem</button></div><button id="closeModal" class="close-modal">Fechar</button></div></div>
<div id="fullscreenModal" class="fullscreen-modal" onclick="closeFullscreen()"><img id="fullscreenImage" src=""></div>
<div class="toast"></div>

<script>
const STORAGE_KEY = "vistoria_simple_v2";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let currentFloor = 1, currentRoom = 1, currentImageData = null;

const pad2 = n => String(n).padStart(2,"0");
const statusName  = s => s==="valid"?"Validada":s==="lock"?"Trancada":s==="prob"?"Problemas":"Outros";
const statusClass = s => s==="valid"?"valid":s==="lock"?"lock":s==="prob"?"prob":"other";
const statusEmoji = s => s==="valid"?"✅":s==="lock"?"🔒":s==="prob"?"❌":"◻️";

const floorInput = document.getElementById("floorInput"), roomInput = document.getElementById("roomInput");
const dispFloor = document.getElementById("currentDisplayFloor"), dispRoom = document.getElementById("currentDisplayRoom");
const createdGrid = document.getElementById("createdGrid"), predioSel = document.getElementById("predio");
const enderecoInp = document.getElementById("endereco"), auditorInp = document.getElementById("auditor");
const photoInput = document.getElementById("photoInput"), photoBtn = document.getElementById("photoUploadBtn");
const shareModal = document.getElementById("shareModal");

function updateCurrentDisplay(){
  currentFloor = Math.min(32, Math.max(1, parseInt(floorInput.value)||1));
  currentRoom  = Math.min(50, Math.max(1, parseInt(roomInput.value)||1));
  floorInput.value = currentFloor; roomInput.value = currentRoom;
  dispFloor.textContent = pad2(currentFloor); dispRoom.textContent = pad2(currentRoom);
}
floorInput.addEventListener("input", ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });
roomInput.addEventListener("input",  ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });

const roomKey = (f,r)=>`A${pad2(f)}-S${pad2(r)}`;
const getRoomPhotos = (f,r)=> JSON.parse(localStorage.getItem(`photos_${roomKey(f,r)}`)||"[]");
const saveRoomPhotos= (f,r,arr)=> localStorage.setItem(`photos_${roomKey(f,r)}`, JSON.stringify(arr));
function addPhotoToRoom(f,r,photo){
  const arr = getRoomPhotos(f,r); arr.push(photo); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderBuildingReport();
}
function deletePhotoFromRoom(f,r,idx){
  const arr = getRoomPhotos(f,r); arr.splice(idx,1); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderBuildingReport(); showToast("📸 Foto removida");
}
function renderCurrentPhotos(){
  const gal = document.getElementById("photoGallery");
  const photos = getRoomPhotos(currentFloor,currentRoom);
  if(!photos.length){ gal.innerHTML = '<p class="small" style="text-align:center;width:100%">Nenhuma foto adicionada</p>'; return; }
  gal.innerHTML = "";
  photos.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="photo-item";
    div.innerHTML = `<img src="${p}" alt="Foto" onclick="showFullscreenImage('${p}')"><div class="photo-delete" onclick="event.stopPropagation(); deletePhotoFromRoom(${currentFloor},${currentRoom},${i})">✕</div>`;
    gal.appendChild(div);
  });
}
function showFullscreenImage(src){ const m=document.getElementById("fullscreenModal"),i=document.getElementById("fullscreenImage"); i.src=src; m.classList.add("show"); }
function closeFullscreen(){ document.getElementById("fullscreenModal").classList.remove("show"); }
window.deletePhotoFromRoom=deletePhotoFromRoom; window.showFullscreenImage=showFullscreenImage; window.closeFullscreen=closeFullscreen;

document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const status = btn.dataset.status, f=currentFloor, r=currentRoom;
    const idx = entries.findIndex(e=> e.f===f && e.r===r);
    if(idx>=0) entries[idx].status = status; else entries.push({f,r,status});
    persist(); renderCreated(); renderBuildingReport();
    showToast(`✅ A${pad2(f)}-S${pad2(r)}: ${statusName(status)}`);
  });
});

function renderCreated(){
  const sorted = [...entries].sort((a,b)=> a.f-b.f || a.r-b.r);
  if(!sorted.length){ createdGrid.innerHTML='<p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p>'; return; }
  createdGrid.innerHTML="";
  sorted.forEach(it=>{
    const photos = getRoomPhotos(it.f,it.r), has = photos.length>0;
    const card=document.createElement("div"); card.className = "room-card"+(has?' has-photo':'');
    card.onclick=()=>{ floorInput.value=it.f; roomInput.value=it.r; updateCurrentDisplay(); renderCurrentPhotos(); };
    const badge=document.createElement("div"); badge.className="badge"; badge.innerHTML=`A${pad2(it.f)} • S${pad2(it.r)}${has?' 📸':''}`;
    const pill =document.createElement("div"); pill.className=`pill ${statusClass(it.status)}`; pill.textContent=`${statusEmoji(it.status)} ${statusName(it.status)}`;
    card.appendChild(badge); card.appendChild(pill);
    if(has){ const pi=document.createElement("div"); pi.className="photo-indicator"; pi.textContent=`📸 ${photos.length} foto(s)`; card.appendChild(pi); }
    createdGrid.appendChild(card);
  });
}

function renderBuildingReport(){
  const predio = predioSel.value || "Não selecionado";
  const endereco = enderecoInp.value || "Não informado";
  const auditor = auditorInp.value || "Não informado";
  const dataStr = new Date().toLocaleString("pt-BR");
  
  // Separar salas por zonas
  const zonaAlta = entries.filter(e => e.f >= 16 && e.f <= 32);
  const zonaBaixa = entries.filter(e => e.f >= 1 && e.f <= 14);
  
  const buildRoomBadge = (item) => {
    const photos = getRoomPhotos(item.f, item.r);
    const hasPhoto = photos.length > 0;
    const dotClass = item.status === 'valid' ? 'valid' : item.status === 'lock' ? 'lock' : item.status === 'prob' ? 'prob' : 'other';
    return `<div class="room-badge-building" onclick="goToRoom(${item.f},${item.r})">
      <span class="status-dot-small ${dotClass}"></span>
      A${pad2(item.f)}-S${pad2(item.r)} ${hasPhoto ? '📸' : ''}
    </div>`;
  };
  
  let html = `<div class="info-panel">
    <div class="info-item"><div class="info-label-small">PRÉDIO</div><div class="info-value-small">${predio}</div></div>
    <div class="info-item"><div class="info-label-small">ENDEREÇO</div><div class="info-value-small">${endereco}</div></div>
    <div class="info-item"><div class="info-label-small">DATA/HORA</div><div class="info-value-small">${dataStr}</div></div>
    <div class="info-item"><div class="info-label-small">AUDITOR</div><div class="info-value-small">${auditor}</div></div>
  </div>`;
  
  // Zona Alta (16 a 32)
  html += `<div class="zone-alta">
    <div class="zone-header">
      <div class="zone-icon">🏙️</div>
      <div class="zone-title">ZONA ALTA</div>
      <div class="zone-range">Andares 16 → 32</div>
    </div>
    <div class="zone-content">
      <div class="rooms-list-building">${zonaAlta.length ? zonaAlta.map(buildRoomBadge).join('') : '<div style="color:#aaa; font-size:13px;">Nenhuma sala vistoriada nesta zona</div>'}</div>
    </div>
  </div>`;
  
  // Zona Baixa (1 a 14)
  html += `<div class="zone-baixa">
    <div class="zone-header">
      <div class="zone-icon">🏢</div>
      <div class="zone-title">ZONA BAIXA</div>
      <div class="zone-range">Andares 01 → 14</div>
    </div>
    <div class="zone-content">
      <div class="rooms-list-building">${zonaBaixa.length ? zonaBaixa.map(buildRoomBadge).join('') : '<div style="color:#aaa; font-size:13px;">Nenhuma sala vistoriada nesta zona</div>'}</div>
    </div>
  </div>`;
  
  // Estatísticas rápidas
  const stats = {valid:0,lock:0,prob:0,other:0};
  entries.forEach(e => stats[e.status]++);
  html += `<div class="stats-mini">
    <div class="stat-mini">✅ Validadas: ${stats.valid}</div>
    <div class="stat-mini">🔒 Trancadas: ${stats.lock}</div>
    <div class="stat-mini">❌ Problemas: ${stats.prob}</div>
    <div class="stat-mini">◻️ Outros: ${stats.other}</div>
    <div class="stat-mini">📸 Total salas com foto: ${entries.filter(e=>getRoomPhotos(e.f,e.r).length).length}</div>
  </div>`;
  
  // Evidências fotográficas (se houver)
  const roomsWithPhotos = entries.filter(item => getRoomPhotos(item.f,item.r).length);
  if(roomsWithPhotos.length){
    html += `<div style="margin-top:20px;"><div class="zone-header" style="margin-bottom:12px;"><div class="zone-title">📸 Evidências</div></div>`;
    roomsWithPhotos.forEach(item => {
      const photos = getRoomPhotos(item.f,item.r);
      html += `<div class="report-room-photos">
        <div class="report-room-title">${statusEmoji(item.status)} A${pad2(item.f)}-S${pad2(item.r)} — ${statusName(item.status)} (${photos.length} foto${photos.length>1?"s":""})</div>
        <div class="report-photo-thumbnails">` + photos.map(p=>`<img src="${p}" class="report-thumb" onclick="showFullscreenImage('${p}')" loading="lazy">`).join("") + `</div>
      </div>`;
    });
    html += `</div>`;
  }
  
  document.getElementById("dynamicReport").innerHTML = html;
}

window.goToRoom = (f,r) => {
  floorInput.value = f; roomInput.value = r;
  updateCurrentDisplay(); renderCurrentPhotos();
};

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function showToast(msg){ let t=document.querySelector(".toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }

async function generateImage(){
  const element = document.getElementById("reportBuildingArea");
  if(!element) return null;
  showToast("📸 Gerando imagem...");
  try{
    const canvas = await html2canvas(element,{scale:2,backgroundColor:null,logging:false,useCORS:true});
    return canvas.toDataURL('image/png');
  }catch(e){ showToast("❌ Erro"); return null; }
}
async function saveAsPNG(){ const data=await generateImage(); if(data){ const a=document.createElement('a'); a.download=`vistoria_predio.png`; a.href=data; a.click(); showToast("✅ Imagem salva!"); } }
async function openShareModal(){ const d=await generateImage(); if(d){ currentImageData=d; shareModal.classList.add("show"); } }
function shareToWhatsApp(){ if(currentImageData){ const text=`Vistoria Vivo - ${predioSel.value||"Prédio"}`; window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`); } shareModal.classList.remove("show"); }
function shareToTeams(){ if(currentImageData){ navigator.clipboard.writeText(`Relatório Vistoria ${predioSel.value}`); showToast("Copiado"); } shareModal.classList.remove("show"); }
function shareToEmail(){ if(currentImageData){ window.location.href=`mailto:?subject=Relatório Vistoria`; } shareModal.classList.remove("show"); }
function shareSaveImage(){ if(currentImageData){ const a=document.createElement('a'); a.download=`vistoria_predio.png`; a.href=currentImageData; a.click(); } shareModal.classList.remove("show"); showToast("✅ Imagem salva!"); }
function copyReportToClipboard(){ const t=document.getElementById("dynamicReport").innerText; navigator.clipboard?.writeText(t).then(()=>showToast("Copiado ✅")); }
function exportCsv(){
  const header=["Auditor","Predio","Andar","Sala","Status","Fotos"];
  const rows=entries.map(e=>[auditorInp.value,predioSel.value,pad2(e.f),pad2(e.r),statusName(e.status),getRoomPhotos(e.f,e.r).length]);
  const csv=[header,...rows].map(l=>l.join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`vistoria_zonas.csv`; a.click(); URL.revokeObjectURL(a.href); showToast("CSV exportado");
}

photoBtn.addEventListener("click", ()=> photoInput.click());
photoInput.addEventListener("change",(e)=>{
  const files=[...e.target.files];
  files.forEach(file=>{ const rd=new FileReader(); rd.onload=ev=> addPhotoToRoom(currentFloor,currentRoom,ev.target.result); rd.readAsDataURL(file); });
  photoInput.value="";
});
document.getElementById("btnPNG").addEventListener("click", saveAsPNG);
document.getElementById("btnShare").addEventListener("click", openShareModal);
document.getElementById("shareWhatsApp").addEventListener("click", shareToWhatsApp);
document.getElementById("shareTeams").addEventListener("click", shareToTeams);
document.getElementById("shareEmail").addEventListener("click", shareToEmail);
document.getElementById("shareSave").addEventListener("click", shareSaveImage);
document.getElementById("closeModal").addEventListener("click", ()=> shareModal.classList.remove("show"));
document.getElementById("btnCopy").addEventListener("click", copyReportToClipboard);
document.getElementById("btnCsv").addEventListener("click", exportCsv);
document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar TODOS os registros e fotos?")) return;
  entries=[]; const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith("photos_")) keys.push(k); }
  keys.forEach(k=> localStorage.removeItem(k));
  auditorInp.value=""; predioSel.value=""; enderecoInp.value="";
  persist(); renderCreated(); renderBuildingReport(); renderCurrentPhotos(); showToast("✓ Todos os dados removidos");
});
predioSel.addEventListener("change", ()=>{
  const v=predioSel.value;
  if(v==="Eco Berrini") enderecoInp.value="Av. Eng. Luís Carlos Berrini, 1376 - SP";
  else if(v==="Chucri Zaidan") enderecoInp.value="Av. Dr. Chucri Zaidan, 2460 - SP";
  else enderecoInp.value="";
  renderBuildingReport();
});
(function init(){ updateCurrentDisplay(); renderCreated(); renderBuildingReport(); renderCurrentPhotos(); })();
</script>
</body>
</html>
