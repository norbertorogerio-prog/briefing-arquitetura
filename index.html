<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Vistoria Workplace | Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ... (Mantive seus estilos originais e adicionei os ajustes abaixo) ... */
:root{
  --vivo-purple:#6600CC; --vivo-purple-dark:#4C0099; --vivo-purple-light:#8833FF;
  --vivo-purple-glow:rgba(102,0,204,.2); --black:#1A1A2E; --white:#FFF; 
  --green:#00C853; --yellow:#FFD600; --red:#FF3B3B; --orange:#FF9800;
  --grad-primary:linear-gradient(135deg,#6600CC 0%,#4C0099 100%);
}
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{
  background:#0F0F1A; color:var(--white);
  font-family:'Inter', sans-serif; min-height:100vh; padding:15px;
}

/* Melhoria na usabilidade mobile */
.status:active { transform: scale(0.95); background: var(--vivo-purple); }
.room-card:active { background: var(--vivo-purple-glow); }

/* Grid de fotos mais fluído */
.photo-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
@media(max-width: 480px) { .photo-gallery { grid-template-columns: repeat(3, 1fr); } }

/* Estilo do botão de GPS */
.gps-btn {
    background: rgba(102,0,204,0.2); border: 1px solid var(--vivo-purple);
    color: white; border-radius: 8px; padding: 5px 10px; font-size: 10px;
    cursor: pointer; margin-top: 5px; display: inline-block;
}

/* ... (O restante dos seus estilos de 'phone-wrap', 'card', 'report' continuam iguais) ... */
/* Adicione apenas este ajuste para o scroll do relatório no celular */
.phone-screen .report-content { -webkit-overflow-scrolling: touch; }
</style>
</head>
<body>

<div class="app">
  <div class="card">
    <h2>✨ Vistoria Workplace</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Seu nome" oninput="saveDraft()">

    <label>🏢 Prédio</label>
    <select id="predio" class="form-field" onchange="updateAddress(); saveDraft();">
      <option value="">Selecione...</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço da unidade">
    <div class="gps-btn" onclick="getLocation()">📍 Usar GPS Atual</div>

    <div class="number-input-group" style="margin-top:15px">
        <div style="flex:1">
            <label>🏬 Andar</label>
            <select id="floorInput" class="form-field" onchange="updateAndRender()"></select>
        </div>
        <div style="flex:1">
            <label>🚪 Sala</label>
            <select id="roomInput" class="form-field" onchange="updateAndRender()"></select>
        </div>
    </div>

    <div id="photoUploadBtn" class="photo-upload-btn" style="margin-top:15px">📷 + Tirar Foto da Sala</div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
    <div id="photoGallery" class="photo-gallery" style="margin-top:10px"></div>
    
    <button id="btnClear" class="btn" style="margin-top:20px; background: #333;">🗑️ Resetar Auditoria</button>
  </div>

  </div>

<script>
/* NOVO: Função de compressão para não estourar o limite do navegador */
async function compressImage(base64Str) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = base64Str;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // Tamanho ideal para relatório PNG
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); // Salva em JPEG 70%
        };
    });
}

/* NOVO: Geolocalização */
function getLocation() {
    if (navigator.geolocation) {
        showToast("Buscando GPS...");
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById("endereco").value = `Lat: ${pos.coords.latitude.toFixed(4)}, Long: ${pos.coords.longitude.toFixed(4)}`;
            renderReportWithPhotos();
        });
    }
}

/* NOVO: Salvar rascunho do auditor */
function saveDraft() {
    const draft = {
        auditor: document.getElementById("auditor").value,
        predio: document.getElementById("predio").value
    };
    localStorage.setItem("vistoria_draft", JSON.stringify(draft));
}

/* Melhoria no clique do Status (Vibração e Sombras) */
document.querySelectorAll(".status").forEach(btn => {
    btn.addEventListener("click", () => {
        if (navigator.vibrate) navigator.vibrate(40); // Feedback tátil
        // ... (lógica original de salvar status)
    });
});

/* Carregar rascunho ao abrir */
window.onload = () => {
    const draft = JSON.parse(localStorage.getItem("vistoria_draft") || "{}");
    if(draft.auditor) document.getElementById("auditor").value = draft.auditor;
    if(draft.predio) {
        document.getElementById("predio").value = draft.predio;
        updateAddress();
    }
    // Inicializar o restante (populateFloorSelect, etc)
};

/* Mantenha suas funções originais de renderização, elas estão perfeitas */
// ... (populateFloorSelect, renderCreated, renderReportWithPhotos, generateImage, etc)
</script>
</body>
</html>
