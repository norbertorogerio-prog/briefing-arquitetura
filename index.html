<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria Premium</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  background:#0b0b10;
  color:#fff;
  font-family:Arial;
  padding:16px;
}

.card{
  background:#151520;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  background:#1f1f2e;
  color:#fff;
  border:none;
}

.status{
  display:flex;
  gap:8px;
}

.status button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
}

.valid{background:#00c853}
.lock{background:#ffd600;color:#000}
.prob{background:#ff3b3b}
.other{background:#666}

.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.kpi div{
  background:#1f1f2e;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.building{
  margin-top:20px;
  max-height:500px;
  overflow:auto;
}

.floor{
  display:flex;
  margin-bottom:6px;
}

.label{
  width:40px;
  font-size:12px;
  color:#aaa;
}

.bar{
  flex:1;
  height:16px;
  background:#222;
  border-radius:6px;
}

.fill{
  height:100%;
  border-radius:6px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:purple;
  color:#fff;
  font-weight:800;
}
</style>
</head>

<body>

<div class="card">

<select id="andar"></select>
<select id="sala"></select>

<div class="status">
<button class="valid" onclick="add('valid')">Validado</button>
<button class="lock" onclick="add('lock')">Lock</button>
<button class="prob" onclick="add('prob')">Problema</button>
<button class="other" onclick="add('other')">Ocupado</button>
</div>

<button class="btn" onclick="importar()">📲 Importar</button>

</div>

<div class="card">

<div class="kpi">
<div id="total">0<br>Salas</div>
<div id="valid">0<br>Validado</div>
<div id="lockKpi">0<br>Lock</div>
<div id="probKpi">0<br>Problema</div>
</div>

<div id="capture">
<div class="building" id="building"></div>
</div>

</div>

<script>

let entries=[];

/* RANGE 01-32 e 01-50 */
for(let i=1;i<=32;i++){
  let o=document.createElement("option");
  o.value=i;
  o.text=String(i).padStart(2,'0');
  andar.appendChild(o);
}

for(let i=1;i<=50;i++){
  let o=document.createElement("option");
  o.value=i;
  o.text=String(i).padStart(2,'0');
  sala.appendChild(o);
}

/* ADD */
function add(status){
  let f=parseInt(andar.value);
  let r=parseInt(sala.value);

  const existing = entries.find(e=>e.f===f && e.r===r);

  if(existing){
    existing.status=status;
  }else{
    entries.push({f,r,status});
  }

  render();
}

/* UNIQUE */
function getUnique(){
  return Object.values(
    entries.reduce((acc,cur)=>{
      acc[`${cur.f}-${cur.r}`]=cur;
      return acc;
    },{})
  );
}

/* RENDER */
function render(){

  let building=document.getElementById("building");
  building.innerHTML="";

  let list=getUnique();

  let floors={};

  list.forEach(x=>{
    if(!floors[x.f]) floors[x.f]=[];
    floors[x.f].push(x);
  });

  for(let i=32;i>=1;i--){

    let row=document.createElement("div");
    row.className="floor";

    let label=document.createElement("div");
    label.className="label";
    label.innerText=String(i).padStart(2,'0');

    let bar=document.createElement("div");
    bar.className="bar";

    let fill=document.createElement("div");
    fill.className="fill";

    let items=floors[i]||[];

    let valid=items.filter(x=>x.status==='valid').length;
    let lock=items.filter(x=>x.status==='lock').length;
    let prob=items.filter(x=>x.status==='prob').length;

    if(prob>0) fill.style.background="#ff3b3b";
    else if(lock>0) fill.style.background="#ffd600";
    else if(valid>0) fill.style.background="#00c853";
    else fill.style.background="#444";

    fill.style.width=(items.length*10)+"%";

    bar.appendChild(fill);
    row.appendChild(label);
    row.appendChild(bar);

    building.appendChild(row);
  }

  updateKPI(list);
}

/* KPI */
function updateKPI(list){

  let total=list.length;
  let valid=list.filter(x=>x.status==='valid').length;
  let lock=list.filter(x=>x.status==='lock').length;
  let prob=list.filter(x=>x.status==='prob').length;

  document.getElementById("total").innerHTML=total+"<br>Salas";
  document.getElementById("valid").innerHTML=valid+"<br>Validado";
  document.getElementById("lockKpi").innerHTML=lock+"<br>Lock";
  document.getElementById("probKpi").innerHTML=prob+"<br>Problema";
}

/* IMPORTAR (compartilhar) */
async function importar(){

  const canvas = await html2canvas(document.getElementById("capture"));
  const blob = await (await fetch(canvas.toDataURL())).blob();

  const file = new File([blob], "vistoria.png", {type:"image/png"});

  if(navigator.share){
    navigator.share({
      files:[file],
      title:"Relatório",
      text:"Relatório de vistoria"
    });
  }else{
    let a=document.createElement("a");
    a.href=canvas.toDataURL();
    a.download="vistoria.png";
    a.click();
  }
}

</script>

</body>
</html>
